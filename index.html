<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dr: Fady Adel | Physics Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Amiri:ital@1&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --navy: #050a0f; --gold: #c9972b; --white: #fff; --card: #0d1621; --brd: rgba(201, 151, 43, 0.3); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; background: var(--navy); color: var(--white); overflow-x: hidden; user-select: none; -webkit-user-select: none; }
        
        /* حماية الشاشة */
        @media print { body { display: none !important; } }
        @media screen { video, iframe { filter: opacity(1) !important; } }

        .container { max-width: 600px; margin: auto; padding: 20px; }
        .card { background: var(--card); border: 1px solid var(--brd); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        
        /* اللوجو الجديد */
        .logo-img { width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--gold); margin-bottom: 15px; object-fit: cover; background: #fff; }

        input { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--brd); border-radius: 12px; color: white; font-size: 1rem; text-align: center; outline: none; }
        .btn-gold { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 12px; color: var(--navy); font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); margin-top: 10px; }

        .amiri { font-family: 'Amiri', serif; color: var(--gold); font-size: 1.2rem; text-align: center; margin: 20px 0; font-style: italic; }
        .course-card { background: var(--card); border: 1px solid var(--brd); border-radius: 15px; margin-bottom: 20px; overflow: hidden; cursor: pointer; }
        .course-img { width: 100%; height: 160px; object-fit: cover; }
        
        #watermark { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; opacity: 0.15; font-size: 12px; color: #fff; display: none; }
        .exam-area { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--navy); z-index: 10000; display: none; padding: 20px; overflow-y: auto; }
        .locked { filter: grayscale(1); opacity: 0.7; position: relative; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="watermark"></div>

<div id="loginPage" class="container" style="margin-top: 5vh;">
    <img src="https://i.ibb.co/680YpY8/fady-logo.jpg" class="logo-img">
    <div class="card">
        <h1 style="color:var(--gold); margin-bottom:10px;">Dr: Fady Adel</h1>
        <p style="opacity:0.7; margin-bottom:20px;">منصة الفيزياء للثانوية العامة</p>
        
        <input type="tel" id="loginPhone" placeholder="رقم الموبايل">
        <input type="password" id="loginPass" placeholder="كلمة المرور">
        <button class="btn-gold" onclick="doLogin()">دخول للمنصة</button>
        
        <button class="btn-gold btn-outline" onclick="showSignup()">إنشاء حساب جديد</button>

        <a style="display:block; margin-top:20px; color:#ff6b6b; font-size:0.85rem; cursor:pointer; text-decoration:none;" 
           onclick="window.open('https://wa.me/201021422744?text=نسيت كلمة المرور الخاصة بحسابي', '_blank')">
           نسيت كلمة المرور؟ تواصل معنا
        </a>
    </div>
    <p class="amiri">"وَمَنْ لا يُحِبُّ صُعُودَ الجِبَالِ يَعِشْ أَبَدَ الدَّهْرِ بَيْنَ الحُفَرِ"</p>
</div>

<div id="signupPage" class="container" style="margin-top: 5vh; display:none;">
    <img src="https://i.ibb.co/680YpY8/fady-logo.jpg" class="logo-img">
    <div class="card">
        <h2 style="color:var(--gold); margin-bottom:20px;">تسجيل طالب جديد</h2>
        <input type="text" id="regName" placeholder="الاسم بالكامل">
        <input type="tel" id="regPhone" placeholder="رقم الموبايل">
        <input type="password" id="regPass" placeholder="كلمة المرور">
        <button class="btn-gold" onclick="doSignUp()">تأكيد التسجيل</button>
        <button class="btn-gold btn-outline" onclick="showLogin()">العودة للدخول</button>
    </div>
</div>

<div id="mainPage" class="container" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 id="welcomeName" style="color:var(--gold);">أهلاً بك</h2>
        <button onclick="location.reload()" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:5px 10px; border-radius:8px;">خروج</button>
    </div>
    <div id="coursesContainer"></div>
</div>

<div id="lessonsPage" class="container" style="display:none;">
    <button onclick="showMain()" style="color:var(--gold); margin-bottom:15px; background:none; border:none; cursor:pointer; font-weight:bold;">← العودة للكورسات</button>
    <div id="lessonsContainer"></div>
</div>

<div id="examArea" class="exam-area"><div id="examContent"></div></div>

<script>
    const _supabase = supabase.createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');
    
    let currentUser = null;

    function showSignup() { document.getElementById('loginPage').style.display='none'; document.getElementById('signupPage').style.display='block'; }
    function showLogin() { document.getElementById('loginPage').style.display='block'; document.getElementById('signupPage').style.display='none'; }

    async function getDeviceId() { return btoa(navigator.userAgent + screen.width); }

    // إنشاء حساب جديد
    async function doSignUp() {
        const name = document.getElementById('regName').value;
        const phone = document.getElementById('regPhone').value;
        const pass = document.getElementById('regPass').value;
        const devId = await getDeviceId();

        if(!name || !phone || !pass) return alert("برجاء إكمال البيانات");

        const { data, error } = await _supabase.from('students').insert([
            { student_name: name, student_phone: phone, password: pass, last_device_id: devId }
        ]).select().single();

        if(error) return alert("الرقم مسجل بالفعل!");
        
        currentUser = data;
        alert("تم التسجيل بنجاح!");
        startWatermark(name, phone);
        showMain();
    }

    // تسجيل الدخول
    async function doLogin() {
        const phone = document.getElementById('loginPhone').value;
        const pass = document.getElementById('loginPass').value;
        const devId = await getDeviceId();

        const { data: user } = await _supabase.from('students').select('*').eq('student_phone', phone).single();
        
        if(!user || user.password !== pass) return alert("بيانات خاطئة");
        if(user.last_device_id && user.last_device_id !== devId) return alert("الجهاز غير مسجل!");

        currentUser = user;
        startWatermark(user.student_name, user.student_phone);
        showMain();
    }

    function startWatermark(name, phone) {
        const wm = document.getElementById('watermark'); wm.style.display = 'block';
        setInterval(() => { wm.innerHTML = `<div style="position:absolute; top:${Math.random()*90}%; left:${Math.random()*60}%; color:rgba(255,255,255,0.1); transform:rotate(-15deg);">${name} - ${phone}</div>`; }, 3000);
    }

    async function showMain() {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('signupPage').style.display = 'none';
        document.getElementById('lessonsPage').style.display = 'none';
        document.getElementById('mainPage').style.display = 'block';
        document.getElementById('welcomeName').innerText = "يا " + currentUser.student_name.split(' ')[0];

        const { data: access } = await _supabase.from('student_access').select('course_id').eq('student_phone', currentUser.student_phone);
        const userAccess = access.map(a => a.course_id);

        const { data: courses } = await _supabase.from('courses').select('*');
        let html = '';
        courses.forEach(c => {
            const isLocked = c.price > 0 && !userAccess.includes(c.id);
            html += `
                <div class="course-card ${isLocked ? 'locked' : ''}" onclick="${isLocked ? "alert('تواصل مع المستر للتفعيل')" : `showLessons('${c.id}')`}">
                    <img src="${c.image_url || 'https://via.placeholder.com/400x200'}" class="course-img">
                    <div style="padding:15px; text-align:center;"><h3>${c.title}</h3><p>${c.price === 0 ? 'مجاني' : c.price + ' ج.م'}</p></div>
                </div>`;
        });
        document.getElementById('coursesContainer').innerHTML = html;
    }

    async function showLessons(courseId) {
        document.getElementById('mainPage').style.display = 'none';
        document.getElementById('lessonsPage').style.display = 'block';
        const { data: lessons } = await _supabase.from('lessons').select('*').eq('course_id', courseId);
        let html = '';
        lessons.forEach(l => {
            html += `
                <div class="card" style="margin-bottom:15px; border-right:4px solid var(--gold); text-align:right;">
                    <h3>${l.title}</h3>
                    <div style="margin:15px 0; position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:10px;">
                        <iframe style="position:absolute; top:0; left:0; width:100%; height:100%;" src="https://www.youtube.com/embed/${l.video_id}?rel=0&disablekb=1" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <button class="btn-gold" onclick="openExam('${l.id}')">بدء الامتحان 📝</button>
                </div>`;
        });
        document.getElementById('lessonsContainer').innerHTML = html || '<p>لا توجد محاضرات.</p>';
    }

    // حماية
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) e.preventDefault();
        if (e.key === "PrintScreen") { navigator.clipboard.writeText(""); alert("التصوير ممنوع!"); }
    });
</script>
</body>
</html>
