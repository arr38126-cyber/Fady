<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dr: Fady Adel | Physics Platform</title>
    <link rel="icon" href="https://i.ibb.co/nMB0QD7k/fady-logo.png" type="image/png" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Amiri:wght@700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --navy-dark: #050a0f; --navy-card: #0d1621; --gold: #c9972b;
            --gold-gradient: linear-gradient(135deg, #a87820, #c9972b, #e8b84b);
            --white: #ffffff; --text-gray: #a0aec0; --brd: rgba(201, 151, 43, 0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Cairo', sans-serif; background: var(--navy-dark); color: var(--white); overflow-x: hidden; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        /* Navbar */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--brd); margin-bottom: 30px; }
        .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 900; }
        .nav-logo img { width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--gold); }
        .yt-btn { background: #ff0000; color: white; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 0.8rem; }

        /* Auth Card */
        .auth-container { max-width: 450px; margin: 50px auto; background: var(--navy-card); border-radius: 24px; padding: 40px; border: 1px solid var(--brd); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; background: rgba(255,255,255,0.03); padding: 5px; border-radius: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-gray); cursor: pointer; font-weight: 700; border-radius: 10px; transition: 0.3s; font-family: 'Cairo'; }
        .tab-btn.active { background: var(--gold-gradient); color: var(--navy-dark); }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.02); border: 1px solid var(--brd); border-radius: 12px; color: white; font-family: 'Cairo'; outline: none; }

        /* Video System */
        .video-player-box { position: relative; width: 100%; max-width: 850px; margin: 20px auto; border-radius: 20px; overflow: hidden; border: 2px solid var(--gold); background: #000; }
        .shield-top { position: absolute; top: 0; left: 0; width: 100%; height: 60px; z-index: 10; background: transparent; }
        .shield-bottom { position: absolute; bottom: 0; right: 0; width: 120px; height: 50px; z-index: 10; background: transparent; }
        #watermark { position: absolute; z-index: 100; color: rgba(255, 255, 255, 0.25); font-size: 14px; font-weight: bold; pointer-events: none; white-space: nowrap; transition: all 2s ease-in-out; text-shadow: 1px 1px 2px #000; }
        iframe { width: 100%; aspect-ratio: 16/9; border: none; }

        /* Dashboard Elements */
        .page { display: none; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .instructor-card { display: flex; align-items: center; gap: 15px; background: var(--navy-card); padding: 20px; border-radius: 20px; border: 1px solid var(--brd); margin-bottom: 25px; }
        .quote-box { background: rgba(201, 151, 43, 0.05); padding: 20px; border-radius: 15px; text-align: center; border: 1px dashed var(--gold); margin-bottom: 30px; font-family: 'Amiri', serif; font-size: 1.3rem; color: var(--gold); }
        
        .btn-gold { padding: 12px 25px; background: var(--gold-gradient); border: none; border-radius: 10px; color: var(--navy-dark); font-weight: 800; cursor: pointer; transition: 0.3s; font-family: 'Cairo'; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(201,151,43,0.3); }
        .hidden { display: none; }

        /* Grades Table */
        .table-wrap { background: var(--navy-card); border-radius: 15px; padding: 20px; border: 1px solid var(--brd); overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th { color: var(--gold); padding: 12px; border-bottom: 1px solid var(--brd); }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="container">
        <nav>
            <div class="nav-logo">
                <img src="https://i.ibb.co/nMB0QD7k/fady-logo.png" alt="Logo">
                <span>Dr: Fady Adel</span>
            </div>
            <a href="https://youtube.com/@drfadyadel-w8l?si=sgCT0tDyKaXr_W_C" target="_blank" class="yt-btn">اليوتيوب 🎥</a>
        </nav>

        <div id="authSection" class="auth-container">
            <div class="tabs">
                <button class="tab-btn active" id="t-login" onclick="showAuth('login')">دخول</button>
                <button class="tab-btn" id="t-reg" onclick="showAuth('reg')">حساب جديد</button>
            </div>
            <div id="loginArea">
                <input type="tel" id="lp" placeholder="رقم الموبايل">
                <input type="password" id="lw" placeholder="كلمة المرور">
                <button class="btn-gold" style="width:100%" onclick="doLogin()">دخول المنصة</button>
            </div>
            <div id="regArea" class="hidden">
                <input type="text" id="rn" placeholder="الاسم الثلاثي">
                <input type="tel" id="rp" placeholder="رقم الموبايل">
                <input type="password" id="rw" placeholder="كلمة المرور">
                <button class="btn-gold" style="width:100%" onclick="doReg()">إنشاء حساب</button>
            </div>
        </div>

        <div id="studentDash" class="page">
            <div class="instructor-card">
                <img src="https://i.ibb.co/nMB0QD7k/fady-logo.png" style="width:70px; height:70px; border-radius:50%; border:2px solid var(--gold);">
                <div>
                    <h3 style="color:var(--gold)">د/ فادي عادل</h3>
                    <p style="font-size:0.8rem; color:var(--text-gray)">مرحباً بك يا <span id="sName" style="color:white; font-weight:700;"></span></p>
                </div>
                <button class="btn-gold" style="margin-right:auto; background:red; color:white; padding:5px 15px;" onclick="logout()">خروج</button>
            </div>

            <div class="quote-box">"وَمَنْ لا يُحِبُّ صُعُودَ الجِبَالِ.. يَعِشْ أَبَدَ الدَّهْرِ بَيْنَ الحُفَرِ"</div>

            <h3 style="margin-bottom:15px;">المحاضرات المتاحة 🎥</h3>
            <div class="instructor-card" style="cursor:pointer;" onclick="openLecture('VIDEO_ID_HERE')">
                <div style="background:var(--gold); color:var(--navy-dark); padding:15px; border-radius:12px; font-weight:900;">01</div>
                <div>
                    <p style="font-weight:700;">المحاضرة الأولى: مقدمة في الفيزياء الكهربية</p>
                    <p style="font-size:0.75rem; color:var(--text-gray);">اضغط للمشاهدة الآن</p>
                </div>
            </div>

            <h3 style="margin-top:30px;">نتائج امتحاناتك 📊</h3>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>الامتحان</th><th>الدرجة</th><th>الحالة</th></tr></thead>
                    <tbody id="gradesBody">
                        <tr><td>امتحان الفصل الأول</td><td>28/30</td><td style="color:#00ff00">ممتاز</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="videoPage" class="page">
            <div class="video-player-box">
                <div class="shield-top"></div>
                <div class="shield-bottom"></div>
                <div id="watermark"></div>
                <iframe id="player" src="" allowfullscreen></iframe>
            </div>
            <center style="margin-top:20px;"><button class="btn-gold" onclick="closeLecture()">إغلاق الفيديو</button></center>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');

        // الحماية من الاختصارات
        document.onkeydown = (e) => {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0))) || (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) return false;
        };

        window.onload = () => {
            const user = JSON.parse(localStorage.getItem('physics_user'));
            if(user) launch(user);
        };

        function showAuth(v) {
            const isL = v === 'login';
            document.getElementById('loginArea').classList.toggle('hidden', !isL);
            document.getElementById('regArea').classList.toggle('hidden', isL);
            document.getElementById('t-login').classList.toggle('active', isL);
            document.getElementById('t-reg').classList.toggle('active', !isL);
        }

        async function doReg() {
            const d = { full_name: document.getElementById('rn').value, student_phone: document.getElementById('rp').value, password: document.getElementById('rw').value };
            if(!d.full_name || !d.student_phone) return alert("أكمل البيانات");
            const { error } = await _supabase.from('students').insert([d]);
            if(!error) { alert("تم التسجيل!"); showAuth('login'); }
            else alert("الرقم مسجل مسبقاً");
        }

        async function doLogin() {
            const p = document.getElementById('lp').value, w = document.getElementById('lw').value;
            const { data } = await _supabase.from('students').select('*').eq('student_phone', p).eq('password', w).maybeSingle();
            if(data) {
                const user = { full_name: data.full_name, phone: data.student_phone };
                localStorage.setItem('physics_user', JSON.stringify(user));
                launch(user);
            } else alert("خطأ في البيانات");
        }

        function launch(user) {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('studentDash').style.display = 'block';
            document.getElementById('sName').innerText = user.full_name;
        }

        function openLecture(id) {
            const user = JSON.parse(localStorage.getItem('physics_user'));
            document.getElementById('studentDash').style.display = 'none';
            document.getElementById('videoPage').style.display = 'block';
            document.getElementById('player').src = `https://www.youtube.com/embed/${id}?rel=0&modestbranding=1&controls=1&disablekb=1`;
            
            // تشغيل العلامة المائية
            const mark = document.getElementById('watermark');
            mark.innerText = `${user.full_name} - ${user.phone}`;
            setInterval(() => {
                const x = Math.random() * (window.innerWidth - 200);
                const y = Math.random() * (window.innerHeight - 100);
                mark.style.left = x + 'px'; mark.style.top = y + 'px';
            }, 4000);
        }

        function closeLecture() { location.reload(); }
        function logout() { localStorage.removeItem('physics_user'); location.reload(); }
    </script>
</body>
</html>
