<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة Dr. Fady Adel للفيزياء</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&family=Amiri:ital,wght@0,400;0,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --navy: #1B2347; --orange: #E8581A; --orange-lt: #F97316;
  --white: #FFFFFF; --off-white: #FFF8F3; --shadow: 0 4px 24px rgba(27,35,71,0.15);
}

body { font-family: 'Cairo', sans-serif; background: var(--off-white); margin: 0; user-select: none; overflow-x: hidden; }

#capture-overlay { 
    display: none; position: fixed; inset: 0; background: #000; z-index: 99999; 
    align-items: center; justify-content: center; color: #fff; text-align: center; 
    font-size: 1.2rem; pointer-events: none;
}
#capture-overlay.active { display: flex; pointer-events: all; }

#watermark { display: none; position: fixed; inset: 0; pointer-events: none; z-index: 9998; opacity: 0.12; overflow: hidden; }
#watermark.active { display: block; }

.toast { position: fixed; top: 20px; right: 20px; background: var(--navy); color: #fff; padding: 15px 25px; border-radius: 12px; display: none; z-index: 10000; border-right: 5px solid var(--orange); box-shadow: var(--shadow); }

.page { display: none; animation: fadeUp 0.5s ease; }
.page.active { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }

.auth-bg { min-height: 100vh; background: linear-gradient(135deg, var(--navy) 0%, #2a3460 100%); display: flex; align-items: center; justify-content: center; padding: 20px; }
.auth-card { background: #fff; border-radius: 24px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); text-align: center; position: relative; z-index: 10; }
.auth-logo { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--orange); margin-bottom: 15px; }
.auth-quote { font-family: 'Amiri', serif; color: var(--orange); background: rgba(232,88,26,0.1); padding: 12px; border-radius: 10px; margin-bottom: 25px; font-size: 1.1rem; line-height: 1.6; }

.form-group { text-align: right; margin-bottom: 15px; }
.form-group label { display: block; font-weight: 700; margin-bottom: 5px; color: var(--navy); }
.form-group input { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 10px; outline: none; font-family: 'Cairo'; transition: 0.3s; box-sizing: border-box; font-size: 1rem; }
.form-group input:focus { border-color: var(--orange); }

.btn-primary { width: 100%; padding: 14px; background: var(--orange); color: #fff; border: none; border-radius: 10px; cursor: pointer; font-weight: 800; font-size: 1.1rem; transition: 0.3s; position: relative; z-index: 20; }
.btn-primary:hover { background: var(--orange-lt); transform: translateY(-2px); }

#navbar { display: none; background: var(--navy); padding: 12px 25px; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); color: #fff; }
#navbar.visible { display: flex; }
</style>
</head>
<body>

<div id="capture-overlay">🚫<br>تصوير الشاشة محظور لحماية المحتوى</div>
<div id="watermark"><div id="wm-text" style="transform: rotate(-30deg); white-space: nowrap; font-size: 20px; line-height: 6; color: rgba(27,35,71,0.1);"></div></div>
<div id="toast" class="toast"></div>

<nav id="navbar">
    <div style="display:flex; align-items:center; gap:12px;">
        <img src="https://i.ibb.co/zT82jk68/image.png" width="40" height="40" style="border-radius:50%; border:2px solid var(--orange);">
        <div>
            <div style="font-weight:800; font-size:0.9rem;">Dr. Fady Adel</div>
            <div id="nav-student-name" style="color:var(--orange); font-size:0.8rem;">...</div>
        </div>
    </div>
    <button id="logout-btn" onclick="handleLogout()" style="background:var(--orange); color:#fff; border:none; padding:6px 15px; border-radius:8px; cursor:pointer; font-weight:700;">خروج</button>
</nav>

<div id="app">
    <div id="login-page" class="page active">
        <div class="auth-bg">
            <div class="auth-card">
                <img src="https://i.ibb.co/zT82jk68/image.png" class="auth-logo">
                <div class="auth-quote">"وَمَنْ لا يُحِبُّ صُعُودَ الجِبَالِ<br>يَعِشْ أَبَدَ الدَّهْرِ بَيْنَ الحُفَرِ"</div>
                <h2 style="color:var(--navy); margin-bottom:20px;">تسجيل الدخول</h2>
                <div class="form-group"><label>رقم الموبايل</label><input type="tel" id="l-phone" placeholder="01XXXXXXXXX" maxlength="11"></div>
                <div class="form-group"><label>كلمة المرور</label><input type="password" id="l-pass" placeholder="••••••••"></div>
                <button id="login-btn-main" class="btn-primary" onclick="handleLogin()">دخول المنصة</button>
                <div style="margin-top:20px; font-size:0.9rem;"><span onclick="forgotPassword()" style="color:var(--orange); cursor:pointer; font-weight:600;">نسيت كلمة المرور؟</span></div>
                <p style="margin-top:15px;">ليس لديك حساب؟ <span onclick="showPage('signup-page')" style="color:var(--navy); cursor:pointer; font-weight:800;">سجل الآن</span></p>
            </div>
        </div>
    </div>

    <div id="signup-page" class="page">
        <div class="auth-bg">
            <div class="auth-card">
                <img src="https://i.ibb.co/zT82jk68/image.png" class="auth-logo">
                <h2 style="color:var(--navy); margin-bottom:20px;">إنشاء حساب جديد</h2>
                <div class="form-group"><label>الاسم بالكامل</label><input type="text" id="s-name" placeholder="أدخل اسمك ثلاثي"></div>
                <div class="form-group"><label>رقم موبايل الطالب</label><input type="tel" id="s-phone" placeholder="01XXXXXXXXX" maxlength="11"></div>
                <div class="form-group"><label>رقم موبايل ولي الأمر</label><input type="tel" id="s-p-phone" placeholder="01XXXXXXXXX" maxlength="11"></div>
                <div class="form-group"><label>كلمة المرور</label><input type="password" id="s-pass" placeholder="6 رموز على الأقل"></div>
                <button class="btn-primary" onclick="handleSignup()">تأكيد التسجيل</button>
                <p onclick="showPage('login-page')" style="margin-top:15px; cursor:pointer; font-size:0.85rem;">العودة لتسجيل الدخول</p>
            </div>
        </div>
    </div>

    <div id="home-page" class="page">
        <div style="padding:40px; text-align:center; background:var(--navy); color:#fff;">
            <h2>مرحباً بك في طريق التفوق</h2>
            <p style="color:var(--orange);">كل التوفيق يا بطل!</p>
        </div>
        <div id="courses-container" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:25px; padding:30px;"></div>
    </div>
</div>

<script>
const { createClient } = supabase;
const sb = createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');

// بصمة جهاز ثابتة جداً
function getDeviceId() {
    let id = localStorage.getItem('fady_device_id');
    if (!id || id === "null") {
        id = 'FADY_' + Math.random().toString(36).substr(2, 9) + Date.now();
        localStorage.setItem('fady_device_id', id);
    }
    return String(id);
}

function showToast(m) { 
    const t = document.getElementById('toast'); 
    t.innerText = m; t.style.display='block'; 
    setTimeout(()=>t.style.display='none', 3000); 
}

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('navbar').classList.toggle('visible', id === 'home-page');
}

function forgotPassword() {
    const phone = document.getElementById('l-phone').value;
    window.open(`https://wa.me/201021422744?text=أهلاً دكتور فادي، أنا الطالب صاحب الرقم ${phone || ''} ونسيت كلمة المرور.`, '_blank');
}

// ══════════════════════════════════════════
// دالة الدخول الذكية
// ══════════════════════════════════════════

async function handleLogin() {
    const phone = document.getElementById('l-phone').value.trim();
    const pass = document.getElementById('l-pass').value.trim();
    const currentDevId = getDeviceId();
    const btn = document.getElementById('login-btn-main');

    if(!phone || !pass) return showToast('برجاء إدخال البيانات');

    btn.innerText = "جاري التحقق...";
    btn.disabled = true;

    try {
        const { data: user, error } = await sb.from('students').select('*').eq('student_phone', phone).eq('password', pass).single();

        if (error || !user) { 
            showToast('البيانات غير صحيحة'); 
            btn.innerText = "دخول المنصة"; btn.disabled = false; return; 
        }

        // تحويل القيم لنصوص لضمان دقة المقارنة
        const dbDevId = user.last_device_id ? String(user.last_device_id) : "";
        
        // لو الخانة مش فاضية + مش نفس الجهاز الحالي = ارفض
        if (dbDevId !== "" && dbDevId !== "null" && dbDevId !== currentDevId) {
            alert('🚫 الحساب مفتوح على جهاز آخر. إذا قمت بالخروج، انتظر دقيقة وجرب مرة أخرى.');
            btn.innerText = "دخول المنصة"; btn.disabled = false; return;
        }

        // تحديث البصمة في السيرفر
        await sb.from('students').update({ last_device_id: currentDevId }).eq('id', user.id);
        
        sessionStorage.setItem('fady_student_id', user.id);
        startSession(user);
    } catch (e) {
        showToast("خطأ في الاتصال");
        btn.innerText = "دخول المنصة"; btn.disabled = false;
    }
}

async function handleLogout() {
    const id = sessionStorage.getItem('fady_student_id');
    const btn = document.getElementById('logout-btn');
    
    if (id) {
        btn.innerText = "جاري التحرير...";
        btn.disabled = true;
        
        // تصفير حقيقي والانتظار
        const { error } = await sb.from('students').update({ last_device_id: null }).eq('id', id);
        
        if (error) {
            alert("فشل التحرير، تأكد من الإنترنت.");
            btn.innerText = "خروج"; btn.disabled = false; return;
        }
    }
    
    sessionStorage.removeItem('fady_student_id');
    location.reload();
}

async function handleSignup() {
    const name = document.getElementById('s-name').value.trim();
    const phone = document.getElementById('s-phone').value.trim();
    const pPhone = document.getElementById('s-p-phone').value.trim();
    const pass = document.getElementById('s-pass').value.trim();
    const devId = getDeviceId();

    if (!name || phone.length < 11 || pass.length < 6) return showToast('بيانات ناقصة');

    const { data, error } = await sb.from('students').insert([{
        full_name: name, student_phone: phone, parent_phone: pPhone,
        password: pass, role: 'student', last_device_id: devId
    }]).select().single();

    if (error) return showToast("الرقم مسجل مسبقاً");

    sessionStorage.setItem('fady_student_id', data.id);
    startSession(data);
}

function startSession(user) {
    document.getElementById('nav-student-name').innerText = user.full_name;
    const wmText = `${user.full_name} - ${user.student_phone} `;
    document.getElementById('wm-text').innerText = Array(150).fill(wmText).join('   ');
    document.getElementById('watermark').classList.add('active');
    showPage('home-page');
    loadCourses();
}

async function loadCourses() {
    const { data } = await sb.from('courses').select('*');
    const container = document.getElementById('courses-container');
    container.innerHTML = '';
    if(data) {
        data.forEach(c => {
            container.innerHTML += `
                <div style="background:#fff; border-radius:15px; overflow:hidden; box-shadow:var(--shadow);">
                    <img src="${c.image_url || 'https://i.ibb.co/zT82jk68/image.png'}" style="width:100%; height:180px; object-fit:cover;">
                    <div style="padding:15px;">
                        <h3 style="margin:0; font-size:1rem; color:var(--navy);">${c.title}</h3>
                        <p style="color:var(--orange); font-weight:800; margin-top:8px;">${c.price} ج.م</p>
                    </div>
                </div>`;
        });
    }
}

document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
    if(e.key === 'PrintScreen' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
        e.preventDefault();
        const ov = document.getElementById('capture-overlay');
        ov.classList.add('active');
        setTimeout(()=> ov.classList.remove('active'), 2500);
    }
});

window.onload = async () => {
    const id = sessionStorage.getItem('fady_student_id');
    if(id) {
        const { data } = await sb.from('students').select('*').eq('id', id).single();
        if(data) startSession(data);
        else sessionStorage.removeItem('fady_student_id');
    }
};
</script>
</body>
</html>
