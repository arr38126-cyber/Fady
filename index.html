<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dr: Fady Adel | Physics Platform</title>
    <link rel="icon" href="https://i.ibb.co/nMB0QD7k/fady-logo.png" type="image/png" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --navy: #0d1b2a; --gold: #c9972b; --gold-lt: #e8b84b; --gold-dk: #a87820; 
            --bg: #0a1520; --card-bg: #111e2d; --card-brd: #1e3248; --white: #f0f4f8; --gray: #6a7f96; 
        }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); min-height: 100vh; padding: 20px; color: var(--white); overflow-x: hidden; }
        body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 70% 55% at 15% 15%, rgba(201,151,43,.05) 0%, transparent 65%); z-index: -1; }

        .header { text-align: center; margin-bottom: 30px; }
        .logo-wrap { width: 90px; height: 90px; border-radius: 50%; margin: 0 auto 10px; border: 2px solid var(--gold); background: var(--navy); display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .site-title { font-size: 1.6rem; font-weight: 900; }
        .site-title span { color: var(--gold); }

        /* Auth Card */
        .auth-card { background: var(--card-bg); border: 1px solid var(--card-brd); border-radius: 20px; padding: 30px; max-width: 400px; margin: 0 auto; box-shadow: 0 20px 50px rgba(0,0,0,0.6); position: relative; }
        .auth-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--gold); }
        .tabs { display: flex; background: rgba(255,255,255,.05); border-radius: 12px; padding: 5px; margin-bottom: 20px; gap: 5px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--gray); cursor: pointer; font-weight: 700; border-radius: 8px; transition: .3s; font-family: 'Cairo'; }
        .tab-btn.active { background: var(--gold); color: var(--navy); }
        input { width: 100%; padding: 14px; background: #162333; border: 1px solid var(--card-brd); border-radius: 10px; color: var(--white); text-align: right; font-family: 'Cairo'; margin-bottom: 12px; }
        .gold-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--gold-dk), var(--gold), var(--gold-lt)); color: var(--navy); border: none; border-radius: 10px; font-weight: 800; cursor: pointer; transition: .3s; font-family: 'Cairo'; font-size: 1rem; }
        .gold-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(201, 151, 43, 0.4); }
        .forgot-link { display: block; text-align: center; margin-top: 15px; color: #ff6b6b; text-decoration: none; font-size: 0.9rem; font-weight: 600; cursor: pointer; }

        /* Dashboard & Quote Section */
        .dashboard { max-width: 1000px; margin: 0 auto; display: none; }
        .quote-box { 
            background: rgba(201, 151, 43, 0.1); 
            border-right: 4px solid var(--gold); 
            padding: 20px; 
            margin: 25px auto; 
            border-radius: 12px; 
            max-width: 650px; 
            text-align: center; 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }
        .quote-text { 
            font-size: 1.15rem; 
            font-weight: 700; 
            color: var(--gold-lt); 
            line-height: 1.8;
            font-family: 'Amiri', serif; /* لمسة جمالية لبيت الشعر */
        }
        
        .course-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-top: 30px; }
        .course-card { background: var(--card-bg); border: 1px solid var(--card-brd); border-radius: 18px; padding: 20px; position: relative; overflow: hidden; transition: .3s; }
        .course-card img { width: 100%; height: 160px; border-radius: 12px; object-fit: cover; margin-bottom: 15px; }
        .course-title { font-weight: 700; font-size: 1.2rem; margin-bottom: 10px; display: block; color: var(--gold-lt); }
        
        .locked-overlay { position: absolute; inset: 0; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; border-radius: 18px; }
        .lock-icon { font-size: 45px; color: var(--gold); margin-bottom: 10px; }
        .lock-text { font-weight: 700; color: var(--white); background: rgba(0,0,0,0.6); padding: 6px 18px; border-radius: 20px; font-size: 0.85rem; }

        .hidden { display: none; }
        .logout-btn { background: #ff4d4d; margin-top: 30px; max-width: 200px; color: white; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-wrap"><img src="https://i.ibb.co/nMB0QD7k/fady-logo.png" alt="Logo"></div>
        <h1 class="site-title">Dr: <span>Fady Adel</span></h1>
    </div>

    <div id="authSection" class="auth-card">
        <div class="tabs">
            <button class="tab-btn active" id="t-login" onclick="showAuth('login')">تسجيل الدخول</button>
            <button class="tab-btn" id="t-reg" onclick="showAuth('reg')">حساب جديد</button>
        </div>
        <div id="loginArea">
            <input type="tel" id="lp" placeholder="رقم الموبايل">
            <input type="password" id="lw" placeholder="كلمة المرور">
            <button class="gold-btn" onclick="doLogin()">دخول المنصة</button>
            <a onclick="goWA()" class="forgot-link">نسيت كلمة المرور؟ تواصل مع الدعم</a>
        </div>
        <div id="regArea" class="hidden">
            <input type="text" id="rn" placeholder="الاسم الثلاثي">
            <input type="tel" id="rp" placeholder="رقم الموبايل">
            <input type="tel" id="rj" placeholder="رقم ولي الأمر">
            <input type="password" id="rw" placeholder="كلمة المرور">
            <button class="gold-btn" onclick="doReg()">إنشاء حساب</button>
        </div>
    </div>

    <div id="dashboardSection" class="dashboard">
        <h2 style="text-align: center;">مرحباً بك يا <span id="userNameDisplay" style="color:var(--gold);"></span></h2>
        
        <div class="quote-box">
            <p class="quote-text">"وَمَنْ لا يُحِبُّ صُعُودَ الجِبَالِ.. يَعِشْ أَبَدَ الدَّهْرِ بَيْنَ الحُفَرِ"</p>
        </div>

        <div class="course-grid">
            <div class="course-card">
                <img src="https://images.unsplash.com/photo-1636466483764-2e04717ce08b?w=500" alt="Physics">
                <span class="course-title">منهج الفيزياء كاملاً</span>
                <button class="gold-btn">فتح المحتوى</button>
            </div>
            <div class="course-card">
                <div class="locked-overlay">
                    <div class="lock-icon">🔒</div>
                    <div class="lock-text">اشترك لفتح المراجعة</div>
                </div>
                <img src="https://images.unsplash.com/photo-1532094349884-543bc11b234d?w=500" alt="Revision">
                <span class="course-title">المراجعات النهائية</span>
                <button class="gold-btn" disabled>مغلق</button>
            </div>
        </div>
        <center><button class="gold-btn logout-btn" onclick="logout()">تسجيل الخروج</button></center>
    </div>

    <script>
        const _supabase = supabase.createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');

        window.onload = function() {
            const saved = localStorage.getItem('physics_user');
            if (saved) { launch(JSON.parse(saved).full_name); }
        };

        function showAuth(v) {
            const isL = v === 'login';
            document.getElementById('loginArea').classList.toggle('hidden', !isL);
            document.getElementById('regArea').classList.toggle('hidden', isL);
            document.getElementById('t-login').classList.toggle('active', isL);
            document.getElementById('t-reg').classList.toggle('active', !isL);
        }

        async function doReg() {
            const d = { full_name: document.getElementById('rn').value, student_phone: document.getElementById('rp').value, parent_phone: document.getElementById('rj').value, password: document.getElementById('rw').value, is_logged_in: false };
            if(!d.full_name || !d.student_phone || !d.password) return alert("أكمل بياناتك");
            const { error } = await _supabase.from('students').insert([d]);
            if(error) alert("حدث خطأ في التسجيل");
            else { alert("تم الاشتراك بنجاح! سجل دخولك الآن."); showAuth('login'); }
        }

        async function doLogin() {
            const p = document.getElementById('lp').value, w = document.getElementById('lw').value;
            const { data, error } = await _supabase.from('students').select('*').eq('student_phone', p).eq('password', w).maybeSingle();
            if(error || !data) alert("الرقم أو كلمة المرور غير صحيحة");
            else {
                localStorage.setItem('physics_user', JSON.stringify({ full_name: data.full_name }));
                launch(data.full_name);
            }
        }

        function launch(name) {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'block';
            document.getElementById('userNameDisplay').innerText = name;
        }

        function logout() { localStorage.removeItem('physics_user'); location.reload(); }

        function goWA() {
            const m = encodeURIComponent("أحتاج مساعدة في استعادة بيانات الدخول الخاصة بي للمنصة.");
            window.open(`https://wa.me/201021422744?text=${m}`, '_blank');
        }
    </script>
</body>
</html>
