<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة Dr. Fady Adel | فيزياء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --navy: #1B2347; --orange: #E8581A; --bg: #F0F2F5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; user-select: none; }

        /* الحماية */
        #watermark { display: none; position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.08; overflow: hidden; }
        #watermark.active { display: block; }
        #wm-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); white-space: nowrap; font-weight: 900; color: var(--navy); }

        /* الهيدر */
        nav { display: none; background: var(--navy); padding: 12px 20px; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; color: #fff; }
        nav.visible { display: flex; }

        /* منطقة الفيديو */
        .video-container-wrapper { position: relative; width: 100%; max-width: 900px; margin: 0 auto; background: #000; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .video-wrap { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* الدرع الشفاف - تحت الأزرار وفوق الفيديو */
        .yt-full-shield { position: absolute; inset: 0; z-index: 80; cursor: default; background: transparent; }

        /* شريط التحكم - فوق كل شيء */
        .custom-controls { position: relative; z-index: 9999; background: var(--navy); padding: 15px; display: flex; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap; border-top: 2px solid var(--orange); }
        .ctrl-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 1.5rem; transition: 0.2s; }
        .ctrl-btn:hover { color: var(--orange); transform: scale(1.1); }
        .speed-select { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #fff; border-radius: 8px; padding: 5px; font-family: 'Cairo'; }

        /* التنسيقات العامة */
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .page { display: none; }
        .page.active { display: block; }
        .course-card { background: #fff; border-radius: 20px; overflow: hidden; margin-bottom: 20px; position: relative; }
        .btn-main { width: 90%; padding: 12px; background: var(--orange); color:#fff; border:none; border-radius:12px; cursor:pointer; font-weight:800; display:block; margin: 10px auto; }
        .content-item { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-right: 5px solid var(--orange); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }

        /* وضع ملء الشاشة */
        #video-container-wrapper:fullscreen { width: 100%; height: 100%; max-width: none; border-radius: 0; }
        #video-container-wrapper:fullscreen .custom-controls { position: fixed; bottom: 0; left: 0; width: 100%; border-radius: 0; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="watermark"><div id="wm-text"></div></div>

<nav id="navbar">
    <div style="display:flex; align-items:center; gap:10px;"><img src="https://i.ibb.co/zT82jk68/image.png" width="40" style="border-radius:50%"><span id="nav-user-name">..</span></div>
    <button onclick="handleLogout()" style="background:none; border:1px solid #fff; color:#fff; padding:5px 10px; border-radius:8px;">خروج</button>
</nav>

<div id="app">
    <div id="login-page" class="page active">
        <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--navy);">
            <div style="background:#fff; padding:30px; border-radius:25px; width:90%; max-width:400px; text-align:center;">
                <img src="https://i.ibb.co/zT82jk68/image.png" width="80" style="border-radius:50%; margin-bottom:20px;">
                <h3>تسجيل الدخول</h3>
                <input type="tel" id="l-phone" placeholder="رقم الموبايل" style="width:100%; padding:12px; margin-bottom:10px; border-radius:12px; border:1px solid #ccc; text-align:center;">
                <input type="password" id="l-pass" placeholder="كلمة المرور" style="width:100%; padding:12px; margin-bottom:15px; border-radius:12px; border:1px solid #ccc; text-align:center;">
                <button class="btn-main" onclick="handleLogin()">دخول</button>
            </div>
        </div>
    </div>

    <div id="home-page" class="page">
        <div class="container">
            <h2 style="text-align:right; border-right: 5px solid var(--orange); padding-right: 10px;">كورساتي المتاحة</h2>
            <div id="courses-container"></div>
        </div>
    </div>

    <div id="content-page" class="page">
        <div class="container">
            <button onclick="showPage('home-page')" style="margin-bottom:15px; border:none; background:none; color:var(--orange); font-weight:bold; cursor:pointer;">← العودة للكورسات</button>
            
            <div id="video-container-wrapper" style="display:none;">
                <div class="video-wrap">
                    <div class="yt-full-shield"></div>
                    <div id="player"></div>
                </div>
                <div class="custom-controls">
                    <button class="ctrl-btn" onclick="seekVideo(-10)"><i class="fas fa-backward"></i></button>
                    <button class="ctrl-btn" id="play-pause-btn" onclick="togglePlay()"><i class="fas fa-play"></i></button>
                    <button class="ctrl-btn" onclick="seekVideo(10)"><i class="fas fa-forward"></i></button>
                    <button class="ctrl-btn" onclick="toggleFullscreen()"><i class="fas fa-expand"></i></button>
                    <select class="speed-select" onchange="changeSpeed(this.value)">
                        <option value="1">1x</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2x</option>
                    </select>
                </div>
            </div>
            <div id="lessons-list" style="margin-top:20px;"></div>
        </div>
    </div>
</div>

<script>
    const { createClient } = supabase;
    const sb = createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');
    let player;

    function playVideo(urlOrId) {
        let vId = urlOrId.includes('v=') ? urlOrId.split('v=')[1].split('&')[0] : (urlOrId.includes('be/') ? urlOrId.split('be/')[1] : urlOrId);
        document.getElementById('video-container-wrapper').style.display = 'block';
        window.scrollTo({top:0, behavior:'smooth'});

        if (player) { try { player.destroy(); } catch(e){} }
        
        player = new YT.Player('player', {
            height: '100%', width: '100%', videoId: vId,
            playerVars: { 
                'autoplay': 1, 
                'controls': 0, 
                'modestbranding': 1, 
                'rel': 0, 
                'disablekb': 1,
                'mute': 1 // الحل السحري: شغل صامت عشان المتصفح يوافق فوراً
            },
            events: {
                'onReady': (e) => { 
                    e.target.playVideo(); 
                    // بعد ثانية واحدة نلغي الكتم عشان الطالب يسمع
                    setTimeout(() => { if(player) player.unMute(); }, 1000);
                },
                'onStateChange': (e) => {
                    const btn = document.getElementById('play-pause-btn');
                    btn.innerHTML = (e.data == 1) ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
                }
            }
        });
    }

    function togglePlay() { 
        if(!player) return;
        const state = player.getPlayerState();
        if(state == 1) player.pauseVideo(); else player.playVideo();
    }
    function seekVideo(s) { if(player) player.seekTo(player.getCurrentTime() + s, true); }
    function changeSpeed(v) { if(player) player.setPlaybackRate(parseFloat(v)); }
    
    function toggleFullscreen() {
        let elem = document.getElementById('video-container-wrapper');
        if (!document.fullscreenElement) {
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    async function handleLogin() {
        const phone = document.getElementById('l-phone').value.trim();
        const pass = document.getElementById('l-pass').value.trim();
        const { data: user } = await sb.from('students').select('*').eq('student_phone', phone).eq('password', pass).single();
        if (user) { localStorage.setItem('fady_session', user.id); localStorage.setItem('fady_phone', user.student_phone); startSession(user); }
        else alert("بيانات خاطئة");
    }

    function startSession(user) {
        document.getElementById('nav-user-name').innerText = user.full_name;
        document.getElementById('wm-text').innerText = Array(40).fill(`${user.full_name} | ${user.student_phone} `).join('   ');
        document.getElementById('watermark').classList.add('active');
        showPage('home-page'); loadCourses();
    }

    async function loadCourses() {
        const { data: courses } = await sb.from('courses').select('*');
        document.getElementById('courses-container').innerHTML = courses.map(c => {
            const isFree = parseFloat(c.price) === 0;
            return `
            <div class="course-card">
                <span style="position:absolute; top:10px; left:10px; padding:5px 12px; border-radius:8px; color:#fff; font-weight:bold; background:${isFree?'#2ecc71':'#1B2347'}">${isFree?'مجاني':'مدفوع'}</span>
                <img src="${c.image_url}" style="width:100%; height:180px; object-fit:cover;">
                <div style="padding:15px; text-align:right">
                    <h3>${c.title}</h3>
                    <button class="btn-main" onclick="openCourse('${c.id}', '${c.title}', ${isFree})">دخول المحتوى</button>
                </div>
            </div>`;
        }).join('');
    }

    async function openCourse(id, title, isFree) {
        if (!isFree) {
            const { data: access } = await sb.from('student_access').select('*').eq('student_phone', localStorage.getItem('fady_phone')).eq('course_id', id).single();
            if (!access) return alert("يرجى تفعيل الكورس أولاً");
        }
        showPage('content-page');
        const { data: lessons } = await sb.from('lessons').select('*').eq('course_id', id).order('id');
        document.getElementById('lessons-list').innerHTML = lessons.map((l, i) => `
            <div class="content-item" onclick="playVideo('${l.video_id || l.youtube_url}')">
                <span><b>${i+1}.</b> ${l.title}</span> <i class="fas fa-play-circle" style="font-size:1.5rem; color:var(--orange)"></i>
            </div>`).join('');
    }

    function showPage(id) { 
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
        document.getElementById('navbar').classList.toggle('visible', id !== 'login-page'); 
    }
    
    function handleLogout() { localStorage.clear(); location.reload(); }
    
    window.onload = async () => {
        if(localStorage.getItem('fady_session')) {
            const { data: u } = await sb.from('students').select('*').eq('id', localStorage.getItem('fady_session')).single();
            if(u) startSession(u);
        }
    };
</script>
</body>
</html>
