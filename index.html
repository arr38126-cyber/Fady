<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة Dr. Fady Adel للفيزياء</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&family=Amiri:ital,wght@0,400;0,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ══════════════════════════════════════════
   VARIABLES & BRANDING
══════════════════════════════════════════ */
:root {
  --navy: #1B2347; --orange: #E8581A; --orange-lt: #F97316;
  --white: #FFFFFF; --off-white: #FFF8F3; --navy-80: rgba(27,35,71,0.8);
  --shadow: 0 4px 24px rgba(27,35,71,0.15); --radius: 16px;
}

/* ══════════════════════════════════════════
   GLOBAL STYLES
══════════════════════════════════════════ */
body { font-family: 'Cairo', sans-serif; background: var(--off-white); margin: 0; user-select: none; overflow-x: hidden; }
img { pointer-events: none; }

/* PROTECTION OVERLAYS */
#capture-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 99999; align-items: center; justify-content: center; color: #fff; text-align: center; font-size: 1.5rem; }
#capture-overlay.active { display: flex; }
#watermark { display: none; position: fixed; inset: 0; pointer-events: none; z-index: 9998; opacity: 0.12; overflow: hidden; }
#watermark.active { display: block; }

/* ══════════════════════════════════════════
   AUTH UI (Login & Signup)
══════════════════════════════════════════ */
.auth-bg { min-height: 100vh; background: linear-gradient(135deg, var(--navy) 0%, #2a3460 100%); display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; }
.auth-card { background: #fff; border-radius: 24px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); text-align: center; z-index: 2; }
.auth-logo { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--orange); margin-bottom: 15px; object-fit: cover; }
.auth-quote { font-family: 'Amiri', serif; color: var(--orange); background: rgba(232,88,26,0.1); padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 0.95rem; }
.form-group { text-align: right; margin-bottom: 15px; }
.form-group label { display: block; font-weight: 700; margin-bottom: 5px; color: var(--navy); }
.form-group input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; outline: none; font-family: 'Cairo'; transition: 0.3s; }
.form-group input:focus { border-color: var(--orange); }
.btn-primary { width: 100%; padding: 14px; background: var(--orange); color: #fff; border: none; border-radius: 10px; cursor: pointer; font-weight: 800; font-size: 1rem; transition: 0.3s; }
.btn-primary:hover { background: var(--orange-lt); transform: translateY(-2px); }

/* ══════════════════════════════════════════
   NAVBAR & CONTENT
══════════════════════════════════════════ */
#navbar { display: none; background: var(--navy); padding: 12px 25px; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
#navbar.visible { display: flex; }
.nav-logo { height: 45px; width: 45px; border-radius: 50%; border: 2px solid var(--orange); }

.page { display: none; animation: fadeUp 0.4s ease; }
.page.active { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }

.courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 30px; }
.course-card { background: #fff; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); cursor: pointer; transition: 0.3s; position: relative; }
.course-card:hover { transform: translateY(-5px); }
.course-thumb { width: 100%; height: 180px; object-fit: cover; }
.course-body { padding: 15px; }

/* TOAST */
.toast { position: fixed; top: 20px; right: 20px; background: var(--navy); color: #fff; padding: 15px 25px; border-radius: 10px; display: none; z-index: 10000; border-right: 5px solid var(--orange); }

/* ══════════════════════════════════════════
   DEVICE LOCK STYLE
══════════════════════════════════════════ */
.lock-screen { text-align: center; color: #fff; }
.lock-screen h1 { font-size: 4rem; margin: 0; }
</style>
</head>

<div id="capture-overlay">🚫<br>تصوير الشاشة محظور لحماية المحتوى</div>
<div id="watermark"><div id="wm-text" style="transform: rotate(-30deg); white-space: nowrap; font-size: 22px; line-height: 6; font-weight: bold; color: rgba(27,35,71,0.1);"></div></div>
<div id="toast" class="toast"></div>

<nav id="navbar">
    <div style="display:flex; align-items:center; gap:12px;">
        <img src="https://i.ibb.co/zT82jk68/image.png" class="nav-logo">
        <div>
            <div style="color:#fff; font-weight:700; font-size:0.9rem;">Dr. Fady Adel</div>
            <div id="nav-student-name" style="color:var(--orange); font-size:0.8rem; font-weight:600;">...</div>
        </div>
    </div>
    <button onclick="logout()" style="background:var(--orange); color:#fff; border:none; padding:7px 15px; border-radius:8px; cursor:pointer; font-weight:700;">خروج</button>

                <p style="margin-top:20px; font-size:0.9rem;">ليس لديك حساب؟ <span onclick="showPage('signup-page')" style="color:var(--orange); cursor:pointer; font-weight:700;">اضغط هنا للتسجيل</span></p>
            </div>
        </div>
    </div>

                <h2 style="margin-bottom:20px; color:var(--navy);">إنشاء حساب جديد</h2>
                <div class="form-group"><label>الاسم بالكامل</label><input type="text" id="s-name" placeholder="أدخل اسمك ثلاثي"></div>
                <div class="form-group">
