<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr: Fady Adel | Physics Platform</title>
    <link rel="icon" href="https://i.ibb.co/nMB0QD7k/fady-logo.png" type="image/png" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Amiri:wght@700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --navy: #050a0f; --card: #0d1621; --gold: #c9972b; --gold-gradient: linear-gradient(135deg, #a87820, #c9972b, #e8b84b); --white: #fff; --brd: rgba(201, 151, 43, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Cairo', sans-serif; background: var(--navy); color: var(--white); min-height: 100vh; overflow-x: hidden; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--brd); margin-bottom: 30px; }
        .user-nav { display: flex; align-items: center; gap: 10px; cursor: pointer; color: var(--gold); font-weight: 700; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 20px; }
        .auth-container { max-width: 420px; margin: 40px auto; background: var(--card); border-radius: 24px; padding: 30px; border: 1px solid var(--brd); box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; background: rgba(255,255,255,0.02); border: 1px solid var(--brd); border-radius: 12px; color: white; font-family: 'Cairo'; text-align: center; outline: none; }
        .btn-gold { padding: 12px 25px; background: var(--gold-gradient); border: none; border-radius: 12px; color: var(--navy); font-weight: 800; cursor: pointer; transition: 0.3s; font-family: 'Cairo'; width: 100%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .item-card { background: var(--card); border: 1px solid var(--brd); padding: 25px; border-radius: 20px; cursor: pointer; text-align: center; position: relative; transition: 0.3s; }
        .locked { filter: grayscale(1) opacity(0.6); }
        .locked::after { content: "🔒 مطلوب الاشتراك"; position: absolute; top: 10px; right: 10px; background: #ff4d4d; color: white; padding: 2px 10px; border-radius: 10px; font-size: 0.7rem; }
        .video-box { position: relative; width: 100%; max-width: 850px; margin: 20px auto; border-radius: 20px; overflow: hidden; border: 2px solid var(--gold); background: #000; }
        #watermark { position: absolute; z-index: 100; color: rgba(255, 255, 255, 0.15); pointer-events: none; transition: 3s linear; font-weight: bold; white-space: nowrap; }
        .page { display: none; animation: fadeIn 0.5s ease; }
        .hidden { display: none; }
        .amiri { font-family: 'Amiri', serif; line-height: 1.6; color: var(--gold); }
        .q-option { display: block; background: #1a2635; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="container">
    <nav>
        <div id="userNav" class="user-nav hidden" onclick="logout()">
            <span id="userNameDisplay">طالب</span> 👤
        </div>
        <div style="font-weight: 900; font-size: 1.3rem;">Dr: <span style="color:var(--gold)">FADY ADEL</span></div>
    </nav>

    <div id="authPage" class="auth-container">
        <img src="https://i.ibb.co/nMB0QD7k/fady-logo.png" style="width:80px; margin-bottom:20px;">
        <div id="loginForm">
            <h3>تسجيل الدخول</h3>
            <input type="tel" id="lp" placeholder="رقم الموبايل">
            <input type="password" id="lw" placeholder="كلمة المرور">
            <button class="btn-gold" onclick="doLogin()">دخول</button>






            


            <a style="display:block; margin-top:15px; color:#ff6b6b; font-size:0.8rem; cursor:pointer;" 
   onclick="window.open('https://wa.me/201000000004?text=نسيت كلمة المرور الخاصة بحسابي', '_blank')">
   نسيت كلمة المرور؟ تواصل معنا
</a>

            <p style="margin-top:15px; font-size:0.9rem;">ليس لديك حساب؟ <span style="color:var(--gold); cursor:pointer;" onclick="toggleAuth(true)">إنشاء حساب جديد</span></p>
        </div>
        <div id="registerForm" class="hidden">
            <h3>إنشاء حساب جديد</h3>
            <input type="text" id="rn" placeholder="الاسم بالكامل">
            <input type="tel" id="rp" placeholder="رقم الموبايل">
            <input type="password" id="rw" placeholder="كلمة المرور">
            <button class="btn-gold" onclick="doRegister()">تسجيل</button>
            <p style="margin-top:15px; font-size:0.9rem;">لديك حساب؟ <span style="color:var(--gold); cursor:pointer;" onclick="toggleAuth(false)">دخول</span></p>
        </div>
    </div>

    <div id="coursesPage" class="page">
        <div style="background:rgba(201,151,43,0.05); padding:20px; border-radius:15px; border:1px dashed var(--gold); text-align:center; margin-bottom:30px;">
            <p class="amiri" style="font-size:1.4rem;">"وَمَنْ لا يُحِبُّ صُعُودَ الجِبَالِ.. يَعِشْ أَبَدَ الدَّهْرِ بَيْنَ الحُفَرِ"</p>
        </div>
        <div id="coursesList" class="grid"></div>
    </div>

    <div id="lessonsPage" class="page">
        <button onclick="showPage('coursesPage')" style="color:var(--gold); background:none; border:none; cursor:pointer; margin-bottom:15px;">← العودة</button>
        <div id="lessonsList" class="grid"></div>
    </div>

    <div id="contentPage" class="page">
        <button onclick="showPage('lessonsPage')" style="color:var(--gold); background:none; border:none; cursor:pointer; margin-bottom:15px;">← العودة</button>
        <h3 id="lessonTitle" style="margin-bottom:20px;"></h3>
        <div id="videoArea" class="video-box"><div id="watermark"></div><iframe id="mainPlayer" width="100%" style="aspect-ratio:16/9;" frameborder="0" allowfullscreen></iframe></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-gold" style="background:#2ecc71;" onclick="loadExamData()">📝 ابدأ الامتحان</button>
            <button id="pdfBtn" class="btn-gold" style="background:#3498db; display:none;">📄 الملخص</button>
        </div>
    </div>

    <div id="examActivePage" class="page">
        <div id="timerDisplay" style="text-align:center; padding:10px; border-bottom:2px solid var(--gold); color:#ff4d4d; font-weight:900;"></div>
        <div id="examQuestionsBody"></div>
        <button class="btn-gold" style="margin-top:20px;" onclick="confirmSubmit()">تسليم</button>
    </div>
</div>

<script>
    const _supabase = supabase.createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');
    let currentUser = null, activeExam = [], timerInt = null, currentLessonId = null;
    let deviceId = localStorage.getItem('device_fingerprint') || (Math.random().toString(36).substring(2) + Date.now());
    localStorage.setItem('device_fingerprint', deviceId);

    window.onload = () => {
        const saved = localStorage.getItem('physics_user');
        if(saved) { currentUser = JSON.parse(saved); launchApp(); }
    };

    function showPage(id) {
        document.querySelectorAll('.page, #authPage').forEach(p => p.classList.add('hidden', 'page'));
        document.getElementById(id).style.display = 'block';
        document.getElementById(id).classList.remove('hidden');
    }

    function toggleAuth(isReg) {
        document.getElementById('loginForm').classList.toggle('hidden', isReg);
        document.getElementById('registerForm').classList.toggle('hidden', !isReg);
    }

    async function doRegister() {
        const n = document.getElementById('rn').value, p = document.getElementById('rp').value, w = document.getElementById('rw').value;
        const { error } = await _supabase.from('students').insert([{ full_name: n, student_phone: p, password: w, role: 'student', last_device_id: deviceId }]);
        if(error) alert("الرقم مسجل مسبقاً"); else { alert("تم! سجل دخولك"); toggleAuth(false); }
    }

    async function doLogin() {
        const p = document.getElementById('lp').value, w = document.getElementById('lw').value;
        const { data: user } = await _supabase.from('students').select('*').eq('student_phone', p).eq('password', w).maybeSingle();
        if(!user) return alert("خطأ في البيانات");
        if(user.role !== 'admin' && user.last_device_id && user.last_device_id !== deviceId) return alert("الحساب مفتوح على جهاز آخر");
        await _supabase.from('students').update({ last_device_id: deviceId }).eq('student_phone', p);
        currentUser = { name: user.full_name, phone: user.student_phone, role: user.role };
        localStorage.setItem('physics_user', JSON.stringify(currentUser));
        launchApp();
    }

    function launchApp() {
        document.getElementById('userNameDisplay').innerText = currentUser.name;
        document.getElementById('userNav').classList.remove('hidden');
        loadCourses();
    }

    async function loadCourses() {
        const { data: courses } = await _supabase.from('courses').select('*');
        const { data: access } = await _supabase.from('student_access').select('course_id').eq('student_phone', currentUser.phone);
        const allowedIds = access ? access.map(a => a.course_id) : [];

        let html = '';
        courses.forEach(c => {
            const isFree = !c.price || c.price === 0;
            const hasAccess = currentUser.role === 'admin' || isFree || allowedIds.includes(c.id);
            html += `<div class="item-card ${!hasAccess ? 'locked' : ''}" onclick="${!hasAccess ? `alert('سعر الكورس ${c.price} ج.م - تواصل مع الإدارة')` : `loadLessons('${c.id}')`}">
                <div style="font-size:2.5rem;">${isFree ? '🔓' : '📂'}</div>
                <h3>${c.title}</h3>
                <p style="color:var(--gold); font-size:0.9rem;">${isFree ? 'محتوى مجاني ✨' : `السعر: ${c.price} ج.م`}</p>
            </div>`;
        });
        document.getElementById('coursesList').innerHTML = html;
        showPage('coursesPage');
    }

    async function loadLessons(cId) {
        const { data } = await _supabase.from('lessons').select('*').eq('course_id', cId);
        document.getElementById('lessonsList').innerHTML = data.map(l => `<div class="item-card" onclick="viewLesson('${l.id}')"><h4>${l.title}</h4></div>`).join('');
        showPage('lessonsPage');
    }

    async function viewLesson(id) {
        currentLessonId = id;
        const { data } = await _supabase.from('lessons').select('*').eq('id', id).single();
        document.getElementById('lessonTitle').innerText = data.title;
        document.getElementById('mainPlayer').src = `https://www.youtube.com/embed/${data.video_id}?rel=0`;
        if(data.pdf_url) { document.getElementById('pdfBtn').style.display='block'; document.getElementById('pdfBtn').onclick=()=>window.open(data.pdf_url); }
        startWatermark(); showPage('contentPage');
    }

    function startWatermark() {
        const m = document.getElementById('watermark');
        m.innerText = `${currentUser.name} - ${currentUser.phone}`;
        if(window.wInt) clearInterval(window.wInt);
        window.wInt = setInterval(() => { m.style.left = Math.random()*70+'%'; m.style.top = Math.random()*70+'%'; }, 4000);
    }

    async function loadExamData() {
        const { data: exam } = await _supabase.from('exams').select('*').eq('lesson_id', currentLessonId).maybeSingle();
        if(!exam) return alert("لا يوجد امتحان");
        activeExam = exam.questions.sort(() => Math.random() - 0.5);
        renderExam(exam.duration_minutes);
    }

    function renderExam(m) {
        let h = '';
        activeExam.forEach((q, i) => {
            h += `<div style="margin-bottom:20px; padding:15px; background:rgba(255,255,255,0.02); border-radius:10px;">
                <p>س${i+1}: ${q.q}</p>
                ${q.img ? `<img src="${q.img}" style="width:100%; border-radius:10px; margin:10px 0;">` : ''}
                ${q.options.map((o, oi) => `<label class="q-option"><input type="radio" name="q${i}" value="${oi}"> ${o}</label>`).join('')}
            </div>`;
        });
        document.getElementById('examQuestionsBody').innerHTML = h;
        showPage('examActivePage');
        let sec = m * 60;
        timerInt = setInterval(() => {
            let mm = Math.floor(sec/60), ss = sec%60;
            document.getElementById('timerDisplay').innerText = `الوقت: ${mm}:${ss<10?'0':''}${ss}`;
            if(sec-- <= 0) confirmSubmit();
        }, 1000);
    }

    async function confirmSubmit() {
        clearInterval(timerInt);
        let score = 0, results = [];
        activeExam.forEach((q, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            const ans = sel ? parseInt(sel.value) : null;
            if(ans === q.correct) score++;
            results.push({ q: q.q, sel: sel ? q.options[ans] : "لم يحل", cor: q.options[q.correct], ok: ans === q.correct });
        });
        await _supabase.from('exam_results').insert([{ student_phone: currentUser.phone, score, total: activeExam.length }]);
        let resH = `<h2 style="text-align:center; color:var(--gold);">النتيجة: ${score} / ${activeExam.length}</h2><br>`;
        results.forEach(r => { resH += `<div style="border-right:4px solid ${r.ok?'#2ecc71':'#ff4d4d'}; padding:10px; background:#1a2635; margin-bottom:5px;"><p>${r.q}</p><small style="color:${r.ok?'#2ecc71':'#ff4d4d'}">إجابتك: ${r.sel}</small>${!r.ok?`<br><small style="color:#2ecc71">الصح: ${r.cor}</small>`:''}</div>`; });
        document.getElementById('examActivePage').innerHTML = resH + `<button class="btn-gold" onclick="location.reload()">العودة</button>`;
    }

    function logout() {
        _supabase.from('students').update({ last_device_id: null }).eq('student_phone', currentUser.phone).then(() => {
            localStorage.removeItem('physics_user'); location.reload();
        });
    }
</script>
</body>
</html>
