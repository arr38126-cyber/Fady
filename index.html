<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dr: Fady Adel | Physics Platform</title>
    <link rel="icon" href="https://i.ibb.co/nMB0QD7k/fady-logo.png" type="image/png" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Amiri:wght@700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --navy-dark: #050a0f; --navy-card: #0d1621; --gold: #c9972b;
            --gold-gradient: linear-gradient(135deg, #a87820, #c9972b, #e8b84b);
            --white: #ffffff; --text-gray: #a0aec0; --brd: rgba(201, 151, 43, 0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Cairo', sans-serif; background: var(--navy-dark); color: var(--white); overflow-x: hidden; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        /* Navbar */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--brd); margin-bottom: 30px; }
        .user-trigger { display: flex; align-items: center; gap: 10px; cursor: pointer; color: var(--gold); font-weight: 700; transition: 0.3s; }
        .user-trigger:hover { opacity: 0.8; }
        .platform-name { font-weight: 900; font-size: 1.2rem; }

        /* الستارة الجانبية (Side Menu) */
        .side-menu { position: fixed; top: 0; right: -350px; width: 320px; height: 100%; background: var(--navy-card); border-left: 2px solid var(--gold); z-index: 1000; transition: 0.4s; padding: 30px; box-shadow: -10px 0 30px rgba(0,0,0,0.8); overflow-y: auto; }
        .side-menu.active { right: 0; }
        .close-menu { color: red; font-weight: 900; cursor: pointer; margin-bottom: 20px; display: block; text-align: left; }
        .menu-item { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--brd); }
        .menu-item label { color: var(--gold); font-size: 0.8rem; display: block; margin-bottom: 5px; }

        /* Auth Card */
        .auth-container { max-width: 450px; margin: 50px auto; background: var(--navy-card); border-radius: 24px; padding: 40px; border: 1px solid var(--brd); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; background: rgba(255,255,255,0.03); padding: 5px; border-radius: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-gray); cursor: pointer; font-weight: 700; border-radius: 10px; transition: 0.3s; font-family: 'Cairo'; }
        .tab-btn.active { background: var(--gold-gradient); color: var(--navy-dark); }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.02); border: 1px solid var(--brd); border-radius: 12px; color: white; font-family: 'Cairo'; outline: none; }

        /* Video & Protection */
        .video-box { position: relative; width: 100%; max-width: 850px; margin: 20px auto; border-radius: 20px; overflow: hidden; border: 2px solid var(--gold); background: #000; }
        .shield { position: absolute; z-index: 10; background: transparent; }
        #watermark { position: absolute; z-index: 100; color: rgba(255, 255, 255, 0.2); font-size: 14px; pointer-events: none; white-space: nowrap; transition: 3s; font-weight: bold; }
        iframe { width: 100%; aspect-ratio: 16/9; border: none; }

        /* Buttons & Utility */
        .btn-gold { padding: 12px 25px; background: var(--gold-gradient); border: none; border-radius: 10px; color: var(--navy-dark); font-weight: 800; cursor: pointer; transition: 0.3s; font-family: 'Cairo'; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(201,151,43,0.3); }
        .page { display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="sideMenu" class="side-menu">
        <span class="close-menu" onclick="toggleMenu()">إغلاق ✕</span>
        <h3 style="color:var(--gold); margin-bottom:20px;">ملف الطالب</h3>
        <div class="menu-item">
            <label>الاسم بالكامل</label>
            <p id="menuName">--</p>
        </div>
        <div id="menuContent">
            </div>
        <button class="btn-gold" style="background:red; color:white; width:100%;" onclick="logout()">تسجيل الخروج</button>
    </div>

    <div class="container">
        <nav>
            <div id="userInfo" class="user-trigger hidden" onclick="toggleMenu()">
                <span id="navStudentName">جاري التحميل...</span>
                <span style="font-size: 1.2rem;">👤</span>
            </div>
            <div class="platform-name">Dr: <span style="color:var(--gold)">Fady Adel</span></div>
        </nav>

        <div id="authSection" class="auth-container">
            <div class="tabs">
                <button class="tab-btn active" onclick="showAuth('login')">دخول</button>
                <button class="tab-btn" onclick="showAuth('reg')">حساب جديد</button>
            </div>
            <div id="loginArea">
                <input type="tel" id="lp" placeholder="رقم الموبايل">
                <input type="password" id="lw" placeholder="كلمة المرور">
                <button class="btn-gold" style="width:100%" onclick="doLogin()">دخول المنصة</button>
            </div>
            <div id="regArea" class="hidden">
                <input type="text" id="rn" placeholder="الاسم الثلاثي">
                <input type="tel" id="rp" placeholder="رقم الموبايل">
                <input type="password" id="rw" placeholder="كلمة المرور">
                <button class="btn-gold" style="width:100%" onclick="doReg()">إنشاء حساب</button>
            </div>
        </div>

        <div id="studentPage" class="page">
            <div style="background:rgba(201,151,43,0.05); padding:20px; border-radius:15px; border:1px dashed var(--gold); text-align:center; margin-bottom:30px;">
                <p class="amiri" style="font-size:1.4rem; color:var(--gold)">"وَمَنْ لا يُحِبُّ صُعُودَ الجِبَالِ.. يَعِشْ أَبَدَ الدَّهْرِ بَيْنَ الحُفَرِ"</p>
            </div>
            <h3>المحاضرات المتاحة</h3>
            <div style="background:var(--navy-card); padding:20px; border-radius:15px; margin-top:15px; cursor:pointer; border:1px solid var(--brd);" onclick="openVideo('VIDEO_ID')">
                <p>🎥 المحاضرة 1: أساسيات الكهربية</p>
            </div>
        </div>

        <div id="videoPage" class="page">
            <div class="video-box">
                <div class="shield" style="top:0; width:100%; height:60px;"></div>
                <div class="shield" style="bottom:0; right:0; width:100px; height:50px;"></div>
                <div id="watermark"></div>
                <iframe id="mainPlayer" src="" allowfullscreen></iframe>
            </div>
            <center><button class="btn-gold" style="margin-top:20px" onclick="closeVideo()">العودة للرئيسية</button></center>
        </div>

        <div id="adminPage" class="page">
            <h2 style="color:var(--gold)">لوحة تحكم الأدمن 🛡️</h2>
            <div style="background:var(--navy-card); padding:25px; border-radius:20px; margin-top:20px; border:1px solid var(--gold);">
                <h4>إضافة درجة طالب</h4>
                <input type="tel" id="admPhone" placeholder="رقم موبايل الطالب" style="margin-top:10px;">
                <input type="text" id="admExam" placeholder="اسم الامتحان">
                <input type="text" id="admGrade" placeholder="الدرجة (مثال: 25/30)">
                <button class="btn-gold" style="width:100%" onclick="saveGrade()">حفظ البيانات</button>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');

        // الحماية
        document.onkeydown = (e) => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) return false; };

        window.onload = () => {
            const u = JSON.parse(localStorage.getItem('physics_user'));
            if(u) {
                if(u.role === 'admin') showAdmin();
                else launchStudent(u);
            }
        };

        function showAuth(v) {
            const isL = v === 'login';
            document.getElementById('loginArea').classList.toggle('hidden', !isL);
            document.getElementById('regArea').classList.toggle('hidden', isL);
        }

        async function doLogin() {
            const p = document.getElementById('lp').value, w = document.getElementById('lw').value;
            // تسجيل دخول الأدمن يدوياً (مؤقت)
            if(p === '01021422744' && w === 'admin123') return showAdmin();

            const { data } = await _supabase.from('students').select('*').eq('student_phone', p).eq('password', w).maybeSingle();
            if(data) {
                const user = { name: data.full_name, phone: data.student_phone, role: 'student' };
                localStorage.setItem('physics_user', JSON.stringify(user));
                launchStudent(user);
            } else alert("بيانات خاطئة");
        }

        function launchStudent(u) {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('studentPage').style.display = 'block';
            document.getElementById('userInfo').classList.remove('hidden');
            document.getElementById('navStudentName').innerText = u.name;
            document.getElementById('menuName').innerText = u.name;
            loadStudentData(u.phone);
        }

        async function loadStudentData(phone) {
            const { data: grades } = await _supabase.from('grades').select('*').eq('student_phone', phone);
            let html = '<label>درجات الامتحانات</label>';
            if(grades && grades.length > 0) {
                grades.forEach(g => html += `<p style="font-size:0.9rem; margin-bottom:5px;">• ${g.exam_name}: <span style="color:var(--gold)">${g.score}</span></p>`);
            } else html += '<p>لا توجد درجات مسجلة بعد</p>';
            document.getElementById('menuContent').innerHTML = html;
        }

        function showAdmin() {
            localStorage.setItem('physics_user', JSON.stringify({ role: 'admin' }));
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('adminPage').style.display = 'block';
        }

        async function saveGrade() {
            const p = document.getElementById('admPhone').value, e = document.getElementById('admExam').value, g = document.getElementById('admGrade').value;
            const { error } = await _supabase.from('grades').insert([{ student_phone: p, exam_name: e, score: g }]);
            if(!error) alert("تم الحفظ!"); else alert("خطأ في البيانات");
        }

        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }

        function openVideo(id) {
            const u = JSON.parse(localStorage.getItem('physics_user'));
            document.getElementById('studentPage').style.display = 'none';
            document.getElementById('videoPage').style.display = 'block';
            document.getElementById('mainPlayer').src = `https://www.youtube.com/embed/${id}?rel=0&modestbranding=1`;
            
            const mark = document.getElementById('watermark');
            mark.innerText = `${u.name} - ${u.phone}`;
            setInterval(() => {
                mark.style.left = Math.random() * 70 + '%';
                mark.style.top = Math.random() * 70 + '%';
            }, 3000);
        }

        function closeVideo() { location.reload(); }
        function logout() { localStorage.removeItem('physics_user'); location.reload(); }
    </script>
</body>
</html>
