<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr: Fady Adel | Physics Platform</title>
    <link rel="icon" href="https://i.ibb.co/nMB0QD7k/fady-logo.png" type="image/png" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Amiri:wght@700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --navy: #050a0f; --card: #0d1621; --gold: #c9972b; --gold-gradient: linear-gradient(135deg, #a87820, #c9972b, #e8b84b); --white: #fff; --brd: rgba(201, 151, 43, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Cairo', sans-serif; background: var(--navy); color: var(--white); min-height: 100vh; overflow-x: hidden; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--brd); margin-bottom: 30px; }
        .user-nav { display: flex; align-items: center; gap: 10px; cursor: pointer; color: var(--gold); font-weight: 700; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 20px; }
        .auth-container { max-width: 420px; margin: 40px auto; background: var(--card); border-radius: 24px; padding: 30px; border: 1px solid var(--brd); box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center; }
        .brand-logo-mid { width: 80px; height: 80px; margin: 0 auto 20px; border-radius: 50%; border: 2px solid var(--gold); }
        input[type="tel"], input[type="password"], input[type="text"] { width: 100%; padding: 14px; margin-bottom: 12px; background: rgba(255,255,255,0.02); border: 1px solid var(--brd); border-radius: 12px; color: white; font-family: 'Cairo'; text-align: center; outline: none; }
        .btn-gold { padding: 12px 25px; background: var(--gold-gradient); border: none; border-radius: 12px; color: var(--navy); font-weight: 800; cursor: pointer; transition: 0.3s; font-family: 'Cairo'; width: 100%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        
        /* خاصية اللوح الزجاجي للكورسات المقفولة */
        .item-card { background: var(--card); border: 1px solid var(--brd); padding: 25px; border-radius: 20px; cursor: pointer; transition: 0.3s; text-align: center; position: relative; overflow: hidden; }
        .locked { filter: grayscale(1) opacity(0.6); cursor: not-allowed; }
        .locked::after { content: "🔒 غير مشترك"; position: absolute; top: 10px; right: 10px; background: #ff4d4d; color: white; padding: 2px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; }
        
        .video-box { position: relative; width: 100%; max-width: 850px; margin: 20px auto; border-radius: 20px; overflow: hidden; border: 2px solid var(--gold); background: #000; }
        #watermark { position: absolute; z-index: 100; color: rgba(255, 255, 255, 0.15); font-size: 14px; pointer-events: none; white-space: nowrap; transition: 3s linear; font-weight: bold; }
        .page { display: none; animation: fadeIn 0.5s ease; }
        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .amiri { font-family: 'Amiri', serif; line-height: 1.6; color: var(--gold); }
        .q-option { display: block; background: #1a2635; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; cursor: pointer; transition: 0.2s; }
        .q-option:hover { border-color: var(--gold); }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="container">
    <nav>
        <div id="userNav" class="user-nav hidden" onclick="logout()">
            <span id="userNameDisplay">طالب</span> 👤
        </div>
        <div style="font-weight: 900; font-size: 1.3rem;">Dr: <span style="color:var(--gold)">FADY ADEL</span></div>
    </nav>

    <div id="authPage" class="auth-container">
        <img src="https://i.ibb.co/nMB0QD7k/fady-logo.png" class="brand-logo-mid">
        <h3 style="margin-bottom:20px;">تسجيل دخول الطالب</h3>
        <input type="tel" id="lp" placeholder="رقم الموبايل">
        <input type="password" id="lw" placeholder="كلمة المرور">
        <button class="btn-gold" onclick="doLogin()">دخول المنصة</button>
        <a style="display:block; margin-top:15px; color:#ff6b6b; font-size:0.8rem; cursor:pointer;" onclick="window.open('https://wa.me/201021422744?text=نسيت كلمة المرور', '_blank')">نسيت كلمة المرور؟ تواصل معنا</a>
    </div>

    <div id="coursesPage" class="page">
        <div style="background:rgba(201,151,43,0.05); padding:20px; border-radius:15px; border:1px dashed var(--gold); text-align:center; margin-bottom:30px;">
            <p class="amiri" style="font-size:1.4rem;">"وَمَنْ لا يُحِبُّ صُعُودَ الجِبَالِ.. يَعِشْ أَبَدَ الدَّهْرِ بَيْنَ الحُفَرِ"</p>
        </div>
        <h2 style="margin-bottom:20px; border-right: 4px solid var(--gold); padding-right:15px;">الكورسات المتاحة 📚</h2>
        <div id="coursesList" class="grid"></div>
    </div>

    <div id="lessonsPage" class="page">
        <button onclick="showPage('coursesPage')" style="background:none; color:var(--gold); border:none; cursor:pointer; margin-bottom:15px;">← العودة للكورسات</button>
        <h2 id="currentCourseTitle" style="color:var(--gold)"></h2>
        <div id="lessonsList" class="grid"></div>
    </div>

    <div id="contentPage" class="page">
        <button onclick="showPage('lessonsPage')" style="background:none; color:var(--gold); border:none; cursor:pointer; margin-bottom:15px;">← العودة للمحاضرات</button>
        <h3 id="lessonTitle" style="margin-bottom:20px;"></h3>
        <div id="videoArea" class="video-box">
            <div id="watermark"></div>
            <iframe id="mainPlayer" width="100%" style="aspect-ratio:16/9;" src="" frameborder="0" allowfullscreen></iframe>
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-gold" style="background:#2ecc71; color:white;" onclick="loadExamData()">📝 ابدأ الامتحان الإلكتروني</button>
            <button id="pdfBtn" class="btn-gold" style="background:#3498db; color:white; display:none;">📄 تحميل الملخص</button>
        </div>
    </div>

    <div id="examActivePage" class="page">
        <div style="display:flex; justify-content:space-between; position:sticky; top:0; background:var(--navy); padding:10px; z-index:100; border-bottom:2px solid var(--gold);">
            <span id="timerDisplay" style="font-weight:900; color:#ff4d4d; font-size:1.2rem;">الوقت: --:--</span>
            <span style="color:var(--gold)">امتحان المحاضرة</span>
        </div>
        <div id="examQuestionsBody" style="margin-top:20px;"></div>
        <button class="btn-gold" style="margin:40px 0;" onclick="confirmSubmit()">تسليم الامتحان</button>
    </div>
</div>

<script>
    const _supabase = supabase.createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');
    let currentUser = null, activeExam = [], timerInt = null, currentLessonId = null;

    // تشغيل تلقائي عند فتح الصفحة
    window.onload = () => {
        const saved = localStorage.getItem('physics_user');
        if(saved) { currentUser = JSON.parse(saved); launchApp(); }
    };

    function showPage(id) {
        document.querySelectorAll('.page, #authPage').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).style.display = 'block';
    }

    async function doLogin() {
        const p = document.getElementById('lp').value, w = document.getElementById('lw').value;
        const { data } = await _supabase.from('students').select('*').eq('student_phone', p).eq('password', w).maybeSingle();
        if(data) {
            currentUser = { name: data.full_name, phone: data.student_phone, role: data.role };
            localStorage.setItem('physics_user', JSON.stringify(currentUser));
            launchApp();
        } else alert("خطأ في البيانات");
    }

    async function launchApp() {
        document.getElementById('userNameDisplay').innerText = currentUser.name;
        document.getElementById('userNav').classList.remove('hidden');
        loadCourses();
    }

    async function loadCourses() {
        const { data: courses } = await _supabase.from('courses').select('*');
        const { data: access } = await _supabase.from('student_access').select('course_id').eq('student_phone', currentUser.phone);
        const allowedIds = access.map(a => a.course_id);

        let html = '';
        courses.forEach(c => {
            const isLocked = !allowedIds.includes(c.id) && currentUser.role !== 'admin';
            html += `<div class="item-card ${isLocked ? 'locked' : ''}" onclick="${isLocked ? "alert('برجاء التواصل مع التيم لتفعيل الكورس')" : `loadLessons('${c.id}', '${c.title}')`}">
                        <div style="font-size:3rem;">📂</div>
                        <h3>${c.title}</h3>
                    </div>`;
        });
        document.getElementById('coursesList').innerHTML = html;
        showPage('coursesPage');
    }

    async function loadLessons(courseId, title) {
        const { data } = await _supabase.from('lessons').select('*').eq('course_id', courseId);
        document.getElementById('currentCourseTitle').innerText = title;
        document.getElementById('lessonsList').innerHTML = data.map(l => `
            <div class="item-card" onclick="viewLesson('${l.id}')">
                <div style="font-size:2rem;">🎥</div>
                <h4>${l.title}</h4>
            </div>`).join('');
        showPage('lessonsPage');
    }

    async function viewLesson(lessonId) {
        currentLessonId = lessonId;
        const { data } = await _supabase.from('lessons').select('*').eq('id', lessonId).single();
        document.getElementById('lessonTitle').innerText = data.title;
        document.getElementById('mainPlayer').src = `https://www.youtube.com/embed/${data.video_id}?rel=0&modestbranding=1`;
        if(data.pdf_url) {
            const b = document.getElementById('pdfBtn'); b.style.display = 'block';
            b.onclick = () => window.open(data.pdf_url, '_blank');
        }
        startWatermark();
        showPage('contentPage');
    }

    function startWatermark() {
        const m = document.getElementById('watermark');
        m.innerText = `${currentUser.name} - ${currentUser.phone}`;
        setInterval(() => { m.style.left = Math.random()*70+'%'; m.style.top = Math.random()*70+'%'; }, 4000);
    }

    // --- نظام الامتحان ---
    async function loadExamData() {
        const { data: exam } = await _supabase.from('exams').select('*').eq('lesson_id', currentLessonId).maybeSingle();
        if(!exam) return alert("لا يوجد امتحان لهذه المحاضرة.");
        
        // لخبطة الأسئلة والاختيارات
        activeExam = exam.questions.map(q => {
            let opts = [...q.options];
            let correctVal = opts[q.correct];
            opts.sort(() => Math.random() - 0.5);
            return { q: q.q, img: q.img, shuffled: opts, correctIdx: opts.indexOf(correctVal) };
        }).sort(() => Math.random() - 0.5);

        renderExam(exam.duration_minutes);
    }

    function renderExam(mins) {
        let h = '';
        activeExam.forEach((q, i) => {
            h += `<div style="margin-bottom:30px; background:rgba(255,255,255,0.02); padding:15px; border-radius:15px;">
                <p><b>س${i+1}: ${q.q}</b></p>
                ${q.img ? `<img src="${q.img}" style="max-width:100%; margin:10px 0; border-radius:10px;">` : ''}
                ${q.shuffled.map((opt, oi) => `
                    <label class="q-option"><input type="radio" name="q${i}" value="${oi}"> ${opt}</label>
                `).join('')}
            </div>`;
        });
        document.getElementById('examQuestionsBody').innerHTML = h;
        showPage('examActivePage');
        startCountdown(mins);
    }

    function startCountdown(m) {
        let sec = m * 60;
        timerInt = setInterval(() => {
            let mm = Math.floor(sec/60), ss = sec%60;
            document.getElementById('timerDisplay').innerText = `الوقت: ${mm}:${ss<10?'0':''}${ss}`;
            if(sec <= 0) { clearInterval(timerInt); alert("انتهى الوقت!"); confirmSubmit(); }
            sec--;
        }, 1000);
    }

    async function confirmSubmit() {
        clearInterval(timerInt);
        let score = 0, summary = [];
        activeExam.forEach((q, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            const ansIdx = sel ? parseInt(sel.value) : null;
            if(ansIdx === q.correctIdx) score++;
            summary.push({ q: q.q, selected: ansIdx !== null ? q.shuffled[ansIdx] : "لم يحل", correct: q.shuffled[q.correctIdx], isRight: ansIdx === q.correctIdx });
        });

        await _supabase.from('exam_results').insert([{ student_phone: currentUser.phone, score: score, total: activeExam.length, student_answers: summary }]);
        
        // عرض المراجعة
        let resH = `<div style="text-align:center;"><h2 style="color:var(--gold)">نتيجة الامتحان: ${score} من ${activeExam.length}</h2><button class="btn-gold" onclick="location.reload()">العودة للمنصة</button></div><hr style="margin:20px 0; border:0.5px solid var(--gold);">`;
        summary.forEach((s, i) => {
            resH += `<div style="background:#1a2635; padding:15px; border-radius:10px; margin-bottom:10px; border-right:5px solid ${s.isRight?'#2ecc71':'#ff4d4d'}">
                <p>س${i+1}: ${s.q}</p>
                <p style="color:${s.isRight?'#2ecc71':'#ff4d4d'}">إجابتك: ${s.selected}</p>
                ${!s.isRight ? `<p style="color:#2ecc71">الصح: ${s.correct}</p>` : ''}
            </div>`;
        });
        document.getElementById('examActivePage').innerHTML = resH;
    }

    function logout() { localStorage.removeItem('physics_user'); location.reload(); }
</script>
</body>
</html>
