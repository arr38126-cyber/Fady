        :root {

        #watermark { display: none; position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.07; overflow: hidden; }

        #wm-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); white-space: nowrap; font-weight: 900; font-size: 1.2rem; line-height: 5; width: 300%; text-align: center; color: var(--navy); }

        /* ========= FLOATING WHATSAPP BUTTON ========= */
        .floating-wa {
            position: fixed;
            bottom: 25px;

            background-color: #25D366;
            color: white;
            border-radius: 50%;

        .video-player-wrapper { position: relative; background: #000; border-radius: 20px; overflow: hidden; margin-bottom: 10px; border: 2px solid var(--navy); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }

        .seek-bar-buffer { position: absolute; top: 0; left: 0; height: 100%; background: rgba(255,255,255,0.15); border-radius: 10px; }
        .controls-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; flex-wrap: nowrap; }
        .controls-left, .controls-right { display: flex; align-items: center; gap: 4px; }

    </style>

<script>

        sb = supabase.createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');
    }

    let currentCourseId, examData, timerInterval;
    let studentAnswers = {};
    let cachedExams = [];
    let cachedResults = [];

    // مشغل الفيديو
    let ytPlayer = null;
    let playerReady = false;
    let isMuted = false;
    let progressTimer = null;
    let isSeeking = false;

    function onYouTubeIframeAPIReady() {}

    function initPlayer(videoId) {
        if (ytPlayer) { try { ytPlayer.destroy(); } catch(e) {} ytPlayer = null; playerReady = false; }
        document.getElementById('seek-fill').style.width = '0%';
        document.getElementById('seek-buffer').style.width = '0%';
        document.getElementById('time-display').textContent = '0:00 / 0:00';
        setPlayIcon(false); showSpinner(true); showPlayOverlay(true);

        ytPlayer = new YT.Player('yt-player', {
            videoId: videoId,
            playerVars: { controls: 0, disablekb: 1, rel: 0, modestbranding: 1, iv_load_policy: 3, fs: 0, playsinline: 1, enablejsapi: 1 },
            events: { onReady: onPlayerReady, onStateChange: onPlayerStateChange }
        });
    }

    function onPlayerReady() { playerReady = true; showSpinner(false); clearInterval(progressTimer); progressTimer = setInterval(updateProgress, 500); }
    function onPlayerStateChange(event) {
        if (event.data === 1) { setPlayIcon(true); showPlayOverlay(false); showSpinner(false); }
        else { setPlayIcon(false); showPlayOverlay(true); }
    }

    function updateProgress() {
        if (!playerReady || isSeeking || !ytPlayer) return;
        try {
            const current = ytPlayer.getCurrentTime() || 0, duration = ytPlayer.getDuration() || 0;
            if (duration > 0) {
                document.getElementById('seek-fill').style.width = (current / duration * 100) + '%';
                document.getElementById('time-display').textContent = formatTime(current) + ' / ' + formatTime(duration);
            }
        } catch(e) {}
    }

    function formatTime(s) { s = Math.floor(s); return Math.floor(s/60) + ':' + (s%60 < 10 ? '0' : '') + (s%60); }
    function togglePlay() { if (playerReady && ytPlayer) { try { ytPlayer.getPlayerState() === 1 ? ytPlayer.pauseVideo() : ytPlayer.playVideo(); } catch(e){} } }
    function toggleMute() { if (playerReady && ytPlayer) { try { isMuted ? ytPlayer.unMute() : ytPlayer.mute(); isMuted = !isMuted; document.getElementById('mute-icon').className = isMuted ? 'fas fa-volume-mute' : 'fas fa-volume-up'; } catch(e){} } }
    function setVolume(v) { if (playerReady && ytPlayer) { try { ytPlayer.setVolume(v); } catch(e){} } }
    function setSpeed(v) { if (playerReady && ytPlayer) { try { ytPlayer.setPlaybackRate(parseFloat(v)); } catch(e){} } }
    function seekTo(e) { if (playerReady && ytPlayer) { try { const rect = document.getElementById('seek-track').getBoundingClientRect(); ytPlayer.seekTo((1 - ((e.clientX - rect.left) / rect.width)) * ytPlayer.getDuration(), true); } catch(e){} } }
    function toggleFullscreen() { const w = document.getElementById('player-wrapper'); if (!document.fullscreenElement) { if(w.requestFullscreen) w.requestFullscreen(); } else { if(document.exitFullscreen) document.exitFullscreen(); } }
    function setPlayIcon(p) { document.getElementById('play-icon').className = p ? 'fas fa-pause' : 'fas fa-play'; }
    function showSpinner(s) { document.getElementById('video-spinner').classList.toggle('active', s); }
    function showPlayOverlay(s) { document.getElementById('play-overlay').classList.toggle('hidden', !s); }
    function handleOverlayClick() { togglePlay(); }

    function getDeviceID() {
        let did = localStorage.getItem('device_fingerprint');
        if (!did) { did = 'device_' + Math.random().toString(36).substr(2, 9); localStorage.setItem('device_fingerprint', did); }
        return did;
    }

    // التنقل بين الصفحات
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('navbar').classList.toggle('visible', id !== 'login-page' && id !== 'register-page');
        document.getElementById('back-btn').style.display = (id !== 'home-page' && id !== 'login-page' && id !== 'register-page') ? 'block' : 'none';
        document.getElementById('profile-btn').style.display = (id === 'home-page') ? 'block' : 'none';
    }

    async function handleLogin() {
        if (!sb) return alert("حدث خطأ في تحميل البيانات. يرجى تحديث الصفحة والتأكد من الإنترنت.");
        const phone = document.getElementById('l-phone').value.trim();
        const pass = document.getElementById('l-pass').value.trim();
        
        if (!phone || !pass) return alert("يرجى إدخال رقم الموبايل وكلمة المرور.");

        try {
            const { data: user, error } = await sb.from('students').select('*').eq('student_phone', phone).eq('password', pass).single();
            if (error || !user) {
                alert("البيانات غير صحيحة، أو الحساب غير مسجل.");
                return;
            }
            
            const fp = getDeviceID();
            if (user.device_id && user.device_id !== fp) {
                alert("عذراً، هذا الحساب مفتوح بالفعل على جهاز آخر.");
                return;
            }
            if (!user.device_id) {
                await sb.from('students').update({ device_id: fp }).eq('id', user.id);
            }
            
            localStorage.setItem('f_id', user.id); 
            localStorage.setItem('f_p', user.student_phone); 
            start(user);
        } catch (err) {
            console.error(err);
            alert("حدث خطأ في الاتصال بالخادم.");
        }
    }

    async function handleRegister() {
        if (!sb) return alert("حدث خطأ في تحميل البيانات.");
        const name = document.getElementById('r-name').value.trim();
        const phone = document.getElementById('r-phone').value.trim();
        const parent = document.getElementById('r-parent').value.trim();
        const pass = document.getElementById('r-pass').value.trim();

        if(!name || !phone || !pass) return alert("يرجى إكمال البيانات الأساسية");

        try {
            const { data: user, error } = await sb.from('students').insert([{
                full_name: name, student_phone: phone, parent_phone: parent, password: pass, device_id: getDeviceID()
            }]).select().single();
            
            if (error) {
                if(error.code === '23505') alert("رقم الموبايل مسجل بالفعل!");
                else alert("حدث خطأ أثناء التسجيل.");
                return;
            }
            if (user) { 
                localStorage.setItem('f_id', user.id); 
                localStorage.setItem('f_p', user.student_phone); 
                start(user); 
            }
        } catch(err) {
            console.error(err);
            alert("حدث خطأ في الاتصال.");
        }
    }

    async function handleLogout() {
        if(sb && localStorage.getItem('f_id')) {
            await sb.from('students').update({ device_id: null }).eq('id', localStorage.getItem('f_id'));
        }
        localStorage.clear(); 
        location.reload();
    }

    function start(user) {
        document.getElementById('nav-user-name').innerText = user.full_name;
        document.getElementById('wm-text').innerText = Array(40).fill(`${user.full_name} | ${user.student_phone}`).join('   ');
        document.getElementById('watermark').classList.add('active');
        showPage('home-page'); 
        loadCourses();
    }

    async function loadCourses() {
        try {
            const { data: cs } = await sb.from('courses').select('*');
            document.getElementById('courses-container').innerHTML = cs.map(c => `
                <div class="course-card">
                    <img src="${c.image_url || 'https://via.placeholder.com/300x170'}" style="width:100%; height:170px; object-fit:cover;">
                    <div style="padding:15px; text-align:right;">
                        <h3 style="margin-bottom:5px;">${c.title}</h3>
                        
                        <div style="color: var(--green); font-weight: 800; font-size: 1.1rem; margin-bottom: 15px;">
                            ${parseFloat(c.price) === 0 ? 'مجاني' : 'السعر: ' + (c.price || '0') + ' جنيه'}
                        </div>
                        
                        <div style="display: flex; gap: 8px;">
                            <button class="btn-main" onclick="checkAccess('${c.id}', '${c.title}', ${parseFloat(c.price) === 0})">دخول للكورس</button>
                            
                            <a href="https://wa.me/201014169548" target="_blank" 
                               style="background: #25D366; color: white; width: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.4rem;" title="تواصل معنا">
                                <i class="fab fa-whatsapp"></i>
                            </a>
                        </div>
                    </div>
                </div>`).join('');
        } catch(e) {
            console.error(e);
        }
    }

    async function checkAccess(id, title, isFree) {
        if (!isFree) {
            const { data: a } = await sb.from('student_access').select('*').eq('student_phone', localStorage.getItem('f_p')).eq('course_id', id).single();
            if (!a) return alert("يرجى تفعيل الكورس أولاً (تواصل مع السكرتارية عن طريق أيقونة الواتساب).");
        }
        currentCourseId = id; 
        document.getElementById('current-course-title').innerText = title;
        showPage('content-page'); 
        loadLessonsTab();
    }

    async function loadLessonsTab() {
        const { data: ls } = await sb.from('lessons').select('*').eq('course_id', currentCourseId).order('id');
        if(!ls || ls.length === 0) { document.getElementById('tab-content').innerHTML = '<h3 style="text-align:center;">لا توجد محاضرات بعد</h3>'; return; }
        document.getElementById('tab-content').innerHTML = ls.map((l, i) => `
            <div style="background:#fff; padding:15px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border-right:5px solid var(--orange); cursor:pointer;" onclick="playVideo('${l.video_id}')">
                <span><b>${i+1}.</b> ${l.title}</span><i class="fas fa-play-circle" style="color:var(--orange); font-size:1.5rem;"></i>
            </div>`).join('');
    }

    function playVideo(url) {
        let id = url;
        if(url.includes('v=')) id = url.split('v=')[1].split('&')[0];
        else if(url.includes('/')) id = url.split('/').pop();
        
        document.getElementById('video-section').style.display = 'block';
        initPlayer(id); 
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function loadExamsTab() {
        const { data: ex } = await sb.from('exams').select('*').eq('course_id', currentCourseId).order('id');
        cachedExams = ex || [];
        if(cachedExams.length === 0) { document.getElementById('tab-content').innerHTML = '<h3 style="text-align:center;">لا توجد امتحانات بعد</h3>'; return; }
        
        document.getElementById('tab-content').innerHTML = cachedExams.map((e, i) => `
            <div style="background:#fff; padding:15px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border-right:5px solid var(--green); cursor:pointer;" onclick="startExamFlow(${i})">
                <span><b>${i+1}.</b> ${e.title}</span><i class="fas fa-edit" style="color:var(--green); font-size:1.5rem;"></i>
            </div>`).join('');
    }

    function startExamFlow(index) {
        const exam = cachedExams[index];
        if (!confirm(`وقت الامتحان: ${exam.duration_minutes} دقيقة. هل أنت مستعد للبدء؟`)) return;
        examData = exam; 
        studentAnswers = {}; 
        showPage('exam-page');
        document.getElementById('active-exam-title').innerText = exam.title;
        document.getElementById('exam-body').innerHTML = exam.questions.map((q, i) => `
            <div style="margin-bottom:30px; text-align:right;">
                <p><b>س ${i+1}:</b> ${q.text}</p>
                ${q.image ? `<img src="${q.image}" class="q-img">` : ''}
                ${q.options.map((o, oi) => `<button class="option-btn" id="q${i}_o${oi}" onclick="selectAnswer(${i}, ${oi+1})">${o}</button>`).join('')}
            </div>`).join('');
        startTimer(exam.duration_minutes);
    }

    function selectAnswer(qi, c) { 
        studentAnswers[qi] = c; 
        document.querySelectorAll(`[id^="q${qi}_"]`).forEach(b => b.classList.remove('selected')); 
        document.getElementById(`q${qi}_o${c-1}`).classList.add('selected'); 
    }

    function startTimer(m) {
        let s = m * 60;
        timerInterval = setInterval(() => {
            document.getElementById('timer-display').innerText = Math.floor(s/60) + ':' + (s%60 < 10 ? '0' : '') + (s%60);
            if (s-- <= 0) submitExam();
        }, 1000);
    }

    async function submitExam() {
        clearInterval(timerInterval);
        let score = 0; 
        examData.questions.forEach((q, i) => { if (studentAnswers[i] == q.correct) score++; });
        const finalScore = Math.round(score / examData.questions.length * 100);
        
        await sb.from('exam_results').insert([{ 
            student_phone: localStorage.getItem('f_p'), 
            exam_name: examData.title, 
            score: finalScore, 
            student_answers: studentAnswers 
        }]);
        
        alert(`تم تسليم الامتحان. درجتك: ${finalScore}%`); 
        showPage('home-page');
    }

    async function loadProfilePage() {
        showPage('profile-page');
        document.getElementById('p-name').innerText = document.getElementById('nav-user-name').innerText;
        document.getElementById('p-phone').innerText = localStorage.getItem('f_p');
        
        const { data: res } = await sb.from('exam_results').select('*').eq('student_phone', localStorage.getItem('f_p')).order('created_at', { ascending: false });
        cachedResults = res || [];
        
        document.getElementById('grades-list').innerHTML = cachedResults.map((r, i) => `
            <div style="background:#fff; padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                <div style="text-align:right;"><b>${r.exam_name}</b><br><small>${new Date(r.created_at).toLocaleDateString('ar-EG')}</small></div>
                <div style="font-weight:bold; color:var(--orange)">${r.score}%</div>
                <button onclick="showReview(${i})" style="background:var(--navy); color:#fff; border:none; padding:8px 12px; border-radius:10px; cursor:pointer;">مراجعة</button>
            </div>`).join('');
    }

    async function showReview(index) {
        const res = cachedResults[index];
        const { data: exam } = await sb.from('exams').select('*').eq('title', res.exam_name).single();
        if(!exam) return;
        
        document.getElementById('review-modal').style.display = 'block';
        document.getElementById('rev-title').innerText = "مراجعة: " + res.exam_name;
        document.getElementById('rev-body').innerHTML = exam.questions.map((q, i) => `
            <div style="margin-bottom:20px; text-align:right; border-bottom: 1px solid #eee; padding-bottom: 15px;">
                <p><b>س ${i+1}:</b> ${q.text}</p>
                ${q.options.map((o, oi) => {
                    let cls = ''; 
                    if (oi+1 == q.correct) cls = 'correct-ans'; 
                    else if (res.student_answers && res.student_answers[i] == oi+1) cls = 'wrong-ans';
                    return `<div class="option-btn ${cls}" style="cursor:default">${o}</div>`;
                }).join('')}
            </div>`).join('');
    }

    function closeReview() { document.getElementById('review-modal').style.display = 'none'; }

    // بدء التشغيل التلقائي إذا كان مسجل دخول
    window.addEventListener('DOMContentLoaded', async () => {
        const id = localStorage.getItem('f_id');
        if (id && sb) {
            try {
                const { data: u } = await sb.from('students').select('*').eq('id', id).single();
                if (u && (u.device_id === getDeviceID())) {
                    start(u); 
                } else {
                    localStorage.clear();
                }
            } catch(e) {
                console.error("Auto login error:", e);
            }
        }
    });
</script>
</body>
</html>
