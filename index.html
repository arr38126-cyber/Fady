<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة Dr. Fady Adel | الفيزياء</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root { --navy: #1B2347; --orange: #E8581A; --bg: #F0F2F5; --radius: 15px; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--navy); user-select: none; direction: rtl; }

/* زر الواتساب الثابت */
.whatsapp-float {
    position: fixed;
    bottom: 25px;
    left: 25px;
    background-color: #25d366;
    color: #FFF;
    border-radius: 50px;
    text-align: center;
    font-size: 30px;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
    z-index: 10000;
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: transform 0.3s ease;
}
.whatsapp-float:hover { transform: scale(1.1); color: #fff; }

/* Watermark */
#watermark { display: none; position: fixed; inset: 0; pointer-events: none; z-index: 9998; opacity: 0.07; overflow: hidden; }
#watermark.active { display: block; }
#watermark-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); white-space: nowrap; font-weight: 900; font-size: 1.2rem; line-height: 3; width: 200%; }

/* Navbar */
#navbar { display: none; background: var(--navy); padding: 12px 20px; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; color: #fff; }
#navbar.visible { display: flex; }
.nav-logo { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--orange); }

/* Pages */
.page { display: none; min-height: 100vh; animation: fadeIn 0.4s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Auth Cards */
.auth-bg { min-height: 100vh; background: var(--navy); display: flex; align-items: center; justify-content: center; padding: 20px; }
.auth-card { background: #fff; width: 100%; max-width: 420px; border-radius: 25px; padding: 35px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
.auth-logo { width: 100px; margin-bottom: 15px; border-radius: 50%; border: 3px solid var(--orange); }
.auth-quote { font-family: 'Amiri', serif; background: #fff5f0; padding: 15px; border-radius: 12px; border-right: 4px solid var(--orange); margin-bottom: 25px; color: var(--orange); }
.form-group input { width: 100%; padding: 14px; margin-bottom: 15px; border: 2px solid #eee; border-radius: 12px; font-family: 'Cairo'; outline: none; }
.btn-main { width: 100%; padding: 15px; background: var(--orange); color: #fff; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 1.1rem; }

/* Grid & Items */
.courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
.course-card { background: #fff; border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: 0.3s; border-bottom: 5px solid var(--orange); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
.course-card:hover { transform: translateY(-5px); }
.course-info { padding: 20px; }
.lesson-item { background: #fff; padding: 15px 20px; margin-bottom: 10px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; border-right: 5px solid var(--orange); }

/* Video Player */
.video-wrap { background: #000; border-radius: 15px; overflow: hidden; margin-bottom: 20px; position: relative; padding-bottom: 56.25%; height: 0; }
.video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
</style>
</head>
<body oncontextmenu="return false;">

<a href="https://wa.me/201021422744" class="whatsapp-float" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

<div id="watermark"><div id="watermark-text"></div></div>

<nav id="navbar">
    <div style="display:flex; align-items:center; gap:12px;">
        <img class="nav-logo" src="https://i.ibb.co/zT82jk68/image.png">
        <div>
            <div style="font-weight:900; font-size:0.9rem;">Dr. Fady Adel</div>
            <div id="nav-student-name" style="color:var(--orange); font-size:0.8rem;"></div>
        </div>
    </div>
    <button onclick="logout()" style="background:none; border:1px solid #fff; color:#fff; padding:5px 12px; border-radius:8px; cursor:pointer;">خروج</button>
</nav>

<div id="app">
    <div id="login-page" class="page active">
        <div class="auth-bg">
            <div class="auth-card">
                <img class="auth-logo" src="https://i.ibb.co/zT82jk68/image.png">
                <div class="auth-quote">"وَمَنْ لا يُحِبُّ صُعُودَ الجِبَالِ<br>يَعِشْ أَبَدَ الدَّهْرِ بَيْنَ الحُفَرِ"</div>
                <div class="form-group">
                    <input type="tel" id="l-phone" placeholder="رقم الموبايل">
                    <input type="password" id="l-pass" placeholder="كلمة المرور">
                </div>
                <button class="btn-main" onclick="handleLogin()">دخول المنصة</button>
                <p onclick="showPage('signup-page')" style="margin-top:20px; cursor:pointer; font-weight:700;">إنشاء حساب جديد</p>
            </div>
        </div>
    </div>

    <div id="signup-page" class="page">
        <div class="auth-bg">
            <div class="auth-card">
                <h2 style="margin-bottom:20px;">تسجيل طالب جديد</h2>
                <div class="form-group">
                    <input type="text" id="r-name" placeholder="الاسم ثلاثي">
                    <input type="tel" id="r-phone" placeholder="رقم الموبايل">
                    <input type="password" id="r-pass" placeholder="اختر كلمة مرور">
                </div>
                <button class="btn-main" onclick="handleSignup()">تأكيد التسجيل</button>
                <p onclick="showPage('login-page')" style="margin-top:15px; cursor:pointer;">رجوع للدخول</p>
            </div>
        </div>
    </div>

    <div id="home-page" class="page">
        <div style="padding:25px;">
            <h2 style="margin-bottom:20px; border-right:5px solid var(--orange); padding-right:15px;">المحاضرات المتاحة</h2>
            <div id="courses-grid" class="courses-grid"></div>
        </div>
    </div>

    <div id="content-page" class="page">
        <div style="padding:20px;">
            <button onclick="showPage('home-page')" style="margin-bottom:20px; border:none; background:#ddd; padding:8px 15px; border-radius:8px; cursor:pointer;">⬅ العودة</button>
            <h2 id="current-course-title" style="margin-bottom:20px;"></h2>
            <div id="video-section" class="video-wrap" style="display:none;">
                <div id="player-container" style="width:100%; height:100%;"></div>
            </div>
            <div id="lessons-list"></div>
        </div>
    </div>
</div>

<script>
const { createClient } = supabase;
const sb = createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');

let currentStudent = null;

function getDeviceId() {
    let id = localStorage.getItem('fady_dev_id') || ('FD-' + Math.random().toString(36).substr(2, 9));
    localStorage.setItem('fady_dev_id', id);
    return id;
}

async function handleLogin() {
    const phone = document.getElementById('l-phone').value.trim();
    const pass = document.getElementById('l-pass').value.trim();
    const { data, error } = await sb.from('students').select('*').eq('phone', phone).eq('password', pass).single();
    if (data) {
        const devId = getDeviceId();
        if (data.last_device_id && data.last_device_id !== devId) {
            alert("هذا الحساب مسجل على جهاز آخر بالفعل.");
            return;
        }
        await sb.from('students').update({ last_device_id: devId }).eq('id', data.id);
        sessionStorage.setItem('fady_user_id', data.id);
        currentStudent = data;
        onAuthSuccess();
    } else alert("بيانات الدخول غير صحيحة");
}

async function handleSignup() {
    const name = document.getElementById('r-name').value.trim();
    const phone = document.getElementById('r-phone').value.trim();
    const pass = document.getElementById('r-pass').value.trim();
    if(!name || !phone || !pass) return alert("اكمل البيانات");
    const { data, error } = await sb.from('students').insert([{ name, phone, password: pass, last_device_id: getDeviceId(), role: 'student' }]).select().single();
    if (data) {
        currentStudent = data;
        sessionStorage.setItem('fady_user_id', data.id);
        onAuthSuccess();
    } else alert("حدث خطأ أو الرقم مسجل مسبقاً");
}

function onAuthSuccess() {
    document.getElementById('nav-student-name').innerText = currentStudent.name;
    const wmText = `${currentStudent.name} | ${currentStudent.phone} `;
    document.getElementById('watermark-text').innerText = Array(20).fill(wmText).join('      ');
    document.getElementById('watermark').classList.add('active');
    showPage('home-page');
    loadCourses();
}

async function loadCourses() {
    const grid = document.getElementById('courses-grid');
    grid.innerHTML = 'جاري التحميل...';
    const { data } = await sb.from('courses').select('*');
    if (data) {
        grid.innerHTML = data.map(c => `
            <div class="course-card" onclick="openCourse('${c.id}', '${c.title}')">
                <div class="course-info">
                    <h3>${c.title}</h3>
                    <p style="color:var(--orange); font-weight:bold; margin-top:10px;">فتح المحاضرات ⬅</p>
                </div>
            </div>
        `).join('');
    }
}

async function openCourse(id, title) {
    document.getElementById('current-course-title').innerText = title;
    document.getElementById('video-section').style.display = 'none';
    showPage('content-page');
    const { data } = await sb.from('lessons').select('*').eq('course_id', id).order('order');
    if (data) {
        document.getElementById('lessons-list').innerHTML = data.map((l, i) => `
            <div class="lesson-item" onclick="playVideo('${l.youtube_url}')">
                <div><b>${i+1}. ${l.title}</b></div>
                <span style="color:var(--orange);">▶ مشاهدة</span>
            </div>
        `).join('');
    }
}

function playVideo(url) {
    const videoId = url.split('v=')[1] || url.split('/').pop();
    const section = document.getElementById('video-section');
    section.style.display = 'block';
    document.getElementById('player-container').innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0" allow="autoplay" allowfullscreen></iframe>`;
    section.scrollIntoView({ behavior: 'smooth' });
}

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('navbar').classList.toggle('visible', id !== 'login-page' && id !== 'signup-page');
}

function logout() { sessionStorage.clear(); location.reload(); }

window.onload = async () => {
    const uid = sessionStorage.getItem('fady_user_id');
    if (uid) {
        const { data } = await sb.from('students').select('*').eq('id', uid).single();
        if (data && data.last_device_id === getDeviceId()) {
            currentStudent = data;
            onAuthSuccess();
        } else logout();
    }
};
</script>
</body>
</html>
