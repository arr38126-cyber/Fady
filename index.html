<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة Dr. Fady Adel | فيزياء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --navy: #1B2347; --orange: #E8581A; --bg: #F0F2F5; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; user-select: none; -webkit-user-select: none; overflow-x: hidden; }

        /* حماية الشاشة */
        body.security-blur { filter: blur(40px); pointer-events: none; }
        
        /* نظام الفيديو المحمي - الدرع الكامل */
        .video-container-fixed { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; border-radius: 20px; overflow: hidden; border: 3px solid var(--navy); }
        .video-container-fixed iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; } /* منع التفاعل مع اليوتيوب تماماً */
        
        /* الدرع الشفاف - هو اللي بياخد الضبط */
        .full-video-shield { position: absolute; inset: 0; z-index: 100; cursor: default; background: rgba(0,0,0,0); }

        /* أزرار تحكم خارجية خاصة بنا */
        .custom-controls { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); padding: 15px; z-index: 101; display: flex; gap: 15px; align-items: center; }
        .play-btn { background: var(--orange); color: #fff; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 1.2rem; }

        /* باقي التنسيقات */
        nav { display: none; background: var(--navy); padding: 12px 20px; align-items: center; justify-content: space-between; color: #fff; }
        nav.visible { display: flex; }
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .page { display: none; }
        .page.active { display: block; }
        .course-card { background: #fff; border-radius: 20px; padding: 15px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .btn-main { width: 100%; padding: 14px; background: var(--orange); color: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .auth-card { background: #fff; width: 100%; max-width: 400px; border-radius: 25px; padding: 30px; text-align: center; }
        .input-group input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 12px; text-align: center; }
        #watermark { display: none; position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.08; overflow: hidden; }
        #watermark.active { display: block; }
        #wm-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); white-space: nowrap; font-weight: 900; line-height: 5; width: 300%; text-align: center; color: var(--navy); }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="watermark"><div id="wm-text"></div></div>

<nav id="navbar">
    <div style="display:flex; align-items:center; gap:10px;">
        <img src="https://i.ibb.co/zT82jk68/image.png" width="40" style="border-radius:50%">
        <div id="nav-user-name">تحميل...</div>
    </div>
    <button onclick="handleLogout()" style="background:none; border:1px solid #fff; color:#fff; padding:5px 10px; border-radius:5px;">خروج</button>
</nav>

<div id="app">
    <div id="login-page" class="page active">
        <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--navy)">
            <div class="auth-card">
                <h3>منصة د. فادي عادل</h3>
                <input type="tel" id="l-phone" class="input-group" placeholder="رقم الموبايل">
                <input type="password" id="l-pass" class="input-group" placeholder="كلمة المرور">
                <button class="btn-main" onclick="handleLogin()">دخول</button>
                <p onclick="showPage('register-page')" style="cursor:pointer; margin-top:15px;">إنشاء حساب جديد</p>
            </div>
        </div>
    </div>

    <div id="register-page" class="page">
        <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--navy)">
            <div class="auth-card">
                <h3>حساب جديد</h3>
                <input type="text" id="r-name" placeholder="الاسم" class="input-group">
                <input type="tel" id="r-phone" placeholder="رقم الطالب" class="input-group">
                <input type="tel" id="r-parent" placeholder="رقم ولي الأمر" class="input-group">
                <input type="password" id="r-pass" placeholder="كلمة المرور" class="input-group">
                <button class="btn-main" onclick="handleRegister()">تأكيد</button>
                <p onclick="showPage('login-page')" style="cursor:pointer; margin-top:10px;">رجوع</p>
            </div>
        </div>
    </div>

    <div id="home-page" class="page">
        <div class="container">
            <h2 style="text-align:right">المحاضرات المتاحة</h2>
            <div id="courses-container"></div>
        </div>
    </div>

    <div id="content-page" class="page">
        <div class="container">
            <button onclick="showPage('home-page')" style="margin-bottom:15px; background:none; border:none; color:var(--orange); font-weight:bold;">← رجوع للرئيسية</button>
            <div id="video-section" style="display:none;">
                <div class="video-container-fixed">
                    <div class="full-video-shield" id="video-shield"></div>
                    <div id="player-container"></div>
                </div>
                <div id="custom-controls-box" style="display:none; text-align:center; margin-top:10px;">
                    <p style="font-size:0.8rem; color:#666;">ملاحظة: التحكم في الفيديو متاح من خلال شريط التشغيل فقط</p>
                </div>
            </div>
            <div id="lessons-list" style="margin-top:20px;"></div>
        </div>
    </div>
</div>

<script>
    const { createClient } = supabase;
    const sb = createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');

    // منع تصوير الشاشة
    window.addEventListener('blur', () => document.body.classList.add('security-blur'));
    window.addEventListener('focus', () => document.body.classList.remove('security-blur'));
    window.addEventListener('keydown', (e) => { if(e.key === "PrintScreen") { document.body.innerHTML = "<h1>تم حظرك لمحاولة التصوير</h1>"; } });

    async function handleLogin() {
        const phone = document.getElementById('l-phone').value;
        const pass = document.getElementById('l-pass').value;
        const { data: user } = await sb.from('students').select('*').eq('student_phone', phone).eq('password', pass).single();
        if (user) { 
            localStorage.setItem('fady_session', user.id); 
            localStorage.setItem('fady_phone', user.student_phone);
            startSession(user); 
        } else alert("خطأ");
    }

    async function handleRegister() {
        const name = document.getElementById('r-name').value;
        const phone = document.getElementById('r-phone').value;
        const pPhone = document.getElementById('r-parent').value;
        const pass = document.getElementById('r-pass').value;
        const { data } = await sb.from('students').insert([{ full_name: name, student_phone: phone, parent_phone: pPhone, password: pass }]).select().single();
        if (data) startSession(data);
    }

    function startSession(user) {
        document.getElementById('nav-user-name').innerText = user.full_name;
        const wmText = `${user.full_name} | ${user.student_phone} `;
        document.getElementById('wm-text').innerText = Array(60).fill(wmText).join('    ');
        document.getElementById('watermark').classList.add('active');
        showPage('home-page');
        loadCourses();
    }

    async function loadCourses() {
        const { data: courses } = await sb.from('courses').select('*');
        document.getElementById('courses-container').innerHTML = courses.map(c => `
            <div class="course-card">
                <h3>${c.title}</h3>
                <button class="btn-main" onclick="openCourse('${c.id}', '${parseFloat(c.price) === 0}')">دخول</button>
            </div>`).join('');
    }

    async function openCourse(id, isFree) {
        if (!isFree) {
            const { data: access } = await sb.from('student_access').select('*').eq('student_phone', localStorage.getItem('fady_phone')).eq('course_id', id).single();
            if (!access) return alert("فعل الكورس الأول");
        }
        showPage('content-page');
        const { data: lessons } = await sb.from('lessons').select('*').eq('course_id', id);
        document.getElementById('lessons-list').innerHTML = lessons.map(l => `
            <div class="content-item" style="padding:15px; border-bottom:1px solid #ddd; cursor:pointer;" onclick="playVideo('${l.video_id || l.youtube_url}')">
                <b>▶ ${l.title}</b>
            </div>`).join('');
    }

    /* السر هنا: حجب التفاعل تماماً */
    function playVideo(idOrUrl) {
        let vId = idOrUrl.includes('v=') ? idOrUrl.split('v=')[1].split('&')[0] : (idOrUrl.includes('be/') ? idOrUrl.split('be/')[1] : idOrUrl);
        document.getElementById('video-section').style.display = 'block';
        
        // منع التفاعل من خلال pointer-events: none في الـ CSS أعلاه
        // الدرع (full-video-shield) هو اللي بيمنع أي كليكة توصل لليوتيوب
        document.getElementById('player-container').innerHTML = `
            <iframe id="main-player" 
                src="https://www.youtube.com/embed/${vId}?autoplay=1&rel=0&modestbranding=1&controls=1&disablekb=1&iv_load_policy=3" 
                allow="autoplay; encrypted-media">
            </iframe>
        `;
        
        // تنبيه بسيط للطالب
        document.getElementById('video-shield').onclick = function() {
            alert("تنبيه: لا يمكن الخروج من المشغل، يرجى المشاهدة داخل المنصة.");
        };
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('navbar').classList.toggle('visible', id !== 'login-page' && id !== 'register-page');
    }

    function handleLogout() { localStorage.clear(); location.reload(); }

    window.onload = async () => {
        const id = localStorage.getItem('fady_session');
        if (id) {
            const { data: user } = await sb.from('students').select('*').eq('id', id).single();
            if (user) startSession(user);
        }
    };
</script>
</body>
</html>
