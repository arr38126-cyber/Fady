<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dr: Fady Adel | Physics Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Amiri:ital@1&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --navy: #050a0f; --gold: #c9972b; --white: #fff; --card: #0d1621; --brd: rgba(201, 151, 43, 0.3); }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body { font-family: 'Cairo', sans-serif; background: var(--navy); color: var(--white); overflow-x: hidden; }

        /* منع تصوير الشاشة - محاكاة الشاشة السوداء */
        @media screen { video, iframe, .exam-area { filter: opacity(1); -webkit-filter: opacity(1); } }
        @media print { body { display: none !important; } }

        .amiri { font-family: 'Amiri', serif; color: var(--gold); font-size: 1.2rem; text-align: center; margin: 20px 0; font-style: italic; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        .card { background: var(--card); border: 1px solid var(--brd); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--brd); border-radius: 12px; color: white; font-size: 1rem; text-align: center; outline: none; }
        .btn-gold { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 12px; color: var(--navy); font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        
        /* البصمة المتحركة الذكية */
        #watermark { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 99999; opacity: 0.15; font-size: 12px; color: #fff; display: none; }
        
        .course-card { background: var(--card); border: 1px solid var(--brd); border-radius: 15px; margin-bottom: 20px; overflow: hidden; transition: 0.3s; }
        .course-img { width: 100%; height: 160px; object-fit: cover; border-bottom: 1px solid var(--brd); }
        
        .exam-area { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--navy); z-index: 10000; display: none; padding: 20px; overflow-y: auto; }
        .locked { filter: grayscale(1); opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="watermark"></div>

<div id="loginPage" class="container" style="margin-top: 10vh;">
    <div class="card">
        <h1 style="text-align:center; color:var(--gold); margin-bottom:10px; font-weight:900;">Dr: Fady Adel</h1>
        <p style="text-align:center; opacity:0.7; margin-bottom:25px;">منصة الفيزياء للثانوية العامة</p>
        
        <input type="tel" id="loginPhone" placeholder="رقم الموبايل">
        <input type="password" id="loginPass" placeholder="كلمة المرور">
        <button class="btn-gold" onclick="doLogin()">دخول للمنصة</button>
        
        <a style="display:block; text-align:center; margin-top:20px; color:#ff6b6b; font-size:0.85rem; cursor:pointer; text-decoration:none;" 
   
            
            
            
            
            
            
            onclick="window.open('https://wa.me/2010000000004?text=أهلاً مستر فادي، نسيت كلمة المرور الخاصة بحسابي', '_blank')">
           نسيت كلمة المرور؟ تواصل معنا
        </a>
    </div>
    <p class="amiri">"وَمَنْ لا يُحِبُّ صُعُودَ الجِبَالِ يَعِشْ أَبَدَ الدَّهْرِ بَيْنَ الحُفَرِ"</p>
</div>

<div id="mainPage" class="container" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 id="welcomeName" style="color:var(--gold); font-weight:900;"></h2>
        <button onclick="location.reload()" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:5px 10px; border-radius:8px; font-size:0.8rem;">خروج</button>
    </div>
    <div id="coursesContainer"></div>
</div>

<div id="lessonsPage" class="container" style="display:none;">
    <button onclick="showMain()" style="color:var(--gold); background:none; border:none; margin-bottom:15px; cursor:pointer; font-weight:bold;">← العودة للكورسات</button>
    <div id="lessonsContainer"></div>
</div>

<div id="examArea" class="exam-area">
    <div id="examContent"></div>
</div>

<script>
    const _supabase = supabase.createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');
    
    let currentUser = null;

    // حماية: تعطيل اختصارات الكيبورد
    document.addEventListener('keydown', (e) => {
        if (e.key === "PrintScreen" || e.keyCode === 44) {
            navigator.clipboard.writeText("محتوى محمي!");
            alert("تصوير الشاشة ممنوع.");
        }
        if (e.ctrlKey && (e.key === 'u' || e.key === 'i' || e.key === 's')) e.preventDefault();
        if (e.keyCode === 123) e.preventDefault();
    });

    async function doLogin() {
        const phone = document.getElementById('loginPhone').value;
        const pass = document.getElementById('loginPass').value;
        const devId = btoa(navigator.userAgent + screen.width); // بصمة الجهاز

        if(!phone || !pass) return alert("برجاء إدخال البيانات");

        const { data: user, error } = await _supabase.from('students').select('*').eq('student_phone', phone).single();

        if(!user || user.password !== pass) return alert("بيانات الدخول غير صحيحة");

        // نظام الجهاز الواحد
        if(user.last_device_id && user.last_device_id !== devId) {
            return alert("هذا الحساب مسجل على جهاز آخر. تواصل مع المستر.");
        }

        await _supabase.from('students').update({ last_device_id: devId }).eq('id', user.id);
        currentUser = user;
        startWatermark(user.student_name, user.student_phone);
        showMain();
    }

    // بصمة متحركة (واتر مارك) قوية جداً
    function startWatermark(name, phone) {
        const wm = document.getElementById('watermark');
        wm.style.display = 'block';
        setInterval(() => {
            wm.innerHTML = `<div style="position:absolute; top:${Math.random()*90}%; left:${Math.random()*60}%; color:rgba(255,255,255,0.25); transform:rotate(-20deg); white-space:nowrap;">
                ${name} - ${phone}
            </div>`;
        }, 2500);
    }

    async function showMain() {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('lessonsPage').style.display = 'none';
        document.getElementById('mainPage').style.display = 'block';
        document.getElementById('welcomeName').innerText = "يا " + currentUser.student_name.split(' ')[0];

        const { data: access } = await _supabase.from('student_access').select('course_id').eq('student_phone', currentUser.student_phone);
        const userAccess = access.map(a => a.course_id);

        const { data: courses } = await _supabase.from('courses').select('*');
        let html = '';
        courses.forEach(c => {
            const isLocked = c.price > 0 && !userAccess.includes(c.id);
            html += `
                <div class="course-card ${isLocked ? 'locked' : ''}" onclick="${isLocked ? "alert('تواصل مع السكرتارية لتفعيل الكورس')" : `showLessons('${c.id}')`}">
                    <img src="${c.image_url || 'https://via.placeholder.com/400x200/0d1621/c9972b?text=Physics'}" class="course-img">
                    <div style="padding:15px; text-align:center;">
                        <h3 style="color:var(--gold);">${c.title}</h3>
                        <p style="font-size:0.9rem; opacity:0.8;">${c.price === 0 ? 'محتوى مجاني' : `السعر: ${c.price} ج.م`}</p>
                    </div>
                </div>`;
        });
        document.getElementById('coursesContainer').innerHTML = html;
    }

    async function showLessons(courseId) {
        document.getElementById('mainPage').style.display = 'none';
        document.getElementById('lessonsPage').style.display = 'block';

        const { data: lessons } = await _supabase.from('lessons').select('*').eq('course_id', courseId);
        let html = '';
        lessons.forEach(l => {
            html += `
                <div class="card" style="margin-bottom:15px; border-right:4px solid var(--gold);">
                    <h3 style="margin-bottom:15px;">🎥 ${l.title}</h3>
                    <div style="position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:10px; margin-bottom:15px;">
                        <iframe style="position:absolute; top:0; left:0; width:100%; height:100%;" 
                                src="https://www.youtube.com/embed/${l.video_id}?rel=0&modestbranding=1&disablekb=1" 
                                frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        ${l.pdf_url ? `<button class="btn-gold" style="background:#34495e; color:#fff;" onclick="window.open('${l.pdf_url}')">PDF الملزمة</button>` : '<div></div>'}
                        <button class="btn-gold" onclick="openExam('${l.id}')">بدء الامتحان 📝</button>
                    </div>
                </div>`;
        });
        document.getElementById('lessonsContainer').innerHTML = html || '<p style="text-align:center;">لا توجد محاضرات حالياً.</p>';
    }

    async function openExam(lessonId) {
        const { data: exam, error } = await _supabase.from('exams').select('*').eq('lesson_id', lessonId).maybeSingle();
        if (error || !exam) return alert("لا يوجد امتحان لهذه المحاضرة.");

        let questions = typeof exam.questions === 'string' ? JSON.parse(exam.questions) : exam.questions;
        if (!questions || questions.length === 0) return alert("الامتحان فارغ.");

        const examArea = document.getElementById('examArea');
        examArea.style.display = 'block';
        
        let currentQ = 0, score = 0;

        function renderQ() {
            const q = questions[currentQ];
            document.getElementById('examContent').innerHTML = `
                <h2 style="color:var(--gold); text-align:center; margin-bottom:20px;">سؤال ${currentQ+1} من ${questions.length}</h2>
                <div class="card">
                    <p style="font-size:1.2rem; margin-bottom:20px;">${q.q}</p>
                    ${q.img ? `<img src="${q.img}" style="width:100%; border-radius:10px; margin-bottom:15px;">` : ''}
                    ${q.options.map((opt, i) => `<button class="btn-gold" style="background:rgba(255,255,255,0.05); color:white; text-align:right;" onclick="ans(${i})">${opt}</button>`).join('')}
                </div>`;
        }

        window.ans = (idx) => {
            if(idx === questions[currentQ].correct) score++;
            currentQ++;
            if(currentQ < questions.length) renderQ();
            else {
                const final = Math.round((score/questions.length)*100);
                _supabase.from('exam_results').insert([{ student_phone: currentUser.student_phone, lesson_id: lessonId, score: final }]);
                document.getElementById('examContent').innerHTML = `<div class="card" style="text-align:center;"><h2 style="color:var(--gold);">درجتك: ${final}%</h2><button class="btn-gold" onclick="location.reload()">إغلاق</button></div>`;
            }
        };
        renderQ();
    }
</script>
</body>
</html>
