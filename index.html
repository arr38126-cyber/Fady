<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة Dr. Fady Adel | فيزياء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --navy: #1B2347; --orange: #E8581A; --bg: #F0F2F5; --green: #2ecc71; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; user-select: none; overflow-x: hidden; }

        /* WhatsApp */
        .whatsapp-float { position: fixed; bottom: 20px; left: 20px; background-color: #25d366; color: #FFF; border-radius: 50px; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; z-index: 10000; font-size: 30px; box-shadow: 2px 2px 10px rgba(0,0,0,0.2); text-decoration: none; }

        #watermark { display: none; position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.07; overflow: hidden; }
        #watermark.active { display: block; }
        #wm-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); white-space: nowrap; font-weight: 900; font-size: 1.2rem; line-height: 5; width: 300%; text-align: center; color: var(--navy); }

        nav { display: none; background: var(--navy); padding: 12px 20px; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; color: #fff; }
        nav.visible { display: flex; }

        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .page { display: none; }
        .page.active { display: block; }

        /* Advanced Video Player */
        .video-player-container { position: relative; background: #000; border-radius: 20px; overflow: hidden; border: 2px solid var(--navy); }
        .video-aspect { position: relative; padding-bottom: 56.25%; height: 0; }
        #yt-player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: pointer; }

        .custom-controls { background: var(--navy); padding: 12px 15px; color: white; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .progress-bar { flex-basis: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 5px; cursor: pointer; margin-bottom: 8px; position: relative; }
        .progress-fill { height: 100%; background: var(--orange); width: 0%; border-radius: 5px; }
        
        .ctrl-group { display: flex; align-items: center; gap: 15px; flex-grow: 1; }
        .ctrl-btn { background: none; border: none; color: white; cursor: pointer; font-size: 1.1rem; padding: 5px; transition: 0.2s; }
        .ctrl-btn:hover { color: var(--orange); }
        
        .speed-select { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 5px; padding: 2px 5px; font-family: 'Cairo'; font-size: 0.8rem; outline: none; cursor: pointer; }
        .video-timer { font-size: 0.85rem; font-family: monospace; direction: ltr; }

        .course-card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.08); position: relative; }
        .price-tag { position: absolute; top: 10px; left: 10px; background: var(--orange); color: white; padding: 4px 12px; border-radius: 20px; font-weight: 800; font-size: 0.9rem; z-index: 5; }
        .btn-main { width: 100%; padding: 12px; background: var(--orange); color: #fff; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; font-family: 'Cairo'; }
    </style>
</head>
<body>

<a href="https://wa.me/201234567890" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>
<div id="watermark"><div id="wm-text"></div></div>

<nav id="navbar">
    <div style="display:flex; align-items:center; gap:10px;">
        <img src="https://i.ibb.co/zT82jk68/image.png" width="40" style="border-radius:50%">
        <span id="nav-user-name" style="font-weight: 800;"></span>
    </div>
    <button onclick="handleLogout()" style="background:none; border:1px solid #fff; color:#fff; padding:5px 10px; border-radius:8px; cursor:pointer;">خروج</button>
</nav>

<div id="app">
    <div id="login-page" class="page active">
        <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--navy);">
            <div style="background:#fff; padding:35px; border-radius:25px; width:90%; max-width:400px; text-align:center;">
                <img src="https://i.ibb.co/zT82jk68/image.png" width="80" style="border-radius:50%; margin-bottom:15px;">
                <input type="tel" id="l-phone" placeholder="رقم الموبايل" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd; text-align:center;">
                <input type="password" id="l-pass" placeholder="كلمة المرور" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:1px solid #ddd; text-align:center;">
                <button class="btn-main" onclick="handleLogin()">دخول للمنصة</button>
            </div>
        </div>
    </div>

    <div id="home-page" class="page">
        <div class="container">
            <h2 style="text-align:right; border-right:4px solid var(--orange); padding-right:10px;">الكورسات المتاحة</h2>
            <div id="courses-container" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:20px;"></div>
        </div>
    </div>

    <div id="content-page" class="page">
        <div class="container">
            <h3 id="current-course-title" style="text-align:right; color:var(--navy);"></h3>
            
            <div id="video-section" style="display:none;">
                <div class="video-player-container" id="main-player-container">
                    <div class="video-aspect">
                        <div id="yt-player"></div>
                        <div id="video-overlay" onclick="togglePlay()"></div>
                    </div>
                    <div class="custom-controls">
                        <div class="progress-bar" id="p-bar" onclick="seekVideo(event)">
                            <div class="progress-fill" id="progress-fill"></div>
                        </div>
                        
                        <div class="ctrl-group">
                            <button class="ctrl-btn" onclick="togglePlay()"><i id="play-icon" class="fas fa-play"></i></button>
                            <div class="video-timer">
                                <span id="current-time">00:00</span> / <span id="duration-time">00:00</span>
                            </div>
                        </div>

                        <div style="display:flex; align-items:center; gap:10px;">
                            <select class="speed-select" onchange="changeSpeed(this.value)">
                                <option value="0.5">0.5x</option>
                                <option value="0.75">0.75x</option>
                                <option value="1" selected>Normal</option>
                                <option value="1.25">1.25x</option>
                                <option value="1.5">1.5x</option>
                                <option value="2">2x</option>
                            </select>
                            <button class="ctrl-btn" onclick="toggleFullScreen()"><i class="fas fa-expand"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tab-content" style="margin-top:20px;"></div>
        </div>
    </div>
</div>

<script>
    const { createClient } = supabase;
    const sb = createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');

    let player, timerUpdate;

    function getYouTubeId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : url;
    }

    async function handleLogin() {
        const phone = document.getElementById('l-phone').value.trim();
        const pass = document.getElementById('l-pass').value.trim();
        const { data: user } = await sb.from('students').select('*').eq('student_phone', phone).eq('password', pass).single();
        if (user) { 
            localStorage.setItem('f_id', user.id); 
            localStorage.setItem('f_p', user.student_phone); 
            start(user); 
        } else alert("بيانات خاطئة");
    }

    function start(user) {
        document.getElementById('nav-user-name').innerText = user.full_name;
        document.getElementById('wm-text').innerText = Array(50).fill(`${user.full_name} | ${user.student_phone}`).join('   ');
        document.getElementById('watermark').classList.add('active');
        showPage('home-page'); loadCourses();
    }

    async function loadCourses() {
        const { data: cs } = await sb.from('courses').select('*');
        document.getElementById('courses-container').innerHTML = cs.map(c => `
            <div class="course-card">
                <div class="price-tag">${c.price > 0 ? c.price + ' ج.م' : 'مجاني'}</div>
                <img src="${c.image_url || 'https://via.placeholder.com/300x170'}" style="width:100%; height:170px; object-fit:cover;">
                <div style="padding:15px; text-align:right;">
                    <h3>${c.title}</h3>
                    <button class="btn-main" onclick="checkAccess('${c.id}', '${c.title}')">دخول</button>
                </div>
            </div>`).join('');
    }

    async function checkAccess(id, title) {
        document.getElementById('current-course-title').innerText = title;
        showPage('content-page');
        const { data: ls } = await sb.from('lessons').select('*').eq('course_id', id).order('id');
        document.getElementById('tab-content').innerHTML = ls.map((l, i) => `
            <div style="background:#fff; padding:15px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; cursor:pointer;" onclick="playVideo('${l.video_id}')">
                <span><b>${i+1}.</b> ${l.title}</span> <i class="fas fa-play-circle" style="color:var(--orange)"></i>
            </div>`).join('');
    }

    function playVideo(rawUrl) {
        const videoId = getYouTubeId(rawUrl);
        document.getElementById('video-section').style.display = 'block';
        if (player) {
            player.loadVideoById(videoId);
        } else {
            player = new YT.Player('yt-player', {
                videoId: videoId,
                playerVars: { 'controls': 0, 'disablekb': 1, 'modestbranding': 1, 'rel': 0 },
                events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange }
            });
        }
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function onPlayerReady() {
        startTimer();
        const duration = player.getDuration();
        document.getElementById('duration-time').innerText = formatTime(duration);
    }

    function onPlayerStateChange(event) {
        const icon = document.getElementById('play-icon');
        if (event.data == YT.PlayerState.PLAYING) icon.className = 'fas fa-pause';
        else icon.className = 'fas fa-play';
        
        if (event.data == YT.PlayerState.PLAYING) {
            document.getElementById('duration-time').innerText = formatTime(player.getDuration());
        }
    }

    function togglePlay() {
        if (player.getPlayerState() == YT.PlayerState.PLAYING) player.pauseVideo();
        else player.playVideo();
    }

    function startTimer() {
        setInterval(() => {
            if (player && player.getCurrentTime) {
                const current = player.getCurrentTime();
                const duration = player.getDuration();
                document.getElementById('progress-fill').style.width = (current / duration * 100) + '%';
                document.getElementById('current-time').innerText = formatTime(current);
            }
        }, 1000);
    }

    function formatTime(time) {
        let min = Math.floor(time / 60);
        let sec = Math.floor(time % 60);
        return `${min}:${sec < 10 ? '0' + sec : sec}`;
    }

    function seekVideo(e) {
        const rect = document.getElementById('p-bar').getBoundingClientRect();
        const pct = (e.clientX - rect.left) / rect.width;
        player.seekTo(pct * player.getDuration());
    }

    function changeSpeed(val) {
        player.setPlaybackRate(parseFloat(val));
    }

    function toggleFullScreen() {
        const container = document.getElementById('main-player-container');
        if (!document.fullscreenElement) container.requestFullscreen();
        else document.exitFullscreen();
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('navbar').classList.toggle('visible', id !== 'login-page');
        if (id !== 'content-page' && player) player.pauseVideo();
    }

    function handleLogout() { localStorage.clear(); location.reload(); }

    window.onload = async () => {
        const id = localStorage.getItem('f_id');
        if (id) {
            const { data: u } = await sb.from('students').select('*').eq('id', id).single();
            if (u) start(u);
        }
    };
</script>
</body>
</html>
