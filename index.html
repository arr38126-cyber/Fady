<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr: Fady Adel | Physics Platform</title>
    <link rel="icon" href="https://i.ibb.co/nMB0QD7k/fady-logo.png" type="image/png" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Amiri:wght@700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --navy: #050a0f; --card: #0d1621; --gold: #c9972b; --gold-gradient: linear-gradient(135deg, #a87820, #c9972b, #e8b84b); --white: #fff; --brd: rgba(201, 151, 43, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Cairo', sans-serif; background: var(--navy); color: var(--white); min-height: 100vh; overflow-x: hidden; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        /* Navbar */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--brd); margin-bottom: 30px; }
        .user-nav { display: flex; align-items: center; gap: 10px; cursor: pointer; color: var(--gold); font-weight: 700; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 20px; }
        
        /* Auth Card */
        .auth-container { max-width: 420px; margin: 40px auto; background: var(--card); border-radius: 24px; padding: 30px; border: 1px solid var(--brd); box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center; }
        .brand-logo-mid { width: 80px; height: 80px; margin: 0 auto 20px; border-radius: 50%; border: 2px solid var(--gold); box-shadow: 0 0 15px rgba(201,151,43,0.3); }
        input { width: 100%; padding: 14px; margin-bottom: 12px; background: rgba(255,255,255,0.02); border: 1px solid var(--brd); border-radius: 12px; color: white; font-family: 'Cairo'; text-align: center; outline: none; }
        input:focus { border-color: var(--gold); }
        .btn-gold { padding: 12px 25px; background: var(--gold-gradient); border: none; border-radius: 12px; color: var(--navy); font-weight: 800; cursor: pointer; transition: 0.3s; font-family: 'Cairo'; width: 100%; }
        .forgot-pass { display: block; margin-top: 15px; color: #ff6b6b; font-size: 0.85rem; text-decoration: none; cursor: pointer; font-weight: 600; }

        /* Courses & Lessons */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .item-card { background: var(--card); border: 1px solid var(--brd); padding: 25px; border-radius: 20px; cursor: pointer; transition: 0.3s; text-align: center; position: relative; overflow: hidden; }
        .item-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        
        /* Video System */
        .video-box { position: relative; width: 100%; max-width: 850px; margin: 20px auto; border-radius: 20px; overflow: hidden; border: 2px solid var(--gold); background: #000; }
        #watermark { position: absolute; z-index: 100; color: rgba(255, 255, 255, 0.15); font-size: 14px; pointer-events: none; white-space: nowrap; transition: 3s linear; font-weight: bold; text-shadow: 1px 1px 2px #000; }
        
        .page { display: none; animation: fadeIn 0.5s ease; }
        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .amiri { font-family: 'Amiri', serif; line-height: 1.6; color: var(--gold); }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="container">
    <nav>
        <div id="userNav" class="user-nav hidden" onclick="logout()">
            <span id="userNameDisplay">طالب</span>
            <span>👤</span>
        </div>
        <div style="font-weight: 900; font-size: 1.3rem;">Dr: <span style="color:var(--gold)">FADY ADEL</span></div>
    </nav>

    <div id="authPage" class="auth-container">
        <img src="https://i.ibb.co/nMB0QD7k/fady-logo.png" class="brand-logo-mid">
        <h3 style="margin-bottom:20px;">تسجيل دخول الطالب</h3>
        <input type="tel" id="lp" placeholder="رقم الموبايل">
        <input type="password" id="lw" placeholder="كلمة المرور">
        <button class="btn-gold" onclick="doLogin()">دخول المنصة</button>
     
        
        
    
        
        <a class="forgot-pass" onclick="window.open('https://wa.me/201021422744?text=نسيت كلمة المرور الخاصة بي', '_blank')">نسيت كلمة المرور؟ تواصل معنا 💬</a>
    </div>

    <div id="coursesPage" class="page">
        <div style="background:rgba(201,151,43,0.05); padding:20px; border-radius:15px; border:1px dashed var(--gold); text-align:center; margin-bottom:30px;">
            <p class="amiri" style="font-size:1.4rem;">"وَمَنْ لا يُحِبُّ صُعُودَ الجِبَالِ.. يَعِشْ أَبَدَ الدَّهْرِ بَيْنَ الحُفَرِ"</p>
        </div>
        <h2 style="margin-bottom:20px; border-right: 4px solid var(--gold); padding-right:15px;">الكورسات المتاحة 📚</h2>
        <div id="coursesList" class="grid"></div>
    </div>

    <div id="lessonsPage" class="page">
        <button onclick="showPage('coursesPage')" style="background:none; color:var(--gold); border:none; cursor:pointer; margin-bottom:15px; font-family:'Cairo';">← العودة للكورسات</button>
        <h2 id="currentCourseTitle" style="color:var(--gold); margin-bottom:20px;"></h2>
        <div id="lessonsList" class="grid"></div>
    </div>

    <div id="contentPage" class="page">
        <button onclick="showPage('lessonsPage')" style="background:none; color:var(--gold); border:none; cursor:pointer; margin-bottom:15px; font-family:'Cairo';">← العودة للمحاضرات</button>
        <h3 id="lessonTitle" style="margin-bottom:20px;"></h3>
        <div class="video-box">
            <div id="watermark"></div>
            <div style="position:absolute; top:0; left:0; width:100%; height:60px; z-index:10;"></div>
            <div style="position:absolute; bottom:0; right:0; width:120px; height:50px; z-index:10;"></div>
            <iframe id="mainPlayer" width="100%" style="aspect-ratio:16/9;" src="" frameborder="0" allowfullscreen></iframe>
        </div>
        <div style="display:flex; gap:15px; margin-top:20px;">
            <button class="btn-gold" style="background:#2ecc71; color:white;" onclick="startExam()">📝 ابدأ الامتحان الإلكتروني</button>
            <button id="pdfBtn" class="btn-gold" style="background:#3498db; color:white; display:none;" onclick="">📄 تحميل الملخص (PDF)</button>
        </div>
    </div>
</div>

<script>
    const _supabase = supabase.createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');

    // منع اختصارات المطورين
    document.onkeydown = (e) => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false; };

    window.onload = () => {
        const saved = localStorage.getItem('physics_user');
        if(saved) {
            const u = JSON.parse(saved);
            if(u.name) launchApp(u);
        }
    };

    function showPage(id) {
        document.querySelectorAll('.page, #authPage').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    async function doLogin() {
        const p = document.getElementById('lp').value, w = document.getElementById('lw').value;
        const { data } = await _supabase.from('students').select('*').eq('student_phone', p).eq('password', w).maybeSingle();
        if(data) {
            const u = { name: data.full_name, phone: data.student_phone, role: data.role };
            localStorage.setItem('physics_user', JSON.stringify(u));
            launchApp(u);
        } else alert("بيانات الدخول غير صحيحة");
    }

    function launchApp(u) {
        document.getElementById('userNameDisplay').innerText = u.name;
        document.getElementById('userNav').classList.remove('hidden');
        loadCourses();
    }

    async function loadCourses() {
        const { data } = await _supabase.from('courses').select('*');
        let html = '';
        data.forEach(c => {
            html += `<div class="item-card" onclick="loadLessons('${c.id}', '${c.title}')">
                        <div style="font-size:3rem; margin-bottom:10px;">📂</div>
                        <h3>${c.title}</h3>
                        <p style="font-size:0.8rem; color:gray; margin-top:5px;">اضغط لاستكشاف المحاضرات</p>
                    </div>`;
        });
        document.getElementById('coursesList').innerHTML = html;
        showPage('coursesPage');
    }

    async function loadLessons(courseId, title) {
        const { data } = await _supabase.from('lessons').select('*').eq('course_id', courseId);
        document.getElementById('currentCourseTitle').innerText = title;
        let html = '';
        data.forEach(l => {
            html += `<div class="item-card" onclick="viewLesson('${l.id}')">
                        <div style="font-size:2rem; margin-bottom:10px;">🎥</div>
                        <h4>${l.title}</h4>
                    </div>`;
        });
        document.getElementById('lessonsList').innerHTML = html;
        showPage('lessonsPage');
    }

    async function viewLesson(lessonId) {
        const { data } = await _supabase.from('lessons').select('*').eq('id', lessonId).single();
        document.getElementById('lessonTitle').innerText = data.title;
        document.getElementById('mainPlayer').src = `https://www.youtube.com/embed/${data.video_id}?rel=0&modestbranding=1&autoplay=1`;
        
        if(data.pdf_url) {
            const btn = document.getElementById('pdfBtn');
            btn.style.display = 'block';
            btn.onclick = () => window.open(data.pdf_url, '_blank');
        }

        const u = JSON.parse(localStorage.getItem('physics_user'));
        startWatermark(u.name, u.phone);
        showPage('contentPage');
    }

    function startWatermark(name, phone) {
        const m = document.getElementById('watermark');
        m.innerText = `${name} - ${phone}`;
        if(window.wTimer) clearInterval(window.wTimer);
        const move = () => { m.style.left = Math.random()*60+'%'; m.style.top = Math.random()*60+'%'; };
        move();
        window.wTimer = setInterval(move, 4000);
    }

    function startExam() { alert("جاري تجهيز الامتحان الإلكتروني الخاص بهذه المحاضرة..."); }
    function logout() { localStorage.removeItem('physics_user'); location.reload(); }
</script>
</body>
</html>
