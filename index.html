<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة Dr. Fady Adel | فيزياء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --navy: #1B2347; --orange: #E8581A; --bg: #F0F2F5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; user-select: none; overflow-x: hidden; }

        /* واترمارك الحماية */
        #watermark { display: none; position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.08; overflow: hidden; }
        #watermark.active { display: block; }
        #wm-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); white-space: nowrap; font-weight: 900; color: var(--navy); line-height: 5; text-align: center; width: 300%; font-size: 1.2rem; }

        /* الهيدر */
        nav { display: none; background: var(--navy); padding: 12px 20px; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        nav.visible { display: flex; }
        .nav-logo { display: flex; align-items: center; gap: 10px; }
        .nav-logo img { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--orange); }

        /* منطقة الفيديو والدروع الثلاثة */
        .video-master-container { position: relative; width: 100%; max-width: 900px; margin: 0 auto; background: #000; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .video-wrap { position: relative; padding-bottom: 56.25%; height: 0; z-index: 1; }
        .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; pointer-events: none; }

        /* نظام الدروع الثلاثة */
        .shields-container { position: absolute; inset: 0; z-index: 100; display: flex; }
        .shield-part { height: 100%; background: transparent; cursor: default; flex: 1; }

        /* شريط التحكم المطور */
        .player-controls { position: relative; z-index: 200; background: var(--navy); padding: 15px; display: flex; align-items: center; justify-content: center; gap: 20px; border-top: 3px solid var(--orange); flex-wrap: wrap; }
        .p-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 1.5rem; transition: 0.2s; }
        .p-btn:hover { color: var(--orange); transform: scale(1.1); }
        .p-select { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #fff; border-radius: 8px; padding: 5px; font-family: 'Cairo'; }

        /* التنسيقات العامة للشبكة والكروت */
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .page { display: none; }
        .page.active { display: block; }
        .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .course-card { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); position: relative; }
        .price-badge { position: absolute; top: 10px; left: 10px; padding: 5px 12px; border-radius: 10px; color: #fff; font-weight: bold; z-index: 10; font-size: 0.8rem; }
        .btn-main { width: 90%; padding: 12px; background: var(--orange); color: #fff; border: none; border-radius: 12px; cursor: pointer; font-weight: 800; display: block; margin: 10px auto; font-family: 'Cairo'; }
        .content-item { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-right: 5px solid var(--orange); cursor: pointer; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 3px 6px rgba(0,0,0,0.05); }

        /* وضع ملء الشاشة */
        #video-container-wrapper:fullscreen { width: 100%; height: 100%; max-width: none; border-radius: 0; }
        #video-container-wrapper:fullscreen .player-controls { position: fixed; bottom: 0; width: 100%; border-radius: 0; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="watermark"><div id="wm-text"></div></div>

<nav id="navbar">
    <div class="nav-logo">
        <img src="https://i.ibb.co/zT82jk68/image.png">
        <div><div id="u-name" style="font-weight: 800;">جاري التحميل...</div><div style="color: var(--orange); font-size: 0.8rem;">فيزياء - د. فادي عادل</div></div>
    </div>
    <button onclick="handleLogout()" style="background:none; border:1px solid #fff; color:#fff; padding:6px 12px; border-radius:8px; cursor:pointer;">خروج</button>
</nav>

<div id="app">
    <div id="login-page" class="page active">
        <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--navy);">
            <div style="background:#fff; padding:35px; border-radius:25px; width:90%; max-width:400px; text-align:center;">
                <img src="https://i.ibb.co/zT82jk68/image.png" width="85" style="border-radius:50%; margin-bottom:15px; border:3px solid var(--navy);">
                <h3 style="margin-bottom:20px;">تسجيل الدخول</h3>
                <input type="tel" id="lp" placeholder="رقم الموبايل" style="width:100%; padding:13px; margin-bottom:10px; border-radius:12px; border:1px solid #ddd; text-align:center; font-family:'Cairo'; outline:none;">
                <input type="password" id="lw" placeholder="كلمة المرور" style="width:100%; padding:13px; margin-bottom:20px; border-radius:12px; border:1px solid #ddd; text-align:center; font-family:'Cairo'; outline:none;">
                <button class="btn-main" onclick="handleLogin()">دخول للمنصة</button>
                <p onclick="showPage('register-page')" style="cursor:pointer; font-weight:700; margin-top:15px; color:var(--navy);">إنشاء حساب جديد</p>
            </div>
        </div>
    </div>

    <div id="register-page" class="page">
        <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--navy);">
            <div style="background:#fff; padding:35px; border-radius:25px; width:90%; max-width:400px; text-align:center;">
                <h3>فتح حساب طالب</h3>
                <input type="text" id="rn" placeholder="الاسم ثلاثي" style="width:100%; padding:12px; margin-bottom:10px; border-radius:12px; border:1px solid #ddd; text-align:center;">
                <input type="tel" id="rp" placeholder="رقم موبايلك" style="width:100%; padding:12px; margin-bottom:10px; border-radius:12px; border:1px solid #ddd; text-align:center;">
                <input type="tel" id="rpp" placeholder="رقم ولي الأمر" style="width:100%; padding:12px; margin-bottom:10px; border-radius:12px; border:1px solid #ddd; text-align:center;">
                <input type="password" id="rw" placeholder="كلمة المرور" style="width:100%; padding:12px; margin-bottom:15px; border-radius:12px; border:1px solid #ddd; text-align:center;">
                <button class="btn-main" onclick="handleRegister()">تأكيد التسجيل</button>
                <p onclick="showPage('login-page')" style="cursor:pointer; margin-top:10px;">رجوع</p>
            </div>
        </div>
    </div>

    <div id="home-page" class="page">
        <div class="container">
            <h2 style="text-align:right; border-right: 5px solid var(--orange); padding-right:15px;">محاضراتي</h2>
            <div id="courses-container" class="course-grid"></div>
        </div>
    </div>

    <div id="content-page" class="page">
        <div class="container">
            <button onclick="showPage('home-page')" style="margin-bottom:15px; border:none; background:none; color:var(--orange); font-weight:800; cursor:pointer;">← العودة للمحاضرات</button>
            
            <div id="video-container-wrapper" style="display:none;">
                <div class="video-master-container" id="fs-target">
                    <div class="video-wrap">
                        <div class="shields-container">
                            <div class="shield-part" title="يمين"></div>
                            <div class="shield-part" title="منتصف"></div>
                            <div class="shield-part" title="يسار"></div>
                        </div>
                        <div id="yt-player"></div>
                    </div>
                    <div class="player-controls">
                        <button class="p-btn" onclick="seek(-10)"><i class="fas fa-undo"></i></button>
                        <button class="p-btn" id="p-play" onclick="toggleP()"><i class="fas fa-play"></i></button>
                        <button class="p-btn" onclick="seek(10)"><i class="fas fa-redo"></i></button>
                        <button class="p-btn" onclick="toggleFS()"><i class="fas fa-expand"></i></button>
                        <select class="p-select" onchange="setS(this.value)">
                            <option value="1">1x</option>
                            <option value="1.25">1.25x</option>
                            <option value="1.5">1.5x</option>
                            <option value="2">2x</option>
                        </select>
                    </div>
                </div>
            </div>
            <div id="lessons-list" style="margin-top:25px;"></div>
        </div>
    </div>
</div>

<script>
    const { createClient } = supabase;
    const sb = createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');
    let player;

    // معرف الجهاز لمنع التكرار
    function getDID() {
        let id = localStorage.getItem('did');
        if(!id) { id = 'DEV-'+Math.random().toString(36).substr(2, 9); localStorage.setItem('did', id); }
        return id;
    }

    async function handleLogin() {
        const p = document.getElementById('lp').value.trim();
        const w = document.getElementById('lw').value.trim();
        const { data: u } = await sb.from('students').select('*').eq('student_phone', p).eq('password', w).single();
        
        if (u) {
            const did = getDID();
            if(u.last_device_id && u.last_device_id !== did) return alert("الحساب مفعل على جهاز آخر!");
            await sb.from('students').update({ last_device_id: did }).eq('id', u.id);
            localStorage.setItem('f_id', u.id); localStorage.setItem('f_p', u.student_phone);
            start(u);
        } else alert("بيانات خاطئة");
    }

    async function handleRegister() {
        const { data: u } = await sb.from('students').insert([{ 
            full_name: document.getElementById('rn').value, 
            student_phone: document.getElementById('rp').value, 
            parent_phone: document.getElementById('rpp').value,
            password: document.getElementById('rw').value,
            last_device_id: getDID()
        }]).select().single();
        if(u) start(u); else alert("خطأ في التسجيل");
    }

    function start(u) {
        document.getElementById('u-name').innerText = u.full_name;
        document.getElementById('wm-text').innerText = Array(50).fill(`${u.full_name} | ${u.student_phone}`).join('   ');
        document.getElementById('watermark').classList.add('active');
        showPage('home-page'); loadC();
    }

    async function loadC() {
        const { data: cs } = await sb.from('courses').select('*');
        document.getElementById('courses-container').innerHTML = cs.map(c => {
            const isFree = parseFloat(c.price) === 0;
            return `
            <div class="course-card">
                <span class="price-badge" style="background:${isFree?'#2ecc71':'#1B2347'}">${isFree?'مجاني':'مدفوع'}</span>
                <img src="${c.image_url}" style="width:100%; height:180px; object-fit:cover;">
                <div style="padding:15px; text-align:right">
                    <h3>${c.title}</h3>
                    <button class="btn-main" onclick="openC('${c.id}', '${c.title}', ${isFree})">دخول</button>
                </div>
            </div>`;
        }).join('');
    }

    async function openC(id, title, isFree) {
        if(!isFree) {
            const { data: a } = await sb.from('student_access').select('*').eq('student_phone', localStorage.getItem('f_p')).eq('course_id', id).single();
            if(!a) return alert("يرجى تفعيل الكورس أولاً");
        }
        showPage('content-page');
        const { data: ls } = await sb.from('lessons').select('*').eq('course_id', id).order('id');
        document.getElementById('lessons-list').innerHTML = ls.map((l,i) => `
            <div class="content-item" onclick="playV('${l.video_id}')">
                <span><b>${i+1}.</b> ${l.title}</span> <i class="fas fa-play-circle" style="color:var(--orange); font-size:1.4rem;"></i>
            </div>`).join('');
    }

    function playV(vid) {
        document.getElementById('video-container-wrapper').style.display = 'block';
        window.scrollTo({top:0, behavior:'smooth'});
        if(player) player.destroy();
        player = new YT.Player('yt-player', {
            height: '100%', width: '100%', videoId: vid,
            playerVars: { 'autoplay': 1, 'controls': 0, 'modestbranding': 1, 'rel': 0, 'disablekb': 1 },
            events: {
                'onReady': (e) => e.target.playVideo(),
                'onStateChange': (e) => { document.getElementById('p-play').innerHTML = (e.data == 1) ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>'; }
            }
        });
    }

    // دوال التحكم
    function toggleP() { if(player) player.getPlayerState()==1 ? player.pauseVideo() : player.playVideo(); }
    function seek(s) { if(player) player.seekTo(player.getCurrentTime()+s, true); }
    function setS(v) { if(player) player.setPlaybackRate(parseFloat(v)); }
    function toggleFS() { 
        let e = document.getElementById('fs-target'); 
        if(!document.fullscreenElement) e.requestFullscreen(); else document.exitFullscreen(); 
    }

    function showPage(id) { 
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
        document.getElementById('navbar').classList.toggle('visible', id!=='login-page' && id!=='register-page'); 
    }

    async function handleLogout() {
        const id = localStorage.getItem('f_id');
        if(id) await sb.from('students').update({ last_device_id: null }).eq('id', id);
        localStorage.clear(); location.reload();
    }

    window.onload = async () => {
        const id = localStorage.getItem('f_id');
        if(id) {
            const { data: u } = await sb.from('students').select('*').eq('id', id).single();
            if(u && u.last_device_id === getDID()) start(u); else handleLogout();
        }
    };
</script>
</body>
</html>
