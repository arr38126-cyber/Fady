<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة Dr. Fady Adel | فيزياء</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        :root { --navy: #1B2347; --orange: #E8581A; --bg: #F0F2F5; --card-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; user-select: none; direction: rtl; }
        
        #watermark { display: none; position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.06; overflow: hidden; }
        #watermark.active { display: block; }
        #wm-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); white-space: nowrap; font-weight: 900; color: var(--navy); width: 300%; text-align: center; line-height: 5; }

        nav { display: none; background: var(--navy); padding: 12px 20px; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; color: #fff; }
        nav.visible { display: flex; }
        .nav-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .nav-logo img { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--orange); }

        .container { padding: 20px; max-width: 1000px; margin: 0 auto; }
        .page { display: none; }
        .page.active { display: block; }

        .video-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        #yt-player { width: 100%; height: 100%; position: absolute; top:0; left:0; pointer-events: none; }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; background: transparent; }
        
        .custom-controls { background: #111; padding: 12px; display: flex; align-items: center; gap: 15px; border-radius: 0 0 15px 15px; color: #fff; }
        .play-btn { background: var(--orange); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
        .seek-bar { flex-grow: 1; height: 6px; background: #444; border-radius: 3px; position: relative; cursor: pointer; }
        .seek-fill { height: 100%; background: var(--orange); width: 0%; border-radius: 3px; }

        .price-tag { color: var(--orange); font-weight: 800; font-size: 1.1rem; margin-bottom: 10px; display: block; }
        .auth-card { background: #fff; padding: 30px; border-radius: 20px; box-shadow: var(--card-shadow); text-align: center; max-width: 400px; margin: auto; }
        .input-group { width: 100%; padding: 12px; margin-bottom: 15px; border: 1.5px solid #ddd; border-radius: 10px; font-family: 'Cairo'; text-align: center; outline: none; }
        .btn-main { width: 100%; padding: 12px; background: var(--orange); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        
        .floating-wa { position: fixed; bottom: 20px; right: 20px; background: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 1000; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body oncontextmenu="return false;">

<a href="https://wa.me/201055427975" target="_blank" class="floating-wa"><i class="fab fa-whatsapp"></i></a>
<div id="watermark"><div id="wm-text"></div></div>

<nav id="navbar">
    <div class="nav-logo" onclick="showPage('home-page')">
        <img src="https://i.ibb.co/zT82jk68/image.png">
        <div><div id="nav-user-name" style="font-weight: 800;">تحميل...</div><div style="color: var(--orange); font-size: 0.8rem;">د. فادي عادل</div></div>
    </div>
    <div style="display:flex; gap:10px;">
        <button onclick="showPage('profile-page')" style="background:var(--orange); border:none; color:#fff; padding:6px 12px; border-radius:8px; cursor:pointer;">حسابي</button>
        <button onclick="handleLogout()" style="background:none; border:1px solid #fff; color:#fff; padding:6px 12px; border-radius:8px; cursor:pointer;">خروج</button>
    </div>
</nav>

<div id="app">
    <div id="login-page" class="page active">
        <div style="height:100vh; display:flex; align-items:center; background:var(--navy);">
            <div class="auth-card">
                <img src="https://i.ibb.co/zT82jk68/image.png" style="width: 80px; margin-bottom: 10px; border-radius: 50%;">
                <div class="poetic-line">"تَعَلَّمْ فَلَيْسَ المَرْءُ يُولَدُ عَالِمًا <br> وَلَيْسَ أَخُو عِلْمٍ كَمَنْ هُوَ جَاهِلُ"</div>
                <input type="tel" id="l-phone" placeholder="رقم الموبايل" class="input-group">
                <input type="password" id="l-pass" placeholder="كلمة المرور" class="input-group">
                <button class="btn-main" onclick="handleLogin()">دخول</button>
                <p onclick="showPage('register-page')" style="margin-top:15px; cursor:pointer; color:var(--navy); font-weight:bold;">إنشاء حساب جديد</p>
            </div>
        </div>
    </div>

    <div id="register-page" class="page">
        <div style="height:100vh; display:flex; align-items:center; background:var(--navy);">
            <div class="auth-card">
                <h3>فتح حساب جديد</h3>
                <input type="text" id="r-name" placeholder="الاسم ثلاثي" class="input-group">
                <input type="tel" id="r-phone" placeholder="رقم الموبايل" class="input-group">
                <input type="password" id="r-pass" placeholder="كلمة المرور" class="input-group">
                <button class="btn-main" onclick="handleRegister()">تسجيل</button>
                <p onclick="showPage('login-page')" style="margin-top:15px; cursor:pointer;">رجوع</p>
            </div>
        </div>
    </div>

    <div id="home-page" class="page">
        <div class="container">
            <h2 style="text-align:right; border-right:4px solid var(--orange); padding-right:10px;">الكورسات المتاحة</h2>
            <div id="courses-container" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:20px;"></div>
        </div>
    </div>

    <div id="content-page" class="page">
        <div class="container">
            <button onclick="showPage('home-page')" style="border:none; background:none; cursor:pointer; font-weight:bold; margin-bottom:10px;">🏠 العودة</button>
            <div id="video-section" style="display:none; margin-bottom: 20px;">
                <div class="video-wrapper">
                    <div id="yt-player"></div>
                    <div class="video-overlay" onclick="togglePlay()"></div>
                </div>
                <div class="custom-controls">
                    <button class="play-btn" onclick="togglePlay()"><i id="play-icon" class="fas fa-play"></i></button>
                    <div class="seek-bar" onclick="manualSeek(event)">
                        <div id="seek-fill" class="seek-fill"></div>
                    </div>
                    <span id="video-timer" style="font-size:0.8rem;">00:00</span>
                </div>
            </div>
            <div id="lessons-list"></div>
        </div>
    </div>

    <div id="profile-page" class="page">
        <div class="container">
            <div class="auth-card" style="max-width:100%; text-align:right;">
                <h3>بيانات الطالب</h3>
                <p id="p-name"></p><p id="p-phone"></p>
                <hr>
                <h4>نتائج الامتحانات</h4>
                <div id="grades-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const sb = supabase.createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');
    let ytPlayer, apiReady = false;

    function onYouTubeIframeAPIReady() { apiReady = true; }

    function generateFingerprint() { return btoa(navigator.userAgent + screen.width + navigator.vendor); }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('navbar').classList.toggle('visible', !['login-page', 'register-page'].includes(id));
        if (id !== 'content-page' && ytPlayer && typeof ytPlayer.pauseVideo === 'function') ytPlayer.pauseVideo();
        if (id === 'profile-page') loadProfile();
        checkSecurity();
    }

    async function checkSecurity() {
        const user = JSON.parse(localStorage.getItem('f_user'));
        if (!user) return;
        const { data } = await sb.from('students').select('device_id').eq('student_phone', user.student_phone).single();
        if (data && data.device_id !== generateFingerprint()) {
            alert("⚠️ الحساب مفتوح من جهاز آخر.");
            handleLogout(false);
        }
    }

    async function handleLogin() {
        const phone = document.getElementById('l-phone').value, pass = document.getElementById('l-pass').value;
        const { data } = await sb.from('students').select('*').eq('student_phone', phone).eq('password', pass).single();
        if (data) {
            const currentFP = generateFingerprint();
            if (data.device_id && data.device_id !== currentFP) { alert("الحساب نشط على جهاز آخر."); return; }
            await sb.from('students').update({ device_id: currentFP }).eq('student_phone', phone);
            localStorage.setItem('f_user', JSON.stringify(data));
            startApp(data);
        } else alert("بيانات خاطئة");
    }

    async function handleLogout(clearOnServer = true) {
        const user = JSON.parse(localStorage.getItem('f_user'));
        if (user && clearOnServer) await sb.from('students').update({ device_id: null }).eq('student_phone', user.student_phone);
        localStorage.clear();
        location.reload();
    }

    async function handleRegister() {
        const name = document.getElementById('r-name').value, phone = document.getElementById('r-phone').value, pass = document.getElementById('r-pass').value;
        const { data } = await sb.from('students').insert([{ full_name: name, student_phone: phone, password: pass, device_id: generateFingerprint() }]).select().single();
        if (data) { localStorage.setItem('f_user', JSON.stringify(data)); startApp(data); }
    }

    function startApp(user) {
        document.getElementById('nav-user-name').innerText = user.full_name;
        document.getElementById('wm-text').innerText = Array(20).fill(user.full_name + " " + user.student_phone).join("   ");
        document.getElementById('watermark').classList.add('active');
        showPage('home-page');
        loadCourses();
    }

    async function loadCourses() {
        const { data } = await sb.from('courses').select('*').order('created_at', { ascending: false });
        document.getElementById('courses-container').innerHTML = (data || []).map(c => `
            <div class="auth-card" style="padding:0; overflow:hidden;">
                <img src="${c.image_url}" style="width:100%; height:160px; object-fit:cover;">
                <div style="padding:15px;">
                    <h4>${c.title}</h4>
                    <span class="price-tag">السعر: ${c.price || 0} ج.م</span>
                    <button class="btn-main" onclick="openCourse('${c.id}')">دخول المحاضرات</button>
                </div>
            </div>`).join('');
    }

    async function openCourse(id) {
        showPage('content-page');
        const { data } = await sb.from('lessons').select('*').eq('course_id', id);
        document.getElementById('lessons-list').innerHTML = (data || []).map(l => `
            <div style="background:#fff; padding:15px; margin-bottom:10px; border-radius:12px; display:flex; justify-content:space-between; align-items:center; cursor:pointer;" onclick="playVideo('${l.video_id}')">
                <span>${l.title}</span><i class="fas fa-play-circle" style="color:var(--orange); font-size: 1.4rem;"></i>
            </div>`).join('');
    }

    // -- تم التعديل على هذه الدالة فقط لحل مشكلة التحميل المستمر --
    function playVideo(vId) {
        if (!apiReady) {
            alert("برجاء الانتظار ثوانٍ حتى يكتمل تحميل المشغل، ثم اضغط مرة أخرى.");
            return;
        }
        document.getElementById('video-section').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
        
        // إذا كان المشغل موجوداً بالفعل، قم بتغيير الفيديو بدلاً من تدمير المشغل
        if (ytPlayer && typeof ytPlayer.loadVideoById === 'function') {
            ytPlayer.loadVideoById(vId);
        } else {
            // إنشاء المشغل لأول مرة
            ytPlayer = new YT.Player('yt-player', {
                videoId: vId,
                playerVars: { 
                    'autoplay': 1, 
                    'controls': 0, 
                    'rel': 0, 
                    'modestbranding': 1, 
                    'playsinline': 1, // لحل مشكلة التعليق على الموبايل
                    'origin': window.location.origin 
                },
                events: {
                    'onReady': (e) => { 
                        e.target.playVideo(); 
                        if (!window.uiTimer) {
                            window.uiTimer = setInterval(updateUI, 1000); 
                        }
                    },
                    'onStateChange': (e) => { 
                        document.getElementById('play-icon').className = (e.data === 1) ? 'fas fa-pause' : 'fas fa-play'; 
                    }
                }
            });
        }
    }
    // -------------------------------------------------------------

    function togglePlay() { if (ytPlayer && typeof ytPlayer.getPlayerState === 'function') (ytPlayer.getPlayerState() === 1) ? ytPlayer.pauseVideo() : ytPlayer.playVideo(); }

    function updateUI() {
        if (ytPlayer && typeof ytPlayer.getCurrentTime === 'function') {
            const cur = ytPlayer.getCurrentTime(), dur = ytPlayer.getDuration();
            if (dur > 0) {
                document.getElementById('seek-fill').style.width = (cur/dur * 100) + '%';
                document.getElementById('video-timer').innerText = Math.floor(cur/60) + ":" + ("0"+Math.floor(cur%60)).slice(-2);
            }
        }
    }

    function manualSeek(e) {
        if (ytPlayer && typeof ytPlayer.getDuration === 'function') {
            const pct = (e.pageX - e.currentTarget.offsetLeft) / e.currentTarget.offsetWidth;
            ytPlayer.seekTo(pct * ytPlayer.getDuration());
        }
    }

    async function loadProfile() {
        const user = JSON.parse(localStorage.getItem('f_user'));
        document.getElementById('p-name').innerText = "الاسم: " + user.full_name;
        document.getElementById('p-phone').innerText = "الموبايل: " + user.student_phone;
        const { data } = await sb.from('exam_results').select('*').eq('student_phone', user.student_phone);
        document.getElementById('grades-list').innerHTML = (data || []).map(g => `<p>${g.exam_title}: <b>${g.score}%</b></p>`).join('');
    }

    window.onload = () => {
        const user = localStorage.getItem('f_user');
        if (user) startApp(JSON.parse(user));
    }
</script>
</body>
</html>
