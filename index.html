<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة Dr. Fady Adel | فيزياء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --navy: #1B2347; --orange: #E8581A; --bg: #F0F2F5; --green: #2ecc71; --red: #e74c3c; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; direction: rtl; user-select: none; }
        
        /* تحسين شكل الكورس ليعرض الصورة */
        .course-card-new { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; position: relative; }
        .course-img { width: 100%; height: 160px; object-fit: cover; background: #eee; }
        .course-info { padding: 15px; }

        /* ستايل مشغل الفيديو */
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 15px; background: #000; margin-bottom: 20px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        /* باقي التنسيقات (الموجودة في كودك الأصلي) */
        #watermark { position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.06; display: none; }
        #watermark.active { display: block; }
        #wm-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); white-space: nowrap; font-size: 1.2rem; line-height: 6; width: 300%; text-align: center; color: var(--navy); font-weight: 900; }
        nav { display: none; background: var(--navy); padding: 10px 15px; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; color: #fff; }
        nav.visible { display: flex; }
        .container { padding: 15px; max-width: 1100px; margin: 0 auto; }
        .page { display: none; }
        .page.active { display: block; }
        .auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--navy); padding: 20px; }
        .auth-card { background: #fff; width: 100%; max-width: 400px; border-radius: 25px; padding: 30px; text-align: center; }
        .input-group { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 12px; text-align: center; font-family: 'Cairo'; }
        .btn-main { background: var(--orange); color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-family: 'Cairo'; font-weight: 800; width: 100%; }
        .card { background: #fff; border-radius: 14px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-right: 5px solid var(--orange); cursor: pointer; }
        .review-q { background: #fff; padding: 18px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #eee; }
        .opt-review { display: block; width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 2px solid #f0f0f0; text-align: right; font-weight: 600; background: none; cursor: pointer; }
        .opt-correct { border-color: var(--green) !important; background: #eafff2 !important; }
        .opt-wrong { border-color: var(--red) !important; background: #fff1f0 !important; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="watermark"><div id="wm-text"></div></div>

<nav id="navbar">
    <div style="display:flex; align-items:center; gap:10px;">
        <img src="https://i.ibb.co/zT82jk68/image.png" width="35" style="border-radius:50%">
        <span id="nav-user-name"></span>
    </div>
    <div style="display:flex; gap:8px;">
        <button class="btn-main" style="padding: 5px 10px; font-size: 0.8rem;" onclick="showPage('home-page')">الرئيسية</button>
        <button class="btn-main" style="padding: 5px 10px; font-size: 0.8rem; background: #3498db;" onclick="loadProfile()">نتائجي</button>
        <button onclick="handleLogout()" style="background:none; border:none; color:red;"><i class="fas fa-power-off"></i></button>
    </div>
</nav>

<div id="app">
    <div id="login-page" class="page active">
        <div class="auth-screen">
            <div class="auth-card">
                <img src="https://i.ibb.co/zT82jk68/image.png" width="80" style="border-radius:50%">
                <h3>تسجيل الدخول</h3>
                <input type="tel" id="l-phone" placeholder="رقم الموبايل" class="input-group">
                <input type="password" id="l-pass" placeholder="كلمة المرور" class="input-group">
                <button class="btn-main" onclick="handleLogin()">دخول</button>
            </div>
        </div>
    </div>

    <div id="home-page" class="page">
        <div class="container">
            <h3>الكورسات المتاحة</h3>
            <div id="courses-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:20px;"></div>
        </div>
    </div>

    <div id="content-page" class="page">
        <div class="container">
            <button onclick="showPage('home-page')" style="margin-bottom:10px; border:none; background:none; color:var(--navy); font-weight:bold;"><i class="fas fa-arrow-right"></i> عودة للكورسات</button>
            <h3 id="c-title-display"></h3>
            <div id="lessons-list"></div>
        </div>
    </div>

    <div id="video-page" class="page">
        <div class="container">
            <button onclick="showPage('content-page')" style="margin-bottom:10px; border:none; background:none;"><i class="fas fa-arrow-right"></i> العودة للمحتوى</button>
            <h3 id="v-title-display"></h3>
            <div id="video-player-area"></div>
        </div>
    </div>

    <div id="exam-page" class="page">
        <div class="container">
            <div style="position: sticky; top: 60px; background: var(--orange); color: white; padding: 10px; border-radius: 10px; z-index: 10; margin-bottom: 20px;">
                الزمن المتبقي: <span id="exam-timer">--:--</span>
            </div>
            <div id="exam-area"></div>
            <button class="btn-main" onclick="finishExam()">تسليم الامتحان الآن</button>
        </div>
    </div>

    <div id="profile-page" class="page">
        <div class="container">
            <div style="background:var(--navy); color:white; padding:20px; border-radius:15px; text-align:center;">
                <h3 id="prof-name"></h3>
                <p id="prof-phone"></p>
            </div>
            <h4>سجل اختباراتك</h4>
            <div id="results-list"></div>
        </div>
    </div>

    <div id="review-page" class="page">
        <div class="container">
            <button onclick="loadProfile()" class="btn-main" style="background:var(--navy); margin-bottom:20px;">العودة لنتائجي</button>
            <div id="review-area"></div>
        </div>
    </div>
</div>

<script>
    const { createClient } = supabase;
    const sb = createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');

    let userData, currentExam, examTimer, answers = {}, timerSecs;

    // --- 1. نظام الدخول ---
    async function handleLogin() {
        const phone = document.getElementById('l-phone').value;
        const pass = document.getElementById('l-pass').value;
        const { data: user } = await sb.from('students').select('*').eq('student_phone', phone).eq('password', pass).single();
        if(user) { 
            localStorage.setItem('sid', user.id); 
            setupUser(user); 
        } else alert("بياناتك غير صحيحة");
    }

    function setupUser(user) {
        userData = user;
        document.getElementById('nav-user-name').innerText = user.full_name;
        document.getElementById('wm-text').innerText = Array(20).fill(user.full_name + " " + user.student_phone).join("   ");
        document.getElementById('watermark').classList.add('active');
        showPage('home-page');
        loadCourses();
    }

    // --- 2. عرض الكورسات بالصور ---
    async function loadCourses() {
        const { data: access } = await sb.from('student_access').select('course_id').eq('student_phone', userData.student_phone);
        const myCourseIds = access.map(a => a.course_id);
        const { data: cs } = await sb.from('courses').select('*').in('id', myCourseIds);

        document.getElementById('courses-grid').innerHTML = cs.map(c => `
            <div class="course-card-new" onclick="openCourse('${c.id}', '${c.title}')">
                <img src="${c.image_url || 'https://via.placeholder.com/300x160'}" class="course-img">
                <div class="course-info">
                    <b style="font-size:1.1rem">${c.title}</b>
                    <div style="color:var(--orange); font-weight:bold; margin-top:5px;">تم الاشتراك</div>
                </div>
            </div>`).join('');
    }

    // --- 3. فتح المحتوى (فيديو وامتحان) ---
    async function openCourse(id, title) {
        document.getElementById('c-title-display').innerText = title;
        showPage('content-page');
        const { data:ls } = await sb.from('lessons').select('*').eq('course_id', id);
        const { data:ex } = await sb.from('exams').select('*').eq('course_id', id);
        
        let h = '<h4>المحاضرات المرئية</h4>';
        ls?.forEach(l => {
            h += `<div class="card" onclick="playVideo('${l.title}', '${l.video_id}')">
                    <span><i class="fas fa-play-circle" style="color:var(--orange)"></i> ${l.title}</span>
                    <small>مشاهدة المحاضرة</small>
                  </div>`;
        });
        h += '<h4 style="margin-top:20px;">الاختبارات الإلكترونية</h4>';
        ex?.forEach(e => {
            h += `<div class="card" style="border-right-color:var(--green)" onclick='prepareExam(${JSON.stringify(e)})'>
                    <span><i class="fas fa-edit" style="color:var(--green)"></i> ${e.title}</span>
                    <small>ابدأ الاختبار</small>
                  </div>`;
        });
        document.getElementById('lessons-list').innerHTML = h;
    }

    function playVideo(title, vidId) {
        document.getElementById('v-title-display').innerText = title;
        document.getElementById('video-player-area').innerHTML = `
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/${vidId}?rel=0&modestbranding=1" allowfullscreen></iframe>
            </div>`;
        showPage('video-page');
    }

    // --- 4. نظام الامتحانات والتايمر ---
    function prepareExam(e) {
        currentExam = e; 
        answers = {};
        showPage('exam-page');
        const qs = typeof e.questions === 'string' ? JSON.parse(e.questions) : e.questions;
        
        // تشغيل التايمر
        timerSecs = (e.duration_minutes || 30) * 60;
        examTimer = setInterval(() => {
            let m = Math.floor(timerSecs / 60);
            let s = timerSecs % 60;
            document.getElementById('exam-timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if(timerSecs <= 0) finishExam();
            timerSecs--;
        }, 1000);

        document.getElementById('exam-area').innerHTML = qs.map((q,i) => `
            <div class="review-q">
                <p style="font-weight:bold;">س ${i+1}: ${q.text}</p>
                ${q.options.map((o,oi) => `
                    <button class="opt-review" id="q${i}_o${oi}" onclick="selectAns(${i},${oi+1})">${o}</button>
                `).join('')}
            </div>`).join('');
    }

    function selectAns(q, a) {
        answers[q] = a;
        document.querySelectorAll(`[id^="q${q}_"]`).forEach(b => b.style.borderColor = "#f0f0f0");
        document.getElementById(`q${q}_o${a-1}`).style.borderColor = "var(--orange)";
    }

    async function finishExam() {
        if(!confirm("هل أنت متأكد من تسليم إجاباتك؟")) return;
        clearInterval(examTimer);
        const qs = typeof currentExam.questions === 'string' ? JSON.parse(currentExam.questions) : currentExam.questions;
        let score = 0;
        qs.forEach((q, i) => { if(answers[i] == q.correct) score++; });
        const final = Math.round((score/qs.length)*100);

        // إرسال النتيجة مع تخزين بيانات الأسئلة للمراجعة
        await sb.from('exam_results').insert([{ 
            student_phone: userData.student_phone, 
            exam_name: currentExam.title, 
            score: final,
            student_answers: JSON.stringify(answers),
            exam_data: JSON.stringify(currentExam)
        }]);

        alert(`تم التسليم! درجتك: ${final}%`);
        loadProfile();
    }

    // --- 5. البروفايل ومراجعة الإجابات ---
    async function loadProfile() {
        showPage('profile-page');
        document.getElementById('prof-name').innerText = userData.full_name;
        document.getElementById('prof-phone').innerText = userData.student_phone;
        const { data: results } = await sb.from('exam_results').select('*').eq('student_phone', userData.student_phone).order('created_at', {ascending:false});
        
        document.getElementById('results-list').innerHTML = results?.map(r => `
            <div class="card" style="flex-direction:column; align-items:flex-start;">
                <div style="display:flex; justify-content:space-between; width:100%; margin-bottom:10px;">
                    <b>${r.exam_name}</b>
                    <span style="color:var(--orange); font-weight:900;">${r.score}%</span>
                </div>
                <button class="btn-main" onclick='showReview(${JSON.stringify(r)})' style="padding:5px; font-size:0.8rem; background:var(--navy)">مراجعة الأسئلة</button>
            </div>`).join('') || "لا توجد نتائج بعد";
    }

    function showReview(res) {
        showPage('review-page');
        const exam = typeof res.exam_data === 'string' ? JSON.parse(res.exam_data) : res.exam_data;
        const stAns = typeof res.student_answers === 'string' ? JSON.parse(res.student_answers) : res.student_answers;
        const qs = typeof exam.questions === 'string' ? JSON.parse(exam.questions) : exam.questions;

        document.getElementById('review-area').innerHTML = qs.map((q, i) => `
            <div class="review-q">
                <p><b>س ${i+1}:</b> ${q.text}</p>
                ${q.options.map((opt, oi) => {
                    let cls = '';
                    if(oi+1 == q.correct) cls = 'opt-correct';
                    else if(oi+1 == stAns[i]) cls = 'opt-wrong';
                    return `<div class="opt-review ${cls}">${opt} ${oi+1==q.correct?' <i class="fas fa-check"></i>':''}</div>`;
                }).join('')}
            </div>`).join('');
    }

    // --- 6. التنقل وتسجيل الخروج ---
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('navbar').classList.toggle('visible', id !== 'login-page');
        if(id !== 'video-page') document.getElementById('video-player-area').innerHTML = ''; // إيقاف الفيديو عند الخروج
    }

    function handleLogout() { localStorage.clear(); location.reload(); }

    window.onload = async () => {
        const sid = localStorage.getItem('sid');
        if(sid) {
            const { data: user } = await sb.from('students').select('*').eq('id', sid).single();
            if(user) setupUser(user);
        }
    };
</script>
</body>
</html>
