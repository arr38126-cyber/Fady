<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة Dr. Fady Adel | فيزياء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --navy: #1B2347; --orange: #E8581A; --bg: #F0F2F5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; user-select: none; overflow-x: hidden; color: #333; }

        /* نافذة الفيديو - تم التأكد من إغلاقها افتراضياً */
        #video-modal { 
            display: none !important; /* ضمان الاختفاء */
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200000; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
        #video-modal.active { display: flex !important; }
        
        .video-wrapper { position: relative; width: 95%; max-width: 850px; aspect-ratio: 16/9; background: #000; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        #video-wm-float { position: absolute; color: rgba(255,255,255,0.3); font-size: 14px; pointer-events: none; z-index: 100; white-space: nowrap; transition: all 1s linear; }
        iframe { border: none; width: 100%; height: 100%; }
        .close-video { position: absolute; top: -45px; right: 0; color: #fff; font-size: 35px; cursor: pointer; }

        /* بقية التنسيقات */
        #watermark { display: none; position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.05; overflow: hidden; }
        #watermark.active { display: block; }
        nav { display: none; background: var(--navy); padding: 12px 20px; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; color: #fff; }
        nav.visible { display: flex; }
        .auth-quote { font-family: 'Amiri', serif; color: var(--orange); background: rgba(232,88,26,0.06); padding: 15px; border-radius: 15px; margin-bottom: 25px; border-right: 4px solid var(--orange); text-align: center; }
        .page { display: none; min-height: 90vh; }
        .page.active { display: block; }
        .auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--navy); padding: 20px; }
        .auth-card { background: #fff; width: 100%; max-width: 400px; border-radius: 25px; padding: 30px; text-align: center; }
        .input-group input { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 15px; font-family: 'Cairo'; }
        .btn-main { width: 100%; padding: 14px; background: var(--orange); color: #fff; border: none; border-radius: 12px; cursor: pointer; font-weight: 800; font-family: 'Cairo'; font-size: 1.1rem; }
        .course-card { background: #fff; border-radius: 20px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .content-item { background: #fff; padding: 15px; margin-bottom: 10px; border-radius: 12px; display: flex; justify-content: space-between; cursor: pointer; border-right: 5px solid var(--orange); }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="watermark"><div id="wm-text" style="transform: rotate(-30deg); white-space: nowrap;"></div></div>

<div id="video-modal">
    <div class="video-wrapper">
        <span class="close-video" onclick="closeVideo()">&times;</span>
        <div id="video-wm-float"></div>
        <div id="video-container" style="width:100%; height:100%;"></div>
    </div>
</div>

<nav id="navbar">
    <div style="display:flex; align-items:center; gap:10px;">
        <img src="https://i.ibb.co/zT82jk68/image.png" width="40" style="border-radius:50%">
        <div id="nav-user-name" style="font-weight:bold"></div>
    </div>
    <button style="background:none; border:1px solid #fff; color:#fff; padding:5px 10px; border-radius:8px;" onclick="handleLogout()">خروج</button>
</nav>

<div id="app">
    <div id="login-page" class="page active">
        <div class="auth-screen">
            <div class="auth-card">
                <img src="https://i.ibb.co/zT82jk68/image.png" width="80">
                <div class="auth-quote">"وَمَنْ لا يُحِبُّ صُعُودَ الجِبَالِ<br>يَعِشْ أَبَدَ الدَّهْرِ بَيْنَ الحُفَرِ"</div>
                <input type="tel" id="l-phone" placeholder="رقم الموبايل" class="input-group">
                <input type="password" id="l-pass" placeholder="كلمة المرور" class="input-group">
                <button class="btn-main" onclick="handleLogin()">دخول المنصة</button>
                <p onclick="showPage('register-page')" style="cursor:pointer; margin-top:15px; font-size:0.9rem;">إنشاء حساب جديد</p>
            </div>
        </div>
    </div>

    <div id="register-page" class="page">
        <div class="auth-screen">
            <div class="auth-card">
                <h3>تسجيل طالب جديد</h3>
                <input type="text" id="r-name" placeholder="الاسم" class="input-group">
                <input type="tel" id="r-phone" placeholder="الموبايل" class="input-group">
                <input type="password" id="r-pass" placeholder="كلمة المرور" class="input-group">
                <button class="btn-main" onclick="handleRegister()">تأكيد</button>
                <p onclick="showPage('login-page')" style="cursor:pointer; margin-top:10px;">رجوع</p>
            </div>
        </div>
    </div>

    <div id="home-page" class="page">
        <div style="padding:20px;">
            <h2 style="text-align:right">كورساتي</h2>
            <div id="courses-container"></div>
        </div>
    </div>

    <div id="content-page" class="page">
        <div style="padding:20px;">
            <button onclick="showPage('home-page')" style="margin-bottom:15px;">⬅ رجوع</button>
            <div id="content-list"></div>
        </div>
    </div>
</div>

<script>
    const { createClient } = supabase;
    const sb = createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');
    let wmInterval, checkInterval;

    function getDeviceId() {
        let id = localStorage.getItem('fady_device_id') || `D-${Math.random().toString(36).substr(2, 9)}`;
        localStorage.setItem('fady_device_id', id);
        return id;
    }

    async function handleLogin() {
        const phone = document.getElementById('l-phone').value.trim();
        const pass = document.getElementById('l-pass').value.trim();
        const { data: user } = await sb.from('students').select('*').eq('student_phone', phone).eq('password', pass).single();
        
        if (user) {
            await sb.from('students').update({ last_device_id: getDeviceId() }).eq('id', user.id);
            localStorage.setItem('fady_session', user.id);
            localStorage.setItem('fady_phone', user.student_phone);
            startSession(user);
        } else alert("بيانات خاطئة");
    }

    function startSession(user) {
        document.getElementById('nav-user-name').innerText = user.full_name;
        document.getElementById('wm-text').innerText = Array(50).fill(`${user.full_name} ${user.student_phone}`).join('   ');
        document.getElementById('watermark').classList.add('active');
        showPage('home-page');
        loadCourses();
        
        // يبدأ الفحص فقط بعد تسجيل الدخول بنجاح
        if (checkInterval) clearInterval(checkInterval);
        checkInterval = setInterval(async () => {
            const { data } = await sb.from('students').select('last_device_id').eq('id', user.id).single();
            if(data && data.last_device_id !== getDeviceId()) handleLogout();
        }, 20000);
    }

    async function loadCourses() {
        const { data } = await sb.from('courses').select('*');
        document.getElementById('courses-container').innerHTML = data.map(c => `
            <div class="course-card">
                <div style="padding:15px; text-align:right;">
                    <h3>${c.title}</h3>
                    <button class="btn-main" onclick="openCourse('${c.id}')">فتح الكورس</button>
                </div>
            </div>`).join('');
    }

    async function openCourse(id) {
        const { data } = await sb.from('lessons').select('*').eq('course_id', id);
        showPage('content-page');
        document.getElementById('content-list').innerHTML = data.map(l => `
            <div class="content-item" onclick="viewVideo('${l.video_id}')">
                <span>${l.title}</span>
                <i class="fas fa-play-circle"></i>
            </div>`).join('');
    }

    function viewVideo(vId) {
        const modal = document.getElementById('video-modal');
        const wmFloat = document.getElementById('video-wm-float');
        modal.classList.add('active');
        wmFloat.innerText = localStorage.getItem('fady_phone');

        document.getElementById('video-container').innerHTML = `
            <iframe src="https://www.youtube.com/embed/${vId}?autoplay=1&rel=0" allow="autoplay" allowfullscreen></iframe>`;

        if (wmInterval) clearInterval(wmInterval);
        wmInterval = setInterval(() => {
            wmFloat.style.top = Math.random() * 80 + "%";
            wmFloat.style.left = Math.random() * 80 + "%";
        }, 3000);
    }

    function closeVideo() {
        document.getElementById('video-container').innerHTML = '';
        document.getElementById('video-modal').classList.remove('active');
        clearInterval(wmInterval);
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('navbar').classList.toggle('visible', id !== 'login-page' && id !== 'register-page');
    }

    function handleLogout() {
        clearInterval(checkInterval);
        localStorage.clear();
        location.reload();
    }

    window.onload = async () => {
        const id = localStorage.getItem('fady_session');
        if (id) {
            const { data: user } = await sb.from('students').select('*').eq('id', id).single();
            if (user && user.last_device_id === getDeviceId()) startSession(user);
            else handleLogout();
        }
    };
</script>
</body>
</html>
