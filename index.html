<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة Dr. Fady Adel | فيزياء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --navy: #1B2347; --orange: #E8581A; --bg: #F0F2F5; --card-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; user-select: none; overflow-x: hidden; color: #333; }

        body.security-blur { filter: blur(35px) brightness(0.2) !important; pointer-events: none !important; }
        #watermark { display: none; position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.08; overflow: hidden; }
        #watermark.active { display: block; }
        #wm-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); white-space: nowrap; font-weight: 900; font-size: 1.2rem; line-height: 5; width: 300%; text-align: center; color: var(--navy); }

        nav { display: none; background: var(--navy); padding: 12px 20px; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; color: #fff; }
        nav.visible { display: flex; }
        .nav-logo { display: flex; align-items: center; gap: 10px; }
        .nav-logo img { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--orange); }

        .video-wrap { background: #000; border-radius: 20px; overflow: hidden; margin-bottom: 10px; position: relative; padding-bottom: 56.25%; height: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.4); border: 2px solid var(--navy); }
        .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; pointer-events: none; z-index: 1; } 
        .yt-full-shield { position: absolute; inset: 0; z-index: 100; cursor: default; }

        .custom-controls { background: var(--navy); border-radius: 15px; padding: 12px; display: flex; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 25px; }
        .ctrl-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 1.4rem; transition: 0.2s; }
        .ctrl-btn:hover { color: var(--orange); }
        .speed-select { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; padding: 5px 10px; font-family: 'Cairo'; }

        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .page { display: none; }
        .page.active { display: block; }
        .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .course-card { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: var(--card-shadow); position: relative; padding-bottom: 15px; }
        .price-badge { position: absolute; top: 10px; left: 10px; padding: 4px 10px; border-radius: 8px; color: #fff; font-size: 0.8rem; font-weight: bold; z-index: 10; }
        .content-item { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border-right: 5px solid var(--orange); cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-main { width: 90%; margin: 0 auto; display: block; padding: 12px; background: var(--orange); color: #fff; border: none; border-radius: 12px; cursor: pointer; font-weight: 800; font-family: 'Cairo'; }
        
        .auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--navy); padding: 20px; }
        .auth-card { background: #fff; width: 100%; max-width: 400px; border-radius: 25px; padding: 30px; text-align: center; }
        .input-group input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 12px; text-align: center; font-family: 'Cairo'; outline: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="watermark"><div id="wm-text"></div></div>

<nav id="navbar">
    <div class="nav-logo"><img src="https://i.ibb.co/zT82jk68/image.png"><div><div id="nav-user-name" style="font-weight: 800;">..</div><div style="color: var(--orange); font-size: 0.8rem;">فيزياء - د. فادي عادل</div></div></div>
    <button style="background:none; border:1px solid #fff; color:#fff; padding:6px 12px; border-radius:8px;" onclick="handleLogout()">خروج</button>
</nav>

<div id="app">
    <div id="login-page" class="page active">
        <div class="auth-screen"><div class="auth-card">
            <img src="https://i.ibb.co/zT82jk68/image.png" width="70" style="border-radius:50%; margin-bottom:15px;">
            <h3>تسجيل الدخول</h3>
            <input type="tel" id="l-phone" placeholder="رقم الموبايل" class="input-group">
            <input type="password" id="l-pass" placeholder="كلمة المرور" class="input-group">
            <button class="btn-main" onclick="handleLogin()">دخول للمنصة</button>
            <p onclick="showPage('register-page')" style="cursor:pointer; margin-top:15px; font-weight:700;">إنشاء حساب جديد</p>
        </div></div>
    </div>

    <div id="register-page" class="page">
        <div class="auth-screen"><div class="auth-card">
            <h3>حساب جديد</h3>
            <input type="text" id="r-name" placeholder="الاسم ثلاثي" class="input-group">
            <input type="tel" id="r-phone" placeholder="رقم الموبايل" class="input-group">
            <input type="tel" id="r-parent" placeholder="رقم ولي الأمر" class="input-group">
            <input type="password" id="r-pass" placeholder="كلمة المرور" class="input-group">
            <button class="btn-main" onclick="handleRegister()">تأكيد</button>
            <p onclick="showPage('login-page')" style="cursor:pointer; margin-top:10px;">رجوع</p>
        </div></div>
    </div>

    <div id="home-page" class="page">
        <div class="container">
            <h2 style="text-align: right; border-right: 5px solid var(--orange); padding-right: 15px;">محاضراتي</h2>
            <div id="courses-container" class="course-grid"></div>
        </div>
    </div>

    <div id="content-page" class="page">
        <div class="container">
            <button onclick="showPage('home-page')" style="margin-bottom:15px; border:none; background:none; color:var(--orange); font-weight:bold;">← العودة</button>
            <div id="video-wrapper" style="display:none;">
                <div class="video-wrap"><div class="yt-full-shield"></div><div id="player"></div></div>
                <div class="custom-controls">
                    <button class="ctrl-btn" onclick="seekVideo(-10)"><i class="fas fa-backward"></i></button>
                    <button class="ctrl-btn" id="play-pause-btn" onclick="togglePlay()"><i class="fas fa-play"></i></button>
                    <button class="ctrl-btn" onclick="seekVideo(10)"><i class="fas fa-forward"></i></button>
                    <button class="ctrl-btn" onclick="toggleFullscreen()"><i class="fas fa-expand"></i></button>
                    <select class="speed-select" onchange="changeSpeed(this.value)"><option value="1">1x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option><option value="2">2x</option></select>
                </div>
            </div>
            <div id="lessons-list"></div>
        </div>
    </div>
</div>

<script>
    const { createClient } = supabase;
    const sb = createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');
    let player;

    async function loadCourses() {
        const { data: courses } = await sb.from('courses').select('*');
        document.getElementById('courses-container').innerHTML = courses.map(c => {
            const isFree = parseFloat(c.price) === 0;
            return `
            <div class="course-card">
                <span class="price-badge" style="background:${isFree ? '#2ecc71' : '#1B2347'}">${isFree ? 'مجاني' : 'مدفوع'}</span>
                <img src="${c.image_url || 'https://via.placeholder.com/300x170/1B2347/fff'}" style="width:100%; height:170px; object-fit:cover;">
                <div style="padding:15px; text-align:right">
                    <h3>${c.title}</h3>
                    <button class="btn-main" onclick="openCourse('${c.id}', '${c.title}', ${isFree})">دخول</button>
                </div>
            </div>`;
        }).join('');
    }

    async function openCourse(id, title, isFree) {
        if (!isFree) {
            const { data: access } = await sb.from('student_access').select('*').eq('student_phone', localStorage.getItem('fady_phone')).eq('course_id', id).single();
            if (!access) return alert("يرجى تفعيل الكورس أولاً");
        }
        showPage('content-page');
        const { data: lessons } = await sb.from('lessons').select('*').eq('course_id', id).order('id');
        document.getElementById('lessons-list').innerHTML = lessons.map((l, i) => `
            <div class="content-item" onclick="playVideo('${l.video_id || l.youtube_url}')">
                <b>${i+1}. ${l.title}</b> <i class="fas fa-play-circle" style="color:var(--orange)"></i>
            </div>`).join('');
    }

    function playVideo(urlOrId) {
        let vId = urlOrId.includes('v=') ? urlOrId.split('v=')[1].split('&')[0] : (urlOrId.includes('be/') ? urlOrId.split('be/')[1] : urlOrId);
        document.getElementById('video-wrapper').style.display = 'block';
        if (player && player.loadVideoById) { player.loadVideoById(vId); }
        else {
            player = new YT.Player('player', { height: '100%', width: '100%', videoId: vId, playerVars: { 'autoplay': 1, 'controls': 0, 'modestbranding': 1, 'rel': 0, 'disablekb': 1, 'iv_load_policy': 3 },
                events: { 'onReady': (e) => e.target.playVideo(), 'onStateChange': (e) => {
                    const btn = document.getElementById('play-pause-btn');
                    btn.innerHTML = e.data == YT.PlayerState.PLAYING ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
                }}
            });
        }
    }

    function togglePlay() { if(player) player.getPlayerState() == 1 ? player.pauseVideo() : player.playVideo(); }
    function seekVideo(s) { if(player) player.seekTo(player.getCurrentTime() + s, true); }
    function changeSpeed(v) { if(player) player.setPlaybackRate(parseFloat(v)); }
    function toggleFullscreen() { let w = document.querySelector('.video-wrap'); if(w.requestFullscreen) w.requestFullscreen(); else if(w.webkitRequestFullscreen) w.webkitRequestFullscreen(); }

    async function handleLogin() {
        const phone = document.getElementById('l-phone').value.trim();
        const pass = document.getElementById('l-pass').value.trim();
        const { data: user } = await sb.from('students').select('*').eq('student_phone', phone).eq('password', pass).single();
        if (user) { localStorage.setItem('fady_session', user.id); localStorage.setItem('fady_phone', user.student_phone); startSession(user); }
        else alert("بيانات خاطئة");
    }

    async function handleRegister() {
        const { data } = await sb.from('students').insert([{ full_name: document.getElementById('r-name').value, student_phone: document.getElementById('r-phone').value, parent_phone: document.getElementById('r-parent').value, password: document.getElementById('r-pass').value }]).select().single();
        if (data) startSession(data);
    }

    function startSession(user) {
        document.getElementById('nav-user-name').innerText = user.full_name;
        document.getElementById('wm-text').innerText = Array(40).fill(`${user.full_name} | ${user.student_phone} `).join('    ');
        document.getElementById('watermark').classList.add('active');
        showPage('home-page'); loadCourses();
    }

    function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); document.getElementById('navbar').classList.toggle('visible', id !== 'login-page' && id !== 'register-page'); }
    function handleLogout() { localStorage.clear(); location.reload(); }
    window.onload = async () => { if(localStorage.getItem('fady_session')) { const { data: u } = await sb.from('students').select('*').eq('id', localStorage.getItem('fady_session')).single(); if(u) startSession(u); } };
</script>
</body>
</html>
