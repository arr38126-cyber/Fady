<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel | Dr: Fady Adel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --navy: #050a0f; --gold: #c9972b; --white: #fff; --card: #0d1621; --brd: rgba(201, 151, 43, 0.3); }
        body { font-family: 'Cairo', sans-serif; background: var(--navy); color: var(--white); padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .section { background: var(--card); border: 1px solid var(--brd); padding: 20px; border-radius: 15px; margin-bottom: 25px; }
        h2, h3 { color: var(--gold); margin-bottom: 15px; border-bottom: 1px solid var(--brd); padding-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--brd); border-radius: 8px; color: white; outline: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        .btn-gold { background: var(--gold); color: var(--navy); }
        .btn-red { background: #e74c3c; color: white; }
        .btn-blue { background: #3498db; color: white; }
        .list-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; margin-bottom: 5px; border-left: 3px solid var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color:var(--gold); margin-bottom:30px;">لوحة تحكم المنصة 🛠️</h1>

    <div class="section">
        <h3>📂 إدارة الكورسات والأسعار</h3>
        <input type="text" id="courseTitle" placeholder="عنوان الكورس الجديد">
        <input type="number" id="coursePrice" placeholder="سعر الكورس (اكتب 0 للمجاني)">
        <button class="btn btn-gold" onclick="addCourse()">إضافة كورس</button>
        <div id="coursesList" style="margin-top:15px;"></div>
    </div>

    <div class="section">
        <h3>🎥 إضافة محاضرة جديدة</h3>
        <select id="targetCourse"></select>
        <input type="text" id="lessonTitle" placeholder="عنوان المحاضرة">
        <input type="text" id="videoId" placeholder="ID فيديو اليوتيوب">
        <input type="text" id="pdfUrl" placeholder="رابط ملف الـ PDF (اختياري)">
        <button class="btn btn-gold" onclick="addLesson()">إضافة المحاضرة</button>
    </div>

    <div class="section">
        <h3>🔓 تفعيل اشتراك طالب (للكورسات المدفوعة)</h3>
        <input type="tel" id="studentPhone" placeholder="رقم موبايل الطالب">
        <select id="courseToActivate"></select>
        <button class="btn btn-blue" onclick="activateCourse()">تفعيل الآن</button>
    </div>

    <div class="section" style="border-color: #3498db;">
        <h3 style="color:#3498db">📱 إدارة أجهزة الطلاب (تصفير الدخول)</h3>
        <input type="tel" id="logoutStudentPhone" placeholder="رقم موبايل الطالب">
        <button class="btn btn-blue" onclick="forceLogout()">تسجيل خروج من جميع الأجهزة</button>
    </div>

    <div class="section">
        <h3>📝 إضافة امتحان لمحاضرة</h3>
        <select id="targetLesson"></select>
        <input type="number" id="examDuration" placeholder="مدة الامتحان بالدقائق">
        <div id="questionsArea">
            <div class="question-block" style="border:1px dashed var(--gold); padding:10px; margin-bottom:10px;">
                <input type="text" placeholder="نص السؤال" class="q-text">
                <input type="text" placeholder="رابط الصورة (اختياري)" class="q-img">
                <input type="text" placeholder="الاختيار 1" class="opt">
                <input type="text" placeholder="الاختيار 2" class="opt">
                <input type="text" placeholder="الاختيار 3" class="opt">
                <input type="text" placeholder="الاختيار 4" class="opt">
                <input type="number" placeholder="رقم الإجابة الصحيحة (0-3)" class="correct-idx">
            </div>
        </div>
        <button class="btn btn-blue" onclick="addQuestionField()">+ إضافة سؤال آخر</button>
        <button class="btn btn-gold" style="margin-top:15px;" onclick="saveExam()">حفظ الامتحان بالكامل</button>
    </div>

    <div class="section" style="border-color: #e74c3c;">
        <h3 style="color:#e74c3c">⚠️ منطقة الخطر</h3>
        <button class="btn btn-red" onclick="clearResults()">حذف جميع نتائج امتحانات الطلاب</button>
    </div>
</div>

<script>
    const _supabase = supabase.createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');

    async function initAdmin() {
        const pass = prompt("يرجى إدخال كود الأدمن (MASTER CODE):");
        if(pass !== "FADY_2026_ADMIN") { 
            alert("كود خاطئ!"); window.location.href = "index.html";
        } else { loadData(); }
    }

    async function loadData() {
        const { data: courses } = await _supabase.from('courses').select('*');
        const { data: lessons } = await _supabase.from('lessons').select('*');

        let courseOpts = courses.map(c => `<option value="${c.id}">${c.title}</option>`).join('');
        document.getElementById('targetCourse').innerHTML = courseOpts;
        document.getElementById('courseToActivate').innerHTML = courseOpts;
        document.getElementById('targetLesson').innerHTML = lessons.map(l => `<option value="${l.id}">${l.title}</option>`).join('');

        document.getElementById('coursesList').innerHTML = courses.map(c => `
            <div class="list-item">
                <span>${c.title} - (${c.price || 0} ج.م)</span>
                <button class="btn btn-red" style="width:auto; padding:5px 10px;" onclick="deleteCourse('${c.id}')">حذف</button>
            </div>`).join('');
    }

    async function addCourse() {
        const t = document.getElementById('courseTitle').value;
        const p = document.getElementById('coursePrice').value || 0;
        if(!t) return alert("أدخل عنوان الكورس");
        await _supabase.from('courses').insert([{ title: t, price: parseInt(p) }]);
        location.reload();
    }

    async function deleteCourse(id) {
        if(confirm("سيتم حذف الكورس ومحتوياته نهائياً، هل أنت متأكد؟")) {
            await _supabase.from('courses').delete().eq('id', id);
            location.reload();
        }
    }

    async function addLesson() {
        const cId = document.getElementById('targetCourse').value;
        const title = document.getElementById('lessonTitle').value;
        const vId = document.getElementById('videoId').value;
        const pdf = document.getElementById('pdfUrl').value;
        await _supabase.from('lessons').insert([{ course_id: cId, title, video_id: vId, pdf_url: pdf }]);
        alert("تمت إضافة المحاضرة!");
    }

    async function activateCourse() {
        const p = document.getElementById('studentPhone').value;
        const cId = document.getElementById('courseToActivate').value;
        await _supabase.from('student_access').insert([{ student_phone: p, course_id: cId }]);
        alert("تم تفعيل الكورس للطالب!");
    }

    async function forceLogout() {
        const p = document.getElementById('logoutStudentPhone').value;
        if(!p) return alert("أدخل رقم الطالب");
        await _supabase.from('students').update({ last_device_id: null }).eq('student_phone', p);
        alert("تم تصفير الجهاز بنجاح!");
    }

    function addQuestionField() {
        const div = document.createElement('div');
        div.className = "question-block";
        div.style = "border:1px dashed var(--gold); padding:10px; margin-bottom:10px;";
        div.innerHTML = `<input type="text" placeholder="السؤال" class="q-text"><input type="text" placeholder="رابط الصورة" class="q-img"><input type="text" placeholder="الاختيار 1" class="opt"><input type="text" placeholder="الاختيار 2" class="opt"><input type="text" placeholder="الاختيار 3" class="opt"><input type="text" placeholder="الاختيار 4" class="opt"><input type="number" placeholder="رقم الإجابة الصحيحة (0-3)" class="correct-idx">`;
        document.getElementById('questionsArea').appendChild(div);
    }

    async function saveExam() {
        const lId = document.getElementById('targetLesson').value;
        const dur = document.getElementById('examDuration').value;
        const qBlocks = document.querySelectorAll('.question-block');
        let questions = [];
        qBlocks.forEach(b => {
            const opts = Array.from(b.querySelectorAll('.opt')).map(i => i.value);
            questions.push({ q: b.querySelector('.q-text').value, img: b.querySelector('.q-img').value, options: opts, correct: parseInt(b.querySelector('.correct-idx').value) });
        });
        await _supabase.from('exams').insert([{ lesson_id: lId, duration_minutes: dur, questions: questions }]);
        alert("تم رفع الامتحان!");
    }

    async function clearResults() {
        if(confirm("حذف كل النتائج؟")) {
            await _supabase.from('exam_results').delete().neq('id', 0);
            alert("تم التنظيف.");
        }
    }

    initAdmin();
</script>
</body>
</html>
