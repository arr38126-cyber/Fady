<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم المطورة | Dr. Fady Adel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --navy: #1B2347; --orange: #E8581A; --bg: #f0f2f5; --red: #e74c3c; --green: #2ecc71; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding: 0; overflow-x: hidden; }
        
        #auth-overlay { position: fixed; inset: 0; background: var(--navy); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        
        .container { max-width: 1200px; margin: 20px auto; padding: 20px; display: none; }
        .admin-header { background: var(--navy); color: white; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        .section { background: white; border-radius: 15px; padding: 25px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-right: 6px solid var(--orange); }
        h3 { margin-top: 0; color: var(--navy); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-family: 'Cairo'; font-size: 1rem; }
        .btn { padding: 12px 25px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: 'Cairo'; }
        .btn-orange { background: var(--orange); color: white; width: 100%; }
        .btn-red { background: var(--red); color: white; }
        .btn-danger { background: #000; color: #ff4d4d; border: 1px solid #ff4d4d; width: 100%; margin-top: 10px; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .manage-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        
        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="login-card">
        <img src="https://i.ibb.co/zT82jk68/image.png" width="80">
        <h2>دخول الإدارة</h2>
        <input type="tel" id="admin-phone" placeholder="رقم الموبايل">
        <input type="password" id="admin-pass" placeholder="كلمة المرور">
        <button class="btn btn-orange" onclick="handleAdminLogin()">دخول</button>
    </div>
</div>

<div class="container" id="main-content">
    <div class="admin-header">
        <h2><i class="fas fa-user-shield"></i> لوحة تحكم د. فادي</h2>
        <button class="btn btn-red" onclick="adminLogout()">خروج آمن</button>
    </div>

    <div class="section" style="border-right-color: var(--green);">
        <h3><i class="fas fa-edit"></i> إضافة امتحان إلكتروني (اختر)</h3>
        <select id="examCourseSelect"></select>
        <input type="text" id="examTitle" placeholder="اسم الامتحان (مثلاً: اختبار على الفصل الأول)">
        <div id="questions-area" style="background: #f9f9f9; padding: 15px; border-radius: 10px;">
            <textarea id="q-text" placeholder="اكتب السؤال هنا..."></textarea>
            <div class="grid-2">
                <input type="text" id="opt1" placeholder="الاختيار الأول">
                <input type="text" id="opt2" placeholder="الاختيار الثاني">
                <input type="text" id="opt3" placeholder="الاختيار الثالث">
                <input type="text" id="opt4" placeholder="الاختيار الرابع">
            </div>
            <select id="correctOpt">
                <option value="">حدد الإجابة الصحيحة</option>
                <option value="1">الاختيار الأول</option>
                <option value="2">الاختيار الثاني</option>
                <option value="3">الاختيار الثالث</option>
                <option value="4">الاختيار الرابع</option>
            </select>
        </div>
        <button class="btn btn-orange" style="margin-top:15px;" onclick="addExam()">نشر الامتحان فوراً</button>
    </div>

    <div class="grid-2">
        <div class="section">
            <h3><i class="fas fa-folder-plus"></i> كورس جديد</h3>
            <input type="text" id="c-title" placeholder="اسم الكورس">
            <input type="number" id="c-price" placeholder="السعر (0 للمجاني)">
            <input type="text" id="c-img" placeholder="رابط الصورة">
            <button class="btn btn-orange" onclick="addCourse()">إضافة</button>
        </div>
        <div class="section">
            <h3><i class="fas fa-video"></i> محاضرة جديدة</h3>
            <select id="targetCourse"></select>
            <input type="text" id="l-title" placeholder="عنوان المحاضرة">
            <input type="text" id="l-vid" placeholder="Video ID (يوتيوب)">
            <button class="btn btn-orange" onclick="addLesson()">نشر</button>
        </div>
    </div>

    <div class="section">
        <h3><i class="fas fa-tasks"></i> إدارة المحتوى (حذف وتعديل)</h3>
        <div id="management-area" style="max-height: 400px; overflow-y: auto;">
            <p style="text-align:center; color:#888;">جاري تحميل المحتوى...</p>
        </div>
    </div>

    <div class="section" style="border-right-color: var(--red); background: #fff5f5;">
        <h3 style="color: var(--red);"><i class="fas fa-exclamation-triangle"></i> منطقة العمليات الخطرة</h3>
        <div class="grid-2">
            <button class="btn btn-danger" onclick="wipeAllStudents()">
                <i class="fas fa-users-slash"></i> مسح كافة الطلاب (ماعدا الأدمن)
            </button>
            <button class="btn btn-danger" onclick="wipeAllContent()">
                <i class="fas fa-trash-alt"></i> مسح كافة الكورسات والمحاضرات
            </button>
        </div>
        <p style="font-size: 0.8rem; color: #c0392b; margin-top: 10px; text-align: center;">* تنبيه: هذه العمليات لا يمكن التراجع عنها نهائياً.</p>
    </div>
</div>

<script>
    const _sb = supabase.createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');

    async function handleAdminLogin() {
        const phone = document.getElementById('admin-phone').value;
        const pass = document.getElementById('admin-pass').value;
        const { data } = await _sb.from('students').select('*').eq('student_phone', phone).eq('password', pass).single();
        if(data && data.role === 'admin') { localStorage.setItem('fady_admin_logged', 'true'); showDashboard(); } 
        else alert("غير مسموح لك بالدخول");
    }

    function showDashboard() {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        loadAllData();
    }

    async function loadAllData() {
        const { data: courses } = await _sb.from('courses').select('*');
        if(courses) {
            const opts = courses.map(c => `<option value="${c.id}">${c.title}</option>`).join('');
            document.getElementById('examCourseSelect').innerHTML = opts;
            document.getElementById('targetCourse').innerHTML = opts;
            
            // عرض المحتوى للإدارة
            let html = '';
            for(let c of courses) {
                html += `<div style="background:#eee; padding:10px; margin-top:15px; font-weight:bold; border-radius:8px; display:flex; justify-content:space-between;">
                            <span>📦 كورس: ${c.title}</span>
                            <button onclick="deleteItem('courses', '${c.id}')" style="color:red; border:none; cursor:pointer;">حذف الكورس</button>
                         </div>`;
                const { data: lessons } = await _sb.from('lessons').select('*').eq('course_id', c.id);
                lessons?.forEach(l => {
                    html += `<div class="manage-item"><span> ↳ 🎥 ${l.title}</span> <button onclick="deleteItem('lessons', '${l.id}')" style="color:#888; border:none; cursor:pointer;">حذف</button></div>`;
                });
            }
            document.getElementById('management-area').innerHTML = html;
        }
    }

    // إضافة امتحان
    async function addExam() {
        const cId = document.getElementById('examCourseSelect').value;
        const title = document.getElementById('examTitle').value;
        const question = {
            q: document.getElementById('q-text').value,
            options: [document.getElementById('opt1').value, document.getElementById('opt2').value, document.getElementById('opt3').value, document.getElementById('opt4').value],
            correct: document.getElementById('correctOpt').value
        };
        if(!title || !question.q || !question.correct) return alert("أكمل بيانات الامتحان");
        
        const { error } = await _sb.from('exams').insert([{ course_id: cId, title: title, questions: [question] }]);
        if(!error) { alert("تم نشر الامتحان بنجاح"); location.reload(); }
    }

    // دوال الإضافة العادية
    async function addCourse() {
        const t = document.getElementById('c-title').value;
        const p = document.getElementById('c-price').value;
        await _sb.from('courses').insert([{ title: t, price: Number(p), image_url: document.getElementById('c-img').value }]);
        loadAllData();
    }

    async function addLesson() {
        await _sb.from('lessons').insert([{ 
            course_id: document.getElementById('targetCourse').value, 
            title: document.getElementById('l-title').value, 
            video_id: document.getElementById('l-vid').value 
        }]);
        loadAllData();
    }

    // حذف عنصر معين
    async function deleteItem(table, id) {
        if(confirm("هل أنت متأكد من الحذف؟")) {
            await _sb.from(table).delete().eq('id', id);
            loadAllData();
        }
    }

    // --- عمليات التنظيف الكبرى ---
    async function wipeAllStudents() {
        if(confirm("⚠ تحذير قاتل: سيتم مسح كافة حسابات الطلاب المشتركين نهائياً (باستثناء الأدمن). هل أنت متأكد؟")) {
            const { error } = await _sb.from('students').delete().neq('role', 'admin');
            if(!error) alert("تم تنظيف قائمة الطلاب بنجاح");
        }
    }

    async function wipeAllContent() {
        if(confirm("⚠ تحذير: سيتم مسح كافة الكورسات، المحاضرات، والامتحانات من المنصة. هل أنت متأكد؟")) {
            await _sb.from('lessons').delete().neq('id', 0);
            await _sb.from('exams').delete().neq('id', 0);
            await _sb.from('courses').delete().neq('id', 0);
            alert("تم مسح كافة المحتويات بنجاح");
            loadAllData();
        }
    }

    function adminLogout() { localStorage.removeItem('fady_admin_logged'); location.reload(); }
    window.onload = () => { if(localStorage.getItem('fady_admin_logged')==='true') showDashboard(); };
</script>
</body>
</html>
