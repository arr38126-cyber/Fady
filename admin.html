<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Dr. Fady Adel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --navy: #1B2347; --orange: #E8581A; --orange-lt: #F97316; --white: #fff; --bg: #f0f2f5; --shadow: 0 5px 15px rgba(0,0,0,0.1); }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--navy); margin: 0; padding: 0; }
        
        /* شاشة تسجيل الدخول */
        #auth-overlay { position: fixed; inset: 0; background: var(--navy); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: var(--shadow); }
        
        /* الهيدر والكونتينر */
        .container { max-width: 1100px; margin: 20px auto; padding: 20px; display: none; }
        .admin-header { background: var(--navy); color: white; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        /* الأقسام */
        .section { background: white; border-radius: 15px; padding: 25px; margin-bottom: 20px; box-shadow: var(--shadow); border-right: 5px solid var(--orange); position: relative; }
        h3 { margin-top: 0; color: var(--navy); border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-family: 'Cairo'; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: 'Cairo'; margin-top: 10px; }
        .btn-orange { background: var(--orange); color: white; }
        .btn-blue { background: #3498db; color: white; }
        .btn-red { background: #e74c3c; color: white; }

        /* عرض بيانات الطالب */
        .log-item { background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 5px; font-size: 0.9rem; border-right: 3px solid #3498db; }
        .badge { background: var(--navy); color: white; padding: 2px 8px; border-radius: 5px; font-size: 0.8rem; display: inline-block; margin-left: 5px; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="login-card">
        <h2 style="color: var(--navy)">تسجيل دخول الإدارة</h2>
        <input type="tel" id="admin-phone" placeholder="رقم الموبايل">
        <input type="password" id="admin-pass" placeholder="كلمة المرور">
        <button class="btn btn-orange" onclick="handleAdminLogin()">دخول</button>
    </div>
</div>

<div class="container" id="main-content">
    <div class="admin-header">
        <h2 style="margin:0">لوحة التحكم | Dr. Fady</h2>
        <button class="btn btn-red" style="width:auto; margin:0" onclick="adminLogout()">خروج</button>
    </div>

    <div class="section" style="border-right-color: #3498db;">
        <h3>🔍 مراقبة نشاط طالب</h3>
        <div style="display: flex; gap: 10px;">
            <input type="tel" id="search-student-phone" placeholder="أدخل رقم موبايل الطالب للبحث...">
            <button class="btn btn-blue" style="width:150px; margin:8px 0" onclick="getStudentReport()">عرض التقرير</button>
        </div>
        
        <div id="student-report-area" style="margin-top: 15px; display: none; padding: 15px; background: #fff;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px;">
                <h4 id="rep-name" style="margin:0; color:var(--orange); font-size: 1.3rem;"></h4>
                <button id="pdf-btn" class="btn btn-red" style="width:auto; margin:0; padding: 5px 15px;" onclick="downloadPDF()">📥 تحميل PDF</button>
            </div>
            <div id="rep-courses" style="margin-bottom:15px;"><strong>📚 الكورسات المشترك بها:</strong> <div id="c-list" style="margin-top:5px;"></div></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <div>
                    <strong style="color: var(--navy);">🎥 محاضرات شاهدها:</strong>
                    <div id="rep-lessons" style="max-height:200px; overflow-y:auto; margin-top:10px;"></div>
                </div>
                <div>
                    <strong style="color: var(--navy);">📝 نتائج الامتحانات:</strong>
                    <div id="rep-exams" style="max-height:200px; overflow-y:auto; margin-top:10px;"></div>
                </div>
            </div>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="section">
            <h3>📂 إضافة كورس</h3>
            <input type="text" id="courseTitle" placeholder="اسم الكورس">
            <input type="number" id="coursePrice" placeholder="السعر">
            <input type="text" id="courseImage" placeholder="رابط الصورة">
            <button class="btn btn-orange" onclick="addCourse()">حفظ الكورس</button>
        </div>
        <div class="section">
            <h3>🎥 إضافة محاضرة</h3>
            <select id="targetCourse"></select>
            <input type="text" id="lessonTitle" placeholder="عنوان المحاضرة">
            <input type="text" id="videoId" placeholder="رابط يوتيوب">
            <button class="btn btn-blue" onclick="addLesson()">نشر المحاضرة</button>
        </div>
    </div>

    <div class="section" style="border-right-color: #2ecc71;">
        <h3>🔐 صلاحيات الوصول وإدارة الأجهزة</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <label>تفعيل كورس لطالب:</label>
                <input type="tel" id="studentPhone" placeholder="رقم الطالب">
                <select id="courseToActivate"></select>
                <button class="btn btn-orange" onclick="activateCourse()">تفعيل الكورس</button>
            </div>
            <div>
                <label>تصفير جهاز (طرد من كل الأجهزة):</label>
                <input type="tel" id="resetPhone" placeholder="رقم الموبايل للطالب">
                <button class="btn btn-red" onclick="forceLogout()">تصفير الحساب</button>
            </div>
        </div>
    </div>
</div>

<script>
    const _sb = supabase.createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');

    // 1. نظام تسجيل الدخول وحفظ الجلسة
    async function checkSession() {
        const savedAdmin = localStorage.getItem('fady_admin_logged');
        if(savedAdmin === 'true') {
            showDashboard();
        }
    }

    async function handleAdminLogin() {
        const phone = document.getElementById('admin-phone').value;
        const pass = document.getElementById('admin-pass').value;

        const { data, error } = await _sb.from('students').select('*')
            .eq('student_phone', phone).eq('password', pass).single();

        if(data) {
            if(data.role === 'admin') {
                localStorage.setItem('fady_admin_logged', 'true');
                showDashboard();
            } else {
                alert("عفواً، هذا الحساب للطلاب فقط.");
            }
        } else {
            alert("بيانات الدخول خاطئة");
        }
    }

    function showDashboard() {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        loadData();
    }

    function adminLogout() {
        localStorage.removeItem('fady_admin_logged');
        location.reload();
    }

    // 2. نظام التقرير الشامل
    async function getStudentReport() {
        const phone = document.getElementById('search-student-phone').value;
        if(!phone) return alert("أدخل رقم الطالب");

        const { data: student } = await _sb.from('students').select('*').eq('student_phone', phone).single();
        if(!student) return alert("الطالب غير موجود");

        document.getElementById('student-report-area').style.display = 'block';
        document.getElementById('rep-name').innerText = "تقرير الطالب: " + student.full_name;

        const { data: access } = await _sb.from('student_access').select('courses(title)').eq('student_phone', phone);
        document.getElementById('c-list').innerHTML = (access && access.length > 0) ? access.map(a => `<span class="badge">${a.courses.title}</span>`).join(' ') : "لم يشترك في كورسات بعد";

        const { data: views } = await _sb.from('lesson_views').select('lesson_title, created_at').eq('student_phone', phone);
        document.getElementById('rep-lessons').innerHTML = views?.length ? views.map(v => `<div class="log-item">✅ ${v.lesson_title} <br><small>${new Date(v.created_at).toLocaleString('ar-EG')}</small></div>`).join('') : "لم يشاهد محاضرات بعد";

        const { data: results } = await _sb.from('exam_results').select('*').eq('student_phone', phone);
        document.getElementById('rep-exams').innerHTML = results?.length ? results.map(r => `<div class="log-item">📝 ${r.exam_name} <br> <b>الدرجة: ${r.score}%</b></div>`).join('') : "لم يمتحن بعد";
    }

    // 3. وظيفة تحميل التقرير كـ PDF
    function downloadPDF() {
        const element = document.getElementById('student-report-area');
        const studentName = document.getElementById('rep-name').innerText.replace('تقرير الطالب: ', '').trim();
        const pdfBtn = document.getElementById('pdf-btn');
        
        // إخفاء الزر أثناء التقاط الـ PDF عشان ميظهرش في الورقة
        pdfBtn.style.display = 'none';

        const opt = {
            margin:       0.5,
            filename:     `تقرير_${studentName}.pdf`,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true },
            jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save().then(() => {
            // إظهار الزر مرة تانية بعد التحميل
            pdfBtn.style.display = 'inline-block';
        });
    }

    // 4. وظائف الإدارة العادية
    async function loadData() {
        const { data: courses } = await _sb.from('courses').select('*');
        if(courses) {
            let opts = courses.map(c => `<option value="${c.id}">${c.title}</option>`).join('');
            document.getElementById('targetCourse').innerHTML = opts;
            document.getElementById('courseToActivate').innerHTML = opts;
        }
    }

    async function addCourse() {
        const t = document.getElementById('courseTitle').value;
        const p = document.getElementById('coursePrice').value;
        const img = document.getElementById('courseImage').value;
        await _sb.from('courses').insert([{ title: t, price: p, image_url: img }]);
        alert("تم الحفظ"); loadData();
    }

    async function addLesson() {
        const cId = document.getElementById('targetCourse').value;
        const title = document.getElementById('lessonTitle').value;
        const vId = document.getElementById('videoId').value;
        await _sb.from('lessons').insert([{ course_id: cId, title, video_id: vId }]);
        alert("تم النشر");
    }

    async function activateCourse() {
        const p = document.getElementById('studentPhone').value;
        const cId = document.getElementById('courseToActivate').value;
        await _sb.from('student_access').insert([{ student_phone: p, course_id: cId }]);
        alert("تم التفعيل");
    }

    // 5. التصفير الجذري للطالب
    async function forceLogout() {
        const p = document.getElementById('resetPhone').value;
        if(!p) return alert("برجاء إدخال رقم الطالب");

        // جعل last_device_id تساوي null يسحب الجلسة من كل الأجهزة فوراً بناءً على كود الطالب
        const { error } = await _sb.from('students').update({ last_device_id: null }).eq('student_phone', p);
        
        if (error) {
            alert("حدث خطأ أثناء تصفير الحساب.");
        } else {
            alert("تم تصفير حساب الطالب بنجاح! سيتم طرده من أي جهاز مفتوح فوراً كأنه لم يسجل دخول من قبل.");
            document.getElementById('resetPhone').value = '';
        }
    }

    window.onload = checkSession;
</script>
</body>
</html>
