<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | Dr. Fady Adel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --navy: #1B2347; --orange: #E8581A; --bg: #f0f2f5; --shadow: 0 5px 15px rgba(0,0,0,0.1); }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--navy); margin: 0; padding: 0; }
        
        #auth-overlay { position: fixed; inset: 0; background: var(--navy); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: var(--shadow); }
        
        .container { max-width: 1100px; margin: 20px auto; padding: 20px; display: none; }
        .admin-header { background: var(--navy); color: white; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        .section { background: white; border-radius: 15px; padding: 25px; margin-bottom: 20px; box-shadow: var(--shadow); border-right: 6px solid var(--orange); position: relative; }
        h3 { margin-top: 0; color: var(--navy); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-family: 'Cairo'; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: 'Cairo'; margin-top: 10px; }
        .btn-orange { background: var(--orange); color: white; }
        .btn-blue { background: #3498db; color: white; }
        .btn-red { background: #e74c3c; color: white; }
        .btn-green { background: #2ecc71; color: white; }

        /* ستايل التقرير */
        .log-item { background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 0.9rem; border-right: 4px solid #3498db; }
        .badge { background: var(--navy); color: white; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; display: inline-block; margin: 2px; }
        .report-header { display: flex; justify-content: space-between; align-items: center; background: #fffcf5; padding: 15px; border-radius: 10px; border: 1px solid #ffeeba; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="login-card">
        <img src="https://i.ibb.co/zT82jk68/image.png" width="80" style="margin-bottom: 15px;">
        <h2 style="margin: 0 0 20px 0;">دخول الإدارة</h2>
        <input type="tel" id="admin-phone" placeholder="رقم الموبايل">
        <input type="password" id="admin-pass" placeholder="كلمة المرور">
        <button class="btn btn-orange" onclick="handleAdminLogin()">تسجيل الدخول</button>
    </div>
</div>

<div class="container" id="main-content">
    <div class="admin-header">
        <h2 style="margin:0">لوحة تحكم د. فادي عادل</h2>
        <button class="btn btn-red" style="width:auto; margin:0" onclick="adminLogout()">خروج آمن</button>
    </div>

    <div class="section" style="border-right-color: #3498db;">
        <h3>🔍 مراقبة نشاط طالب واستخراج تقارير</h3>
        <div style="display: flex; gap: 10px;">
            <input type="tel" id="search-student-phone" placeholder="أدخل رقم موبايل الطالب للبحث...">
            <button class="btn btn-blue" style="width:180px; margin:8px 0" onclick="getStudentReport()">عرض النشاط</button>
        </div>
        
        <div id="student-report-area" style="margin-top: 20px; display: none; padding: 20px; background: #fff; border: 1px solid #eee; border-radius: 10px;">
            <div class="report-header">
                <div>
                    <h4 id="rep-name" style="margin:0; color:var(--orange); font-size: 1.4rem;"></h4>
                    <p id="rep-phone-display" style="margin: 5px 0 0 0; color: #666;"></p>
                </div>
                <button id="pdf-btn" class="btn btn-red" style="width:auto; margin:0;" onclick="downloadPDF()">📥 تحميل التقرير PDF</button>
            </div>
            
            <div style="margin-bottom:20px;">
                <strong>📚 الكورسات المفعلة:</strong>
                <div id="c-list" style="margin-top:8px;"></div>
            </div>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div>
                    <strong style="color: var(--navy);">🎥 محاضرات تم فتحها:</strong>
                    <div id="rep-lessons" style="max-height:250px; overflow-y:auto; margin-top:10px;"></div>
                </div>
                <div>
                    <strong style="color: var(--navy);">📝 نتائج الامتحانات:</strong>
                    <div id="rep-exams" style="max-height:250px; overflow-y:auto; margin-top:10px;"></div>
                </div>
            </div>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="section">
            <h3>📂 إضافة كورس جديد</h3>
            <label style="font-size: 0.8rem; color: #666;">* اجعل السعر 0 ليصبح الكورس مجانياً للجميع</label>
            <input type="text" id="courseTitle" placeholder="اسم الكورس (مثلاً: الباب الأول)">
            <input type="number" id="coursePrice" placeholder="سعر الكورس (0 للمجاني)">
            <input type="text" id="courseImage" placeholder="رابط صورة الكورس">
            <button class="btn btn-orange" onclick="addCourse()">حفظ ونشر الكورس</button>
        </div>
        <div class="section">
            <h3>🎥 إضافة محاضرة</h3>
            <select id="targetCourse"></select>
            <input type="text" id="lessonTitle" placeholder="عنوان المحاضرة">
            <input type="text" id="videoId" placeholder="رابط فيديو اليوتيوب">
            <button class="btn btn-blue" onclick="addLesson()">نشر المحاضرة داخل الكورس</button>
        </div>
    </div>

    <div class="section" style="border-right-color: #2ecc71;">
        <h3>🔐 إدارة صلاحيات الطلاب والأجهزة</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
            <div>
                <label>تفعيل كورس مدفوع لطالب:</label>
                <input type="tel" id="studentPhone" placeholder="رقم موبايل الطالب">
                <select id="courseToActivate"></select>
                <button class="btn btn-green" onclick="activateCourse()">تفعيل الوصول</button>
            </div>
            <div>
                <label>حماية: تصفير جهاز الطالب (Reset):</label>
                <input type="tel" id="resetPhone" placeholder="رقم موبايل الطالب">
                <button class="btn btn-red" onclick="forceLogout()">طرد من كل الأجهزة</button>
                <p style="font-size: 0.75rem; color: #777; margin-top: 5px;">* سيتم طرده فوراً ومطالبته بتسجيل الدخول مرة أخرى.</p>
            </div>
        </div>
    </div>
</div>

<script>
    // تهيئة Supabase
    const _sb = supabase.createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');

    async function checkSession() {
        if(localStorage.getItem('fady_admin_logged') === 'true') showDashboard();
    }

    async function handleAdminLogin() {
        const phone = document.getElementById('admin-phone').value;
        const pass = document.getElementById('admin-pass').value;
        const { data } = await _sb.from('students').select('*').eq('student_phone', phone).eq('password', pass).single();

        if(data && data.role === 'admin') {
            localStorage.setItem('fady_admin_logged', 'true');
            showDashboard();
        } else {
            alert("خطأ: بيانات الدخول غير صحيحة أو ليس لديك صلاحية أدمن.");
        }
    }

    function showDashboard() {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        loadData();
    }

    function adminLogout() {
        localStorage.removeItem('fady_admin_logged');
        location.reload();
    }

    // --- وظائف التقرير والـ PDF ---
    async function getStudentReport() {
        const phone = document.getElementById('search-student-phone').value;
        if(!phone) return alert("يرجى إدخال رقم الهاتف");

        const { data: student } = await _sb.from('students').select('*').eq('student_phone', phone).single();
        if(!student) return alert("عفواً، لا يوجد طالب مسجل بهذا الرقم");

        document.getElementById('student-report-area').style.display = 'block';
        document.getElementById('rep-name').innerText = student.full_name;
        document.getElementById('rep-phone-display').innerText = "رقم الموبايل: " + student.student_phone;

        // 1. جلب الكورسات
        const { data: access } = await _sb.from('student_access').select('courses(title)').eq('student_phone', phone);
        document.getElementById('c-list').innerHTML = access?.length ? access.map(a => `<span class="badge">${a.courses.title}</span>`).join('') : "لا يوجد اشتراكات مدفوعة حالياً";

        // 2. المحاضرات
        const { data: views } = await _sb.from('lesson_views').select('*').eq('student_phone', phone).order('created_at', {ascending: false});
        document.getElementById('rep-lessons').innerHTML = views?.length ? views.map(v => `<div class="log-item">✅ ${v.lesson_title} <br><small>${new Date(v.created_at).toLocaleString('ar-EG')}</small></div>`).join('') : "لم يشاهد أي فيديوهات";

        // 3. الامتحانات
        const { data: exams } = await _sb.from('exam_results').select('*').eq('student_phone', phone);
        document.getElementById('rep-exams').innerHTML = exams?.length ? exams.map(e => `<div class="log-item">📝 ${e.exam_name} <br><b>الدرجة: ${e.score}%</b></div>`).join('') : "لم يؤدِ أي امتحانات";
    }

    function downloadPDF() {
        const element = document.getElementById('student-report-area');
        const name = document.getElementById('rep-name').innerText;
        const btn = document.getElementById('pdf-btn');
        btn.style.display = 'none'; // إخفاء الزر أثناء التحميل

        const opt = { margin: 0.5, filename: `تقرير_الطالب_${name}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } };
        html2pdf().set(opt).from(element).save().then(() => btn.style.display = 'block');
    }

    // --- وظائف الإدارة (إضافة وتحكم) ---
    async function loadData() {
        const { data: courses } = await _sb.from('courses').select('*');
        if(courses) {
            let opts = courses.map(c => `<option value="${c.id}">${c.title} (${c.price === 0 ? 'مجاني' : c.price + ' ج.م'})</option>`).join('');
            document.getElementById('targetCourse').innerHTML = opts;
            document.getElementById('courseToActivate').innerHTML = opts;
        }
    }

    async function addCourse() {
        const t = document.getElementById('courseTitle').value;
        const p = document.getElementById('coursePrice').value;
        const img = document.getElementById('courseImage').value;

        if(!t || p === "") return alert("أكمل البيانات");

        // تحويل السعر لرقم لضمان عمل المنطق في صفحة الطالب
        const { error } = await _sb.from('courses').insert([{ title: t, price: Number(p), image_url: img }]);
        
        if(!error) {
            alert(Number(p) === 0 ? "تم إضافة كورس مجاني بنجاح" : "تم إضافة الكورس بنجاح");
            loadData();
        }
    }

    async function addLesson() {
        const cId = document.getElementById('targetCourse').value;
        const title = document.getElementById('lessonTitle').value;
        const vId = document.getElementById('videoId').value;
        if(!title || !vId) return alert("أكمل بيانات المحاضرة");

        await _sb.from('lessons').insert([{ course_id: cId, title, video_id: vId }]);
        alert("تم نشر المحاضرة بنجاح");
    }

    async function activateCourse() {
        const p = document.getElementById('studentPhone').value;
        const cId = document.getElementById('courseToActivate').value;
        if(!p) return alert("أدخل رقم الطالب");

        const { error } = await _sb.from('student_access').insert([{ student_phone: p, course_id: cId }]);
        if(error) alert("خطأ: تأكد من صحة الرقم أو أن الطالب مسجل بالفعل");
        else alert("تم تفعيل الكورس للطالب بنجاح!");
    }

    async function forceLogout() {
        const p = document.getElementById('resetPhone').value;
        if(!p) return alert("أدخل رقم الطالب المراد تصفيره");

        const { error } = await _sb.from('students').update({ last_device_id: null }).eq('student_phone', p);
        if(!error) {
            alert("تم تصفير الحساب بنجاح. سيتم طرد الطالب من أي جهاز مفتوح فوراً.");
            document.getElementById('resetPhone').value = "";
        } else {
            alert("حدث خطأ في عملية التصفير.");
        }
    }

    window.onload = checkSession;
</script>
</body>
</html>
