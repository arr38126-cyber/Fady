<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة المنصة الاحترافية | Dr: Fady Adel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c9972b; --navy: #050a0f; --card: #0d1621; --danger: #ff4d4d; }
        body { font-family: 'Cairo', sans-serif; background: var(--navy); color: white; padding: 20px; }
        .section { background: var(--card); border: 1px solid var(--gold); padding: 20px; border-radius: 15px; margin-bottom: 25px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; background: #1a2635; border: 1px solid #333; color: white; border-radius: 8px; }
        .btn { background: var(--gold); color: var(--navy); border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-del { background: var(--danger); color: white; width: auto; padding: 5px 10px; margin-top: 5px; cursor: pointer; border: none; border-radius: 5px; }
        .q-card { border: 1px dashed var(--gold); padding: 10px; margin-top: 10px; border-radius: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="lockScreen" style="text-align:center; margin-top:100px;">
        <h2>🛡️ منطقة محظورة</h2>
        <input type="password" id="mCode" placeholder="كود الوصول" style="width:200px;">
        <button class="btn" onclick="checkAuth()" style="width:100px;">دخول</button>
    </div>

    <div id="mainContent" class="hidden">
        <h1>🛠️ لوحة الإدارة الشاملة</h1>

        <div class="section" style="border-color: var(--danger);">
            <h3 style="color:var(--danger)">🗑️ تنظيف المنصة (نهاية السنة)</h3>
            <button class="btn-del" onclick="cleanPlatform('all')">حذف كل شيء (ماعدا الأدمن)</button>
            <button class="btn-del" onclick="cleanPlatform('results')">حذف نتائج الامتحانات فقط</button>
        </div>

        <div class="section">
            <h3>📚 الكورسات</h3>
            <input type="text" id="cTitle" placeholder="عنوان الكورس الجديد">
            <button class="btn" onclick="addCourse()">إضافة كورس</button>
            <hr style="margin:20px 0; border:0.5px solid #333;">
            <div id="coursesList">جاري التحميل...</div>
        </div>

        <div class="section">
            <h3>📝 إضافة امتحان (نظام احترافي)</h3>
            <select id="lSelect"><option>اختر المحاضرة</option></select>
            <input type="number" id="eTime" placeholder="مدة الامتحان بالدقائق (مثلاً: 30)">
            <div id="questionsArea">
                <div class="q-card">
                    <input type="text" class="q-txt" placeholder="نص السؤال">
                    <input type="text" class="q-img" placeholder="رابط الصورة (اختياري)">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
                        <input type="text" class="q-a" placeholder="أ (الإجابة الصح)">
                        <input type="text" class="q-b" placeholder="ب">
                        <input type="text" class="q-c" placeholder="ج">
                        <input type="text" class="q-d" placeholder="د">
                    </div>
                </div>
            </div>
            <button class="btn" onclick="saveFullExam()">حفظ الامتحان والوقت</button>
        </div>

        <div class="section">
            <h3>🔑 فتح كورس لطالب محدد</h3>
            <input type="tel" id="stPhone" placeholder="رقم موبايل الطالب">
            <select id="cSelectGrant"><option>اختر الكورس</option></select>
            <button class="btn" onclick="grantAccess()">تفعيل الكورس للطالب</button>
        </div>
    </div>

<script>
    const _supabase = supabase.createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');

    function checkAuth() {
        if(document.getElementById('mCode').value === "FADY_2026_ADMIN") {
            document.getElementById('lockScreen').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            loadData();
        }
    }

    async function loadData() {
        const { data: courses } = await _supabase.from('courses').select('*');
        let cHtml = '';
        courses.forEach(c => {
            cHtml += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span>- ${c.title}</span>
                <button class="btn-del" onclick="deleteItem('courses', '${c.id}')">حذف الكورس</button>
            </div>`;
        });
        document.getElementById('coursesList').innerHTML = cHtml;
        document.getElementById('cSelectGrant').innerHTML = courses.map(c => `<option value="${c.id}">${c.title}</option>`).join('');

        const { data: lessons } = await _supabase.from('lessons').select('*');
        document.getElementById('lSelect').innerHTML = lessons.map(l => `<option value="${l.id}">${l.title}</option>`).join('');
    }

    async function addCourse() {
        const title = document.getElementById('cTitle').value;
        await _supabase.from('courses').insert([{ title }]);
        loadData();
    }

    async function deleteItem(table, id) {
        if(confirm("هل أنت متأكد من الحذف؟ سيتم حذف كل ما هو مرتبط بهذا العنصر.")) {
            await _supabase.from(table).delete().eq('id', id);
            loadData();
        }
    }

    async function saveFullExam() {
        const lid = document.getElementById('lSelect').value;
        const time = document.getElementById('eTime').value;
        const questions = [{
            q: document.querySelector('.q-txt').value,
            img: document.querySelector('.q-img').value,
            options: [document.querySelector('.q-a').value, document.querySelector('.q-b').value, document.querySelector('.q-c').value, document.querySelector('.q-d').value],
            correct: 0
        }];

        await _supabase.from('exams').insert([{ 
            lesson_id: lid, 
            questions: questions, 
            duration_minutes: parseInt(time) 
        }]);
        alert("تم حفظ الامتحان بنجاح!");
    }

    async function grantAccess() {
        const phone = document.getElementById('stPhone').value;
        const cid = document.getElementById('cSelectGrant').value;
        const { error } = await _supabase.from('student_access').insert([{ student_phone: phone, course_id: cid }]);
        if(error) alert("الطالب لديه صلاحية بالفعل أو الرقم خطأ");
        else alert("تم تفعيل الكورس للطالب بنجاح!");
    }

    async function cleanPlatform(type) {
        if(!confirm("⚠️ تحذير: هذا الإجراء لا يمكن التراجع عنه! هل أنت متأكد؟")) return;
        
        if(type === 'results') {
            await _supabase.from('exam_results').delete().neq('id', '00000000-0000-0000-0000-000000000000');
        } else if(type === 'all') {
            // حذف كل شيء ماعدا الطلاب الذين لديهم role = admin
            await _supabase.from('exam_results').delete().neq('id', '0');
            await _supabase.from('exams').delete().neq('id', '0');
            await _supabase.from('lessons').delete().neq('id', '0');
            await _supabase.from('courses').delete().neq('id', '0');
            await _supabase.from('students').delete().eq('role', 'student');
        }
        alert("تمت عملية التنظيف بنجاح!");
        loadData();
    }
</script>
</body>
</html>
