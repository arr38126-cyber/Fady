<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الشاملة | Dr. Fady Adel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --navy: #1B2347; --orange: #E8581A; --bg: #f0f2f5; --red: #e74c3c; --green: #2ecc71; --blue: #3498db; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--navy); }
        
        #auth-overlay { position: fixed; inset: 0; background: var(--navy); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        
        .container { max-width: 1200px; margin: 20px auto; padding: 20px; display: none; }
        .admin-header { background: var(--navy); color: white; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        .section { background: white; border-radius: 15px; padding: 25px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-right: 6px solid var(--orange); }
        h3 { margin-top: 0; color: var(--navy); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-family: 'Cairo'; font-size: 1rem; }
        .btn { padding: 12px 25px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: 'Cairo'; }
        .btn-orange { background: var(--orange); color: white; width: 100%; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-red { background: var(--red); color: white; }
        .btn-green { background: var(--green); color: white; }
        
        .question-box { background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 15px; position: relative; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="login-card">
        <h2>دخول الإدارة</h2>
        <input type="tel" id="admin-phone" placeholder="رقم الموبايل">
        <input type="password" id="admin-pass" placeholder="كلمة المرور">
        <button class="btn btn-orange" onclick="handleAdminLogin()">دخول</button>
    </div>
</div>

<div class="container" id="main-content">
    <div class="admin-header">
        <h2>لوحة تحكم د. فادي عادل</h2>
        <button class="btn btn-red" onclick="adminLogout()">خروج</button>
    </div>

    <div class="section" style="border-right-color: var(--green);">
        <h3><i class="fas fa-stopwatch"></i> إضافة امتحان إلكتروني مؤقت</h3>
        <div class="grid-2">
            <select id="examCourse"></select>
            <input type="number" id="examDuration" placeholder="مدة الامتحان بالدقائق (مثلاً: 30)">
        </div>
        <input type="text" id="examTitle" placeholder="عنوان الامتحان (مثلاً: اختبار شامل على الباب الثاني)">
        
        <div id="questions-container">
            </div>

        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button class="btn btn-blue" onclick="addNewQuestionField()">+ إضافة سؤال</button>
            <button class="btn btn-orange" onclick="saveExam()">حفظ ونشر الامتحان</button>
        </div>
    </div>

    </div>

<script>
    const _sb = supabase.createClient('https://atjzfdlayhfbrdfplkaz.supabase.co', 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8');

    async function handleAdminLogin() {
        const phone = document.getElementById('admin-phone').value;
        const pass = document.getElementById('admin-pass').value;
        const { data } = await _sb.from('students').select('*').eq('student_phone', phone).eq('password', pass).single();
        if(data && data.role === 'admin') { localStorage.setItem('f_admin', 'true'); showDash(); } else alert("بيانات غير صحيحة");
    }

    function showDash() {
        document.getElementById('auth-overlay').style.display='none';
        document.getElementById('main-content').style.display='block';
        loadData();
        addNewQuestionField(); 
    }

    let qCount = 0;
    function addNewQuestionField() {
        qCount++;
        const div = document.createElement('div');
        div.className = 'question-box';
        div.innerHTML = `
            <strong>سؤال ${qCount}:</strong>
            <button onclick="this.parentElement.remove()" style="position:absolute; left:10px; top:10px; border:none; background:none; color:red; cursor:pointer;"><i class="fas fa-trash"></i></button>
            <textarea class="q-txt" placeholder="نص السؤال..."></textarea>
            <input type="text" class="q-img" placeholder="رابط صورة توضيحية للسؤال (إن وجد)">
            <div class="grid-2">
                <input type="text" class="q-o1" placeholder="الاختيار 1">
                <input type="text" class="q-o2" placeholder="الاختيار 2">
                <input type="text" class="q-o3" placeholder="الاختيار 3">
                <input type="text" class="q-o4" placeholder="الاختيار 4">
            </div>
            <select class="q-corr">
                <option value="1">الاختيار 1 صحيح</option>
                <option value="2">الاختيار 2 صحيح</option>
                <option value="3">الاختيار 3 صحيح</option>
                <option value="4">الاختيار 4 صحيح</option>
            </select>
        `;
        document.getElementById('questions-container').appendChild(div);
    }

    async function saveExam() {
        const title = document.getElementById('examTitle').value;
        const duration = document.getElementById('examDuration').value;
        const cId = document.getElementById('examCourse').value;
        const qBoxes = document.querySelectorAll('.question-box');
        
        if(!title || !duration) return alert("يرجى إدخال عنوان الامتحان والمدة الزمنية");

        let questions = [];
        qBoxes.forEach(box => {
            questions.push({
                text: box.querySelector('.q-txt').value,
                image: box.querySelector('.q-img').value,
                options: [
                    box.querySelector('.q-o1').value, 
                    box.querySelector('.q-o2').value, 
                    box.querySelector('.q-o3').value, 
                    box.querySelector('.q-o4').value
                ],
                correct: box.querySelector('.q-corr').value
            });
        });

        const { error } = await _sb.from('exams').insert([{ 
            course_id: cId, 
            title: title, 
            duration_minutes: parseInt(duration), // حفظ المدة بالدقائق
            questions: questions 
        }]);

        if(!error) {
            alert("تم نشر الامتحان بنجاح");
            location.reload();
        } else {
            console.error(error);
            alert("حدث خطأ أثناء الحفظ");
        }
    }

    async function loadData() {
        const { data: cs } = await _sb.from('courses').select('*');
        if(cs) {
            document.getElementById('examCourse').innerHTML = cs.map(c => `<option value="${c.id}">${c.title}</option>`).join('');
        }
    }

    function adminLogout() { localStorage.clear(); location.reload(); }
    window.onload = () => { if(localStorage.getItem('f_admin')) showDash(); };
</script>
</body>
</html>
